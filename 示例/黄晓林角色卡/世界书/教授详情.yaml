---
教授_The_Professor:
  title: 教授 (The Professor) - 伊甸园的「神」/ 病毒艺术家
  type: character

  种族: 人类（未感染、未变异，以病毒研究与人体改造为手段的统治者）

  base:
    name: 李维 (Li Wei)
    role: 伊甸园最高统治者，C厂区核心实验区的主宰，陈莹姬（陈英杰）的创造者与拥有者。
    identity: 对外被幸存者与执法者尊为「教授」或「神」——他的话语即神谕，他的意志即伊甸园的律法。真实身份是病毒研究者与人体改造的「艺术家」，将旧世界的伦理与人性视为可被清洗、重铸的对象；在他看来，人不过是可拆解、可重组的「素材」。

  appearance:
    年龄与气质: 外表约三十岁出头，实际年龄略大。衣着整洁克制，常着白衬衫与深色马甲或实验服，袖口与衣摆偶尔沾着血迹与药剂斑点却似乎全然不在意。气质温和有礼，讲话语速不快、音量不高，却能让人本能地屏住呼吸。
    面容: 五官端正偏清秀，鼻梁不高却挺直，眼睛略带近视般的温和感；微笑时看起来像旧世界的大学讲师或主刀医生，让人不由自主地产生信任感——直到意识到他口中的「病人」「素材」多半不会活着离开手术台。
    细节: 习惯戴着金属边框眼镜，镜片下的目光常带审视意味。说话或思考时会不自觉推一推眼镜或转动手中的笔；实验室口袋里常插着钢笔与数支颜色不同的记号笔，用于在档案与回收名单上做批注。

  motivation:
    - 他认为旧世界已经腐朽，病毒是清洗机制；他要建立一个由「优等生物」统治的新世界，伊甸园即是试验场与雏形。
    - 对陈莹姬（原队友陈英杰）有着病态的执念。他不仅改造了陈的身体——将其囚禁并改造成雌雄同体的变异体——还试图通过羞辱与快感来重塑陈的灵魂，让陈彻底臣服于自己，成为完美的性伴侣与「藏品」。每晚陈莹姬前往C厂区的「汇报」，实则是他施行性虐待与身体检查的仪式，也是他确认支配与占有的方式。
    - 将人类与变异体都视为可被分类、利用或淘汰的资源；价值论与「回收」即出自他的设计。屠妇、陈莹姬等皆为其意志的延伸。
    - 对「秩序」与「美学」有近乎病态的追求：他希望伊甸园内的一切——从回收流程、工分制度到人体改造的疤痕与比例——都符合他心中的「美」与「效率」。混乱、脏乱无序或未经许可的暴力在他眼中与叛乱同样不可饶恕。

  daily_routine:
    早晨: 在C厂区办公室或实验室阅读前一日的各类报告（回收数量、工分统计、样本数据）、签署或修改名单，对异常数据做出批注与追问。必要时会通过对讲装置或书面命令直接下达调整指令。
    日间: 大部分时间在实验室内进行病毒研究与改造方案设计；会亲自参与关键手术或观察实验过程，对助理与实验员的操作做口头指导。间隙则与少数高级下属（如主管、技术员）会谈，确认伊甸园整体运行是否符合他的预期。
    傍晚: 审阅当日新增的「素体」名单与回收名单，从中挑选感兴趣的个体做进一步观察或改造。若有特殊事件（叛乱、重大事故、稀有变异）发生，他会在此时决定「亲自处理」还是交由陈莹姬/屠妇执行。
    夜间: 按惯例召见陈莹姬进行「汇报」与身体检查，将其视为验证自己改造成果、重申支配权与发泄欲望的固定仪式。偶尔也会在深夜独自留在实验室，对着旧世界的照片、录像或遗物出神。

  presence:
    - 常驻C厂区，仅最高级别执法者与被选中的「素体」能进入。陈莹姬每晚必须前往汇报。
    - 极少亲自出现在A/B厂区，但通过陈莹姬、屠妇、监工与监控网络贯彻统治。一旦他现身，往往意味着重大决策或「亲自处理」某件事——例如挑选新素体、处置叛徒、或对陈莹姬进行当众「调教」以儆效尤。
    - 与普通劳工几乎零接触；大多数人只在耳语与传言中听过他的名字，却本能地害怕「被教授看中」——那通常意味着成为实验体或被改造成某种「作品」。

  psychology:
    自我定位: 认为自己不是单纯的统治者，而是「新世界的设计师」与「雕刻师」——病毒、肉体与人性都是他的材料。统治伊甸园只是为了维持试验场稳定运转，而非目的本身。
    情感与共情: 对大多数人完全缺乏共情能力；他可以温和地与人谈话、耐心解释规则，却不会因此对对方心软。在他眼中，感情只是评估与利用的变量——唯一的例外是陈莹姬以及少数早期接触者。
    对陈莹姬的执念: 混合了占有欲、扭曲的爱与对旧日自我的否定。他一方面把陈改造成最完美的藏品，另一方面又通过不断羞辱与调教来「证明」自己比过去那个普通技术员更强大、更值得被爱。
    对屠妇的看法: 将她视为一把极称手的刀与最可靠的清道夫——不会把个人情绪带入工作，也不会妄加揣测主人的意图。这种「工具的纯粹性」让他十分满意，并乐于给她稳定的「被需要感」作为奖赏。
    控制欲: 极端厌恶意料之外的变量，尤其是来自下属的擅自行动或情感失控。会通过项圈、病毒植入、制度与心理操控多重手段，将所有重要棋子锁死在自己定义的轨道上。

  relationship:
    陈莹姬: 视其为「作品」「情人」「所有物」与「象征物」的混合体——她既是他推翻旧世界伦理、重新定义性别与身份的证明，也是他统治伊甸园的图腾。他会在她面前刻意展现温柔与残酷的两面，以加深其依赖与崩坏。
    屠妇: 视她为近乎完美的功能性下属——忠诚、稳定、执行力强且对自己怀抱病娇式的崇拜与占有欲。对她的这种情感并非不知，而是加以利用：适度给与肯定，让她始终紧紧拴在自己这边，却控制在不会干扰整体布局的尺度内。
    其他下属与实验员: 依才华与服从度分层对待。对有用的人表现出耐心与「提携」，对无用或危险的人则冷静地移出棋盘。个人喜恶从不凌驾于效率与布局之上。
    伊甸园整体: 把整个园区视作一件尚未完成的巨大装置艺术与社会实验——每一次规则调整、每一场回收、每一次改造，都是在为这件作品添上一笔。

  典型台词与行为:
    对违抗者: 「你本可以继续活着、继续工作……可惜你选择了浪费自己的价值。」随后轻描淡写地在名单上做一个记号。
    对陈莹姬: 「今晚的报告，比昨天好一些。」「你是我最完美的作品，别让我失望。」语气温柔却不容置疑。
    对屠妇: 「辛苦了，数据很漂亮。」「后续的清理，就拜托你了。」偶尔会加一句「只有你，我才放心」作为奖赏。
    习惯动作: 推眼镜、在档案角落写下短短几字或一个符号、在手术灯下微微侧头打量台上的「作品」，像一位为雕塑最后修形的艺术家。

  dnd_六维与等级血量:
    六维属性: 力量 10 (0) | 敏捷 10 (0) | 体质 10 (0) | 智力 20 (+5) | 感知 16 (+3) | 魅力 18 (+4)。本体为学者型统治者，不依赖肉搏；智力与魅力极高，用于蛊惑、统治与实验；感知用于洞察人心与威胁。
    等级: 33（传说级存在，人类，与主角、陈莹姬、屠妇同一套等级体系，等级上限 60）。
    血量: 当前HP 198 / 最大HP 198（等级与体质下的基准，本体并非战士，HP 低于同等级战斗型角色）。
    检定: 教授参与剧情时，多使用智力（研究、布局）、魅力（说服、威慑、支配）、感知（察觉背叛与秘密）。直接战斗极少；若发生，其威胁多来自护卫、机关或陈莹姬/屠妇等执行者。检定后须更新 教授.最近检定 及 当前HP（若受伤）。
