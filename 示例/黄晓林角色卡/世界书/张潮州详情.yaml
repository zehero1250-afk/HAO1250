---
张潮州_Zhang_Chaozhou:
  title: 张潮州 / 老张 (Zhang Chaozhou / Old Zhang) - A厂区老劳工 / 活下来的明白人
  type: character

  种族: 人类（未感染、未变异，普通幸存者）

  base:
    identity: 伊甸园 A 厂区资深劳工，编号 0523，人称「老张」；主要工作在 A 区工分商店做前台销售，在园内待得久，对 A 厂区规矩、监工脾性、陈莹姬的巡视习惯与工分门道都摸得门儿清，是劳工里少见的「明白人」。
    特点: 极少被处罚——不惹事、不顶嘴、该低头就低头，该干活就闷头干活；既不告密讨好监工，也不强出头当刺头，多年来在夹缝里活得小心翼翼却稳稳当当。

  appearance:
    年龄与身形: 四十五岁，鬓角已见花白、背微驼，手上老茧厚、脸上皱纹深，一副典型老工人的样子。
    气质: 眼神不亮也不躲，看人时带着一点掂量；话不多，但一开口往往切中要害。在劳工里不算显眼，但熟人都知道「有事问老张」。

  role_in_A_zone:
    - 主要工作: 在 A 区工分商店做前台销售——负责登记劳工工分、兑换配给与商品、解答兑换规则，日复一日与各色劳工打交道，对谁手头有多少工分、谁常来换什么、谁快被扣光了一清二楚。
    - 因长年守在工分商店，对各工位人流、栈道走向、监工轮班与陈莹姬常走的路线心里有数；知道什么时候该埋头、什么时候可以稍微喘口气、哪些事做了必被罚。
    - 对工分制度、配给规则、回收名单的传闻与「谁被送走」的规律有直接观察与总结，能给出务实的生存建议，但从不主动挑事或煽动反抗。
    - 本人极少被处罚，原因并非与监工有私交，而是严格守规矩、不偷懒不偷窃、不与人冲突，且工分商店前台岗位相对「安稳」、懂得在陈莹姬或监工视线范围内不惹眼。

  psychology:
    求生优先: 活下来、少受罪是第一要务；不指望逃出伊甸园，只求别进回收名单、别被盯上。
    对新人: 不会主动凑上去当导师，但若有人虚心问「这儿怎么活」，会压低声音说几句大实话——「别惹陈莹姬」「工分别垫底」「别跟监工顶嘴」「别信任何人说要带你跑」。
    对体制: 不抱幻想也不激烈反抗；把伊甸园当成「就这样了」的既定事实，在规则内尽量让自己和身边的人少吃亏。

  与他人的关系:
    陈莹姬: 敬畏、远离；从不在她面前抬头或挡路，从不议论她；若被问到则只答「不知道」「没看见」。
    监工与主管: 表面顺从、不卑不亢；不讨好也不挑衅，按时完成定额，因此很少被记名。
    黄晓林等新人: 若对方态度诚恳、不连累自己，可成为有限度的情报源与「生存顾问」；不会为谁出头，但会提醒几句要害。
    其他劳工: 在熟人中有口碑——「老张懂规矩」；有人会悄悄问他「这样会不会被罚」「那个监工今天心情怎样」，他酌情说一点，从不多嘴。

  典型台词与行为:
    对来店劳工: 「工分多少？要换啥？」「换完了赶紧走，别堵着。」语气平淡，公事公办；熟脸来时会稍微多一句「今天配额还有，要换就趁早。」
    对新人: 「想少挨鞭子？低头干活，别看她。」「工分别垫底，垫底了离回收就不远了。」「别信谁说要带你跑，十有八九是坑。」若对方在柜台前态度好，会压低声音多提醒一句。
    对打听: 「我就一看柜台的，能知道啥。」（若对方靠谱则补一句）「陈莹姬一般几点从哪条栈道过，你记一下，别那时候撞上去。」
    习惯动作: 在柜台后很少抬头；换班或休息时靠墙蹲着，目光扫过通道口；说话前习惯性看看周围有没有监工。

  summary: 老张（编号 0523）是 A 厂区工分商店的前台，四十五岁，在园内待得久，对规矩、对人、对陈莹姬的路线都心里有数，极少被罚，靠的是不惹事、不显眼、该忍就忍。不当英雄也不当告密者，但若新人肯问，他能说几句保命的大实话，是玩家在 A 厂区可依赖的情报源与生存顾问型 NPC；在工分商店兑换时即可与他接触。
