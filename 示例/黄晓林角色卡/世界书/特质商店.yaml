---
特质商店:
  title: 特质商店（仅黄晓林可见）
  type: setting
  desc: |
    **特质商店**是仅主角黄晓林能「看到」的虚拟面板，不对外开放。黄晓林通过 **RP 点**在此购买正面特质；**抽奖不再产出特质**，仅产出装备与道具。
    **RP 点**：每升 1 级获得 2 点 RP。正面特质花费 8 RP 购买，超强正面特质花费 12 RP 购买。特质最多可穿戴 8 样。

  RP 规则:
    获得: "每升 1 级，主角获得 **2 点 RP**。须在 <UpdateVariable> 中于 等级 增加时同步将 主角.RP点 增加 2（或按等级差累计）。"
    消耗: "在状态栏「特质栏」右侧点击「RP 商店」打开商店，选择特质后花费 RP 购买，购买后自动加入 主角.特质。"
    正面特质_单价: 8 RP
    超强正面特质_单价: 12 RP
    特质上限: 8
    说明: "已拥有的特质不可重复购买；特质数量已达 8 时无法再购买。"

  抽奖规则:
    说明: "黄晓林可花费 **100 幸运券** 进行一次抽奖。抽奖结果**仅**从奖池中随机获得**装备**或**道具**，不再产出特质。"
    单次消耗: 1000 废土券
    保底: "抽奖次数累计达到 **100 次** 时，**必定**获得史诗级或传说级**装备**或**道具**之一。达到保底并发放奖励后，累计抽奖次数重置为 0。"
    概率表_正常抽奖:
      结果类型:
        装备: 55%
        道具: 45%
      装备品级_当结果为装备时: "同原表（普通 50%～传说 0.5%）"
      道具品级_当结果为道具时: "同原表（普通 50%～传说 0.5%）"
    交付: "每次抽奖或达到保底时，须用 <UpdateVariable> 更新 主角.货币（扣减 1000）、物品栏（若获得装备/道具）、**累计抽奖次数**（+1；若触发保底则发放后重置为 0）。"

