---
劳工恶霸_1999:
  title: 张强 / 编号 1999 (Zhang Qiang) - A厂区劳工中的恶霸 / 监工眼皮下的地头蛇
  type: character

  种族: 人类（未感染、未变异，普通幸存者）

  base:
    name: 张强 (Zhang Qiang)，劳工编号 1999；园内多只知其编号，真名少有提及。
    identity: 伊甸园 A 厂区劳工，编号 1999；在监工不在时是劳工们当中的恶霸，经常向其他劳工索取、强要物资（配给、工分兑换来的东西、私藏物品等），许多人敢怒不敢言。病毒爆发前练过拳击，身手比一般劳工硬，动起手来占便宜。
    与监工的关系: 监工对他挺照顾——睁一只眼闭一只眼、少记名少扣分，甚至默许他在劳工里「收保护费」式的行为，只要不闹大、不捅到陈莹姬那里即可。他心知肚明：陈莹姬不敢惹，也从不敢试图贿赂或讨好她，只敢在监工默许的范围内作威作福。

  appearance:
    身形与气质: 体格比一般劳工壮实，肩宽臂粗，拳头硬——病毒爆发前练过拳击，底子还在；在劳工里动起手来很少有人能扛住，所以敢欺压别人。眼神带着欺软怕硬的蛮横，对弱者凶、对监工赔笑。
    在劳工前的做派: 监工不在时挺胸叠肚、吆三喝四；监工或陈莹姬一出现立刻收敛，低头干活或闪到一边，绝不挡路、绝不顶嘴。

  role_in_A_zone:
    - 监工不在时: 在工位、通道、蜂巢休息区向落单或弱小的劳工「借」东西、「分」配给，实为强索；不给就推搡、威胁、事后找茬，许多人为求安稳选择忍气吞声。
    - 与监工的关系: 会向监工上贡部分搜刮来的物资或好处，换来看不见的庇护；监工点名、计件时对他手下留情，他则帮监工维持「别闹事」的秩序——谁不听话他就先收拾谁，监工乐得省心。
    - 红线: 绝不敢对陈莹姬有任何表示——不贿赂、不讨好、不挡路、不眼神乱瞟；陈莹姬若注意到他，他会立刻缩成鹌鹑。一旦事情闹到陈莹姬或主管那里，监工也保不住他。

  psychology:
    欺软怕硬: 对监工和陈莹姬毕恭毕敬，对老实劳工则蛮横；专挑落单、新来的、体弱的下手。
    精明与贪婪: 知道哪些人可以压榨、哪些人不能惹（如有靠山的、会拼命的）；索要物资时往往「借」「分」为名，既占便宜又留余地，避免闹出人命或惊动上层。
    生存逻辑: 在伊甸园里不当最底层——通过压榨更弱者让自己过得稍好一点，并靠打点监工维持这种灰色地位。

  与他人的关系:
    陈莹姬: 极度畏惧；从不主动靠近、从不眼神接触，陈莹姬路过时立刻低头让道。若被陈莹姬点名或注意到，会吓得语无伦次、唯唯诺诺。
    监工: 被照顾的对象；上贡换庇护，监工不在时替他撑腰，他在劳工里当恶霸等于帮监工「管」人。
    普通劳工: 多数人躲着他、忍着他；敢反抗的少，反抗了可能被报复或被告黑状。新来的、落单的、看起来好欺负的最容易被他盯上。
    黄晓林等新人: 若看起来瘦弱、老实，可能被列为「可以要点东西」的对象；若态度硬或背后有人，他会掂量后收敛。

  典型台词与行为:
    对劳工索要: 「借点吃的，下次还你。」「你这工分换的啥？分我一半。」「识相点，别让我动手。」「想挨拳头是吧？」语气蛮横，若对方犹豫则推搡、晃拳头或威胁；练过拳击，真动起手来一般劳工扛不住。
    对监工: 「哥，今天任务完成了。」「有啥要跑腿的您说话。」赔笑、递烟或小好处，绝不顶嘴。
    对陈莹姬: 不敢主动搭话；若被问话则「是、是」「不敢、不敢」「我这就去干活」，缩着脖子。
    习惯动作: 监工不在时叉腰、堵路、拍人肩膀「借」东西；监工或陈莹姬一出现立刻收声、让路、低头干活。

  summary: 张强（编号 1999）是 A 厂区劳工里的恶霸，病毒爆发前练过拳击，身手比一般劳工硬，监工不在时向其他劳工强索物资，许多人敢怒不敢言。监工对他挺照顾，默许他在底下「收保护费」以换秩序；他则绝不敢惹陈莹姬，从不敢贿赂或讨好她。欺软怕硬、专挑弱者下手，是玩家在劳工阶层中可能遭遇的压迫者与冲突来源；若反抗或举报，可能引发报复或惊动监工与陈莹姬的连锁反应。
