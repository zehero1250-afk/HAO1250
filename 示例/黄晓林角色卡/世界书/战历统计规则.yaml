---
战历统计规则:
  title: 黄晓林战历统计面板
  type: setting
  desc: |
    **黄晓林战历统计**记录主角的杀敌、使用道具、任务完成、检定成功、说服 NPC 等行为次数，并据此提升对应「战历等级」（1～10 级）。每提升一级，**永久**增加相应六维属性一点（能力值上限 30）。所有战历等级最高 10 级。数据存于 主角.战历统计，须在相关剧情发生后用 <UpdateVariable> 更新。

  杀敌:
    杀敌数: "累计击杀或击败的敌人数量（含丧尸、变异种、人类敌对等）。每次剧情中主角击杀一名敌人时，对 主角.战历统计.杀敌数 +1。"
    杀敌等级: "1～10 级。每累计 **20 杀敌**，杀敌等级 +1。杀敌等级每 +1，**永久** 力量 +1、敏捷 +1（主角.能力值.力量、主角.能力值.敏捷，上限 30）。"
  使用道具:
    使用道具数: "累计使用道具次数（消耗品、药品、投掷等）。每次剧情中主角使用一次道具时，对 主角.战历统计.使用道具数 +1。"
    使用道具等级: "1～10 级。每累计 **20 次使用道具**，使用道具等级 +1。使用道具等级每 +1，**永久** 体质 +1（主角.能力值.体质，上限 30）。"
  任务完成:
    任务完成数: "累计完成的任务数量。每次剧情中主角完成一个任务（交付、达成目标等）时，对 主角.战历统计.任务完成数 +1。"
    任务完成等级: "1～10 级。每累计 **10 次任务完成**，任务完成等级 +1。任务完成等级每 +1，**永久** 智力 +1（主角.能力值.智力，上限 30）。"
  检定成功:
    检定成功次数: "累计 DnD 式检定（属性/技能）成功的次数。每次检定**成功**时，对 主角.战历统计.检定成功次数 +1。"
    检定等级: "1～10 级。每累计 **20 次检定成功**，检定等级 +1。检定等级每 +1，**永久** 感知 +1（主角.能力值.感知，上限 30）。"
  说服NPC:
    说服NPC次数: "累计成功说服 NPC 的次数（交涉、魅惑、威逼等达成目标）。每次剧情中主角成功说服一名 NPC 时，对 主角.战历统计.说服NPC次数 +1。"
    说服等级: "1～10 级。每累计 **10 次说服**，说服等级 +1。说服等级每 +1，**永久** 魅力 +1（主角.能力值.魅力，上限 30）。"

  交付:
    - "在 <UpdateVariable> 中根据剧情更新 主角.战历统计 的计数（杀敌数、使用道具数、任务完成数、检定成功次数、说服NPC次数）。"
    - "当某计数达到升级阈值时（杀敌/使用道具/检定 每 20，任务/说服 每 10），同步将该类 等级 +1（上限 10），并将对应 主角.能力值 的六维之一 +1（上限 30）。详见「变量更新规则」中 主角.战历统计 各字段的 check。"
