---
武器与装备数值规则:
  title: 武器与装备数值规则（按品级生成）
  type: setting
  desc: |
    当装备通过**特质商店抽奖**或**剧情掉落**获得时，若需由系统或前端按品级自动生成数值（伤害骰、攻击力、防御、可装备部位等），可参照本表。
    剧情中由 AI 发放装备时，必须按本表填写 主角.物品栏 中该装备的 伤害骰、攻击力、固定伤害、防御、可装备部位，以便状态栏正确展示。

  品级与武器数值_伤害骰与攻击:
    普通: "伤害骰 1d4；攻击力/固定伤害 0～1。"
    精品: "伤害骰 1d6；攻击力/固定伤害 1～3。"
    稀有: "伤害骰 1d8；攻击力/固定伤害 4～9。"
    神器: "伤害骰 2d8；攻击力/固定伤害 10～16。"
    史诗: "伤害骰 3d6；攻击力/固定伤害 17～24。"
    传说: "伤害骰 3d8+2；攻击力/固定伤害 25～32"
    说明: "武器类装备（主手/副手）使用上表；防具与饰物不填伤害骰与攻击力。"

  品级与防具数值_防御:
    普通: "防御 +0～+1。"
    精品: "防御 +2～+4。"
    稀有: "防御 +5～+8。"
    神器: "防御 +9～+14。"
    史诗: "防御 +15～+20。"
    传说: "防御 +21～+28。"
    说明: "防具类装备（头具、躯干、披挂等）使用上表；武器与饰物可填 0 或小幅防御。"

  可装备部位与类型对应:
    武器: "主手_MainHand、副手_OffHand，随机其一或由剧情指定。"
    防具: "头具_Head、颈饰_Neck、躯干_Body、披挂_Back、腰挂_Waist、护腕_Wrists、护手_Hands、护足_Feet，随机其一或由剧情指定。"
    饰物: "饰物一_Trinket1、饰物二_Trinket2，随机其一。"
    说明: "生成装备时可按类型（武器/防具/饰物）决定 可装备部位，与「装备栏位规则」中的栏位标识一致（Head、Neck、Body、Back、Waist、Wrists、Hands、Feet、Trinket1、Trinket2、MainHand、OffHand）。"

  描述与效果_按品级示例:
    普通: "废土常见的粗制装备，无明显加成。"
    精品: "做工尚可，比普通货色略结实或顺手。"
    稀有: "明显强化或带简单特效，在废土中已属难得。"
    神器: "强效或带唯一效果，足以影响战局。"
    史诗: "剧情级装备，改变战局或象征意义重大。"
    传说: "世界级唯一装备，全剧本罕见。"
    说明: "具体 描述 可由剧情细化；状态栏「打包带走」时若无描述可采本表示例或组合品级+类型生成。"

  与变量衔接:
    - "装备进入 主角.物品栏 时，须填写 描述、数量、品级；若为装备类须同时填写 可装备部位，以及 伤害骰/攻击力/固定伤害（武器）、防御（防具），见上表。"
    - "状态栏抽奖奖池「打包带走」时，前端按本表为装备生成上述数值并写入 物品栏。"
