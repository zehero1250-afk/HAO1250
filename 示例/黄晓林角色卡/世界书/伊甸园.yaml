---
伊甸园_Eden:
  title: 伊甸园 (Eden) - 绝望的废土乌托邦 / 扭曲的人类牧场
  type: location
  desc: |
    由「教授」建立的大型幸存者营地，位于 S 市郊区原大型工业园区内。对外宣称是人类最后的净土，拥有水电、食物与安全；
    对内则是等级森严、压榨人性的奴隶工厂。园区以围墙与岗哨与外界隔绝，内部按「蜂巢 → A 厂区 → B 厂区 → C 厂区」南北向分布，
    劳工从蜂巢经封闭通道进入 A 厂区上工，违规或「无价值」者被送往 B 厂区「回收」，核心实验与人体改造则在 C 厂区进行。

  人数与规模:
    说明: "以下为叙事参考的约略人数，可随剧情在合理区间内浮动；具体场景中不必每次都提及数字，用于保持规模感与权力结构一致。"
    蜂巢与A厂区_劳工与管理者:
      登记劳工: 约 1200～2000 人。蜂巢内以编号管理（如 9527），按工种分发电、分拣、装备制造等，每日经蜂巢通道进入 A 厂区上工。
      监工助手: 约 40～80 人。从劳工中选拔，负责点名、带队、计件与汇报，仍属劳工身份。
      监工: 约 30～50 人。直接听命于陈莹姬，负责日常秩序、定额与一般惩罚；可对劳工使用暴力。
      主管: 约 5～10 人。分管各工作区或班组，地位高于监工，工分与配给待遇更高。
      管理层_A区最高负责人: 陈莹姬 1 人，A 区管理者兼秩序处刑人，拥有对 A 厂区劳工与监工的生杀与调教权。
    B厂区:
      常驻劳力: 约 80～150 人。从事种植、养殖与屠宰等重体力劳动，多为从 A 厂区调入或从「回收」中暂时留下者。
      回收流动: 每日或每周有从 A 厂区（及少数 C 厂区）送入的「回收」名单，部分先作为劳力榨干，部分直接进入回收流程；总人数因「消耗」而波动，不固定。
      管理者: 屠妇 1 人，执掌 B 厂区生产与回收，另有其指定的少数助手或执行人员。
    C厂区_核心实验区:
      教授与核心人员: 教授本人及直属实验员、技术员约 10～25 人。
      安保与执法: 约 15～30 人，负责 C 厂区通道岗哨与内部秩序，仅高级执法者可与 A/B 厂区交接。
      被选素体与实验体: 数量不定，随实验需要流入与消耗；能离开 C 厂区的多为「成品」或不再需要的对象，部分会转送 B 厂区回收。
    园区边界:
      大门与围墙岗哨: 约 20～40 人，轮班值守，防止劳工逃脱与外部闯入；与外界交通严格管制。
    合计体感: 全园常驻约 1500～2500 人（含劳工、监工、主管、B 厂区劳力、C 厂区人员与岗哨），其中绝大多数为蜂巢与 A 厂区劳工，权力顶端为教授与陈莹姬、屠妇等极少数人。

  structure:
    A厂区_工业与劳作区:
      功能: 负责能源生产、物资回收和装备制造。劳工在此进行人力发电、废料分拣、装备组装等高强度劳动；工分商店设于集结点或休息区旁，可用工分兑换配给、药品、奢侈品与特殊服务。A 厂区另设「福利院」——劳工可花费工分在此与女劳工发生性关系，详见「A厂区福利院」。
      管理者: 陈莹姬 (Chen Yingji) —— A 区管理者兼「秩序处刑人」。
      氛围: 金属撞击声、鞭打声与惨叫声不绝于耳；空气中弥漫着机油、汗味与血腥味。栈道上陈莹姬的高跟鞋声由远及近，往往意味着有人要被带走。
    B厂区_农业与养殖区:
      功能: 种植变异作物，养殖肉用变异兽；同时是「回收」的执行地——被判定为无价值或严重违规者在此被「处理」，部分成为劳力，部分成为资源。
      管理者: 「屠妇」(The Butcher) —— 变异体女性，护士服血污斑驳，巨型杀猪刀与手术刀随身，对教授绝对忠诚。
    C厂区_核心实验区:
      功能: 教授私人领地，病毒研究、人体改造与「变异人」培育；仅最高级执法者与被选素体可入。
      管理者: 教授本人；进出由岗哨与通道严格管制。

  rules:
    - 绝对服从: 教授的话是神谕，违者依情节处罚直至回收。
    - 价值论: 无劳动价值者送往 B 厂区「回收」；有用则榨干劳动，无用则成为资源。
    
