---
蜂巢_The_Hive:
  title: 蜂巢 (The Hive) - A厂区劳工集中营
  type: location
  desc: 由原工业园区的集装箱堆场改造而成的巨型居住区。数千个集装箱被层层堆叠，形成如同蜂巢般压抑的立体贫民窟。

  structure:
    居住单元: 每个标准集装箱（20尺）被改装成容纳8-10人的混住宿舍。内部只有简陋的双层铁架床，没有隔断，隐私为零。空气中永远弥漫着汗臭、霉味和机油味。
    公共设施: 每层设有一个公共澡堂和厕所，完全开放式设计，没有门板。这是为了防止劳工在里面搞小动作（或自杀），同时也方便执法者随时「检查」。
    监控网: 每个单元内部和走廊都布满了摄像头和拾音器。任何关于「逃跑」或「反抗」的言论都会被AI识别，随后便是陈莹姬的高跟鞋声在门口响起。

  living_conditions:
    资源配给: 水电限时供应（每天仅1小时）。食物是B厂区生产的合成蛋白块（味道像嚼蜡，但能维持高强度劳动所需的能量）。
    性压抑: 严禁男女混住（除非有特殊批准），且严禁私自性行为。这种极端的压抑导致宿舍区内弥漫着一种躁动不安的氛围，地下色情交易（如用工分换取偷看异性洗澡的机会）屡禁不止。
