---
生理监控特殊特质规则:
  title: 生理监控与特殊特质
  type: setting
  desc: |
    **生理监控**记录口舌、肉棒、后穴、乳头、高潮、受虐六项次数，存于 主角.生理统计。每 **10 次** 对应 **1 级**（该类别等级 = floor(次数/10)，最高 10 级）。每达到 **2、4、6、8、10 级** 时，该类别获得对应等级的特殊特质；须同步将 主角.特殊特质 设为长度 6 的数组，依次对应六类当前等级所获得的特质名（见变量更新规则「生理统计」「特殊特质」）。

  口舌:
    Lv.2: "高效摄入：吞咽动作更加顺畅。使用口服类恢复道具（如药丸、药剂、只要是恢复类的）时，恢复效果翻倍。"
    Lv.4: "味觉钝化：免疫一切口服药物带来的负面苦味或恶心惩罚。服用带有副作用的增强剂时，豁免检定具有优势。"
    Lv.6: "唾液合成：你的唾液能中和毒素。吞咽毒素后可进行一次体质检定，成功则将其转化为 5 点临时生命值。"
    Lv.8: "深度泵动：吞咽动作能产生极强快感。每次使用恢复道具时，额外回复 1d10 点理智值。"
    Lv.10: "完美消化：每日一次，服用药物后可选择不消耗该道具。"
  肉棒:
    Lv.2: "欲望导管：互动时可以从对方身上「偷取」少量体力。每次互动恢复 1d4 点 HP。"
    Lv.4: "服从印记：每当该部位被主角折磨或使用，你对主角的指令服从度（DC）自动降低。"
    Lv.6: "高频泵送：互动的效率大幅提升。原本需要 1 小时的劳作/服侍，现在只需 30 分钟即可达成同等效果。"
    Lv.8: "能量回馈：喷发时，可将自身的一半剩余体力传输给主角。"
    Lv.10: "完美容器：身体能完美适应任何要求。互动时，双方的疲劳度不再上升。"
  后穴:
    Lv.2: "根基稳固：下盘力量增强。对抗「倒地」或「击退」的检定获得 +2 奖励。"
    Lv.4: "深度储存：肠道空间异化。你可以在体内隐藏最多两个小型道具（如钥匙、匕首），且无法被常规搜身发现。"
    Lv.6: "内循环：长时间劳作或行军时，耐力消耗减半。进入「精疲力竭」状态的阈值提高。"
    Lv.8: "第二心脏：受到致命伤时，该部位的肌肉剧烈收缩保护内脏。你的死亡救助豁免（Death Save）具有优势。"
    Lv.10: "无尽容纳：物理耐力达到极限。你的最大体力上限（Stamina/HP）永久增加 20%。"
  乳头:
    Lv.2: "敏感天线：感知（感知）属性中的被动察觉（Passive Perception）+3。"
    Lv.4: "激素平衡：即使处于极度恐惧的环境下，通过刺激该部位，你的理智检定（Sanity Check）获得 +2 奖励。"
    Lv.6: "危险直觉：不会被突袭。当有敌人潜行靠近时，你的身体会先一步产生应激反应。"
    Lv.8: "精神反哺：受到精神攻击时，你可以通过物理痛觉抵消精神伤害，将受到的智力/感知伤害减半。"
    Lv.10: "双子连接：只要该部位受到持续刺激，你可以与队友共享视野，并免疫一切「魅惑」效果。"
  高潮:
    Lv.2: "余韵爆发：高潮后的 10 分钟内，你的所有伤害加值获得 +2 奖励。"
    Lv.4: "多重反馈：连续高潮不再带来虚弱。每连续高潮一次，下一轮的命中投骰获得 +1（可叠加）。"
    Lv.6: "极乐战栗：巅峰时刻可立刻重置一个冷却中的动作或技能（每长休一次）。"
    Lv.8: "喷射动力：高潮瞬间爆发的能量使你的移动速度翻倍，持续 1 个回合。"
    Lv.10: "灵魂震荡：你的高潮能产生一股心灵冲击，令 10 尺内敌人必须通过 DC 15 感知豁免，否则陷入「惊惧」状态。"
  受虐:
    Lv.2: "厚实表皮：AC 获得 +1 常驻加值。"
    Lv.4: "痛苦麻痹：受到伤害时，若伤害值低于 10 点，则视为 0 点（仅限非魔法攻击）。"
    Lv.6: "伤痕护甲：AC 再获得 +1 加值。身上每有一处永久性伤疤（或烙印），AC 额外 +1（最高叠加至 +2）。"
    Lv.8: "反击律动：当敌人对你的攻击未命中时，你可以利用身体的反射震荡使对方的力量检定具有劣势。"
    Lv.10: "终极受体：AC 获得 +2 加值。受到暴击时，可将其转化为普通伤害。"

  特殊特质名与下标对应:
    - "主角.特殊特质[0]=口舌当前等级特质名（Lv.2 高效摄入 / Lv.4 味觉钝化 / Lv.6 唾液合成 / Lv.8 深度泵动 / Lv.10 完美消化）"
    - "主角.特殊特质[1]=肉棒（Lv.2 欲望导管 / Lv.4 服从印记 / Lv.6 高频泵送 / Lv.8 能量回馈 / Lv.10 完美容器）"
    - "主角.特殊特质[2]=后穴（Lv.2 根基稳固 / Lv.4 深度储存 / Lv.6 内循环 / Lv.8 第二心脏 / Lv.10 无尽容纳）"
    - "主角.特殊特质[3]=乳头（Lv.2 敏感天线 / Lv.4 激素平衡 / Lv.6 危险直觉 / Lv.8 精神反哺 / Lv.10 双子连接）"
    - "主角.特殊特质[4]=高潮（Lv.2 余韵爆发 / Lv.4 多重反馈 / Lv.6 极乐战栗 / Lv.8 喷射动力 / Lv.10 灵魂震荡）"
    - "主角.特殊特质[5]=受虐（Lv.2 厚实表皮 / Lv.4 痛苦麻痹 / Lv.6 伤痕护甲 / Lv.8 反击律动 / Lv.10 终极受体）"
