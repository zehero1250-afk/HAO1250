# yaml-language-server: $schema=../schema.json
# 黄晓林 - 误入歧途的「羔羊」| 伊甸园劳工 | DnD 式玩法初始变量
世界:
  当前时间: 进园第一天 傍晚
  当前地点: 伊甸园 A厂区 维修组工棚
  entrance:
    海报诱惑: 黄晓林在学校周围的废墟探索时，看到了一张伊甸园的宣传海报：「水电全供！美女如云！人类最后的乐园！」（海报上的形象代言人正是穿着暴露警服的陈莹姬）。
  status_in_Eden:
    编号: 9527
    分配: A厂区维修组
    幻灭: 进园第一天就被没收了所有私人物品。他看到了所谓的「乐园」真相——人们像牲口一样劳作，稍微停下就会被监工鞭打。而他心心念念的「女警姐姐」，竟然是这里最恐怖的恶魔。
  势力信息:
    - 名称: 伊甸园
      领袖: 教授
      人数: 大型营地（工业园区，具体人数未公开）
      背景: 由「教授」建立的大型幸存者营地，位于S市北郊东侧工业园区。对外宣称人类最后净土，对内为等级森严、压榨人性的奴隶工厂。
      地点: 北郊东侧，大型工业园区内
      近期活动: ''
    - 名称: 方舟
      领袖: 林婉（议事会主席）；程刚（护民官）
      人数: 约1200～2000人
      背景: 占据主城东岸 reclaimed 区的幸存者政权，与伊甸园势均力敌。以劳换食、不奴役人，公开收容从伊甸园逃出的劳工，与教授治下伊甸园长期对峙。
      地点: 主城东岸原 CBD 核心区
      近期活动: ''
    - 名称: 铁腕
      领袖: 赵志国（指挥官，原S市某区武警中队长）
      人数: 约200～400人
      背景: 原S市武警、特警及驻军残部重组，东郊据点。以恢复秩序、清剿尸潮为口号，与伊甸园、商盟既有摩擦又有临时交易。
      地点: 东郊，原军营或加固厂区
      近期活动: ''
    - 名称: 上帝教
      领袖: 上帝之子（R市本部）；S市由传教使统领
      人数: R市本部数千级；S市小据点与流动传教队每处数十人
      背景: 以R市为根据地的宗教政权，信奉「病毒是上帝对人类的洗礼」。S市西郊及主城西岸设小据点与布道点，与伊甸园等时有摩擦。
      地点: R市本部；S市西郊与主城西岸据点
      近期活动: ''
    - 名称: 渡口商盟
      领袖: 老金（金满堂，盟主）
      人数: 约150～300人
      背景: 南郊主码头与河海转运为核心，码头工人、船主、走私贩与商人组成。粮食、药品、武器、情报、人口均可买卖，立场中立偏利己。
      地点: 南郊滨海主码头及相邻仓库区
      近期活动: ''
    - 名称: 圣烛
      领袖: 烛座苏嬷嬷（苏静修）
      人数: 约30～50人
      背景: 小型宗教聚落，信奉「病毒为神罚、赎罪者得存」。不主动扩张，对伊甸园等持敌视态度。
      地点: 西郊或北郊边缘（教堂/学校）
      近期活动: ''
    - 名称: 断链
      领袖: 链头阿断
      人数: 约20～40人
      背景: 专门袭击伊甸园外出小队、劫持补给或解救劳工的小股武装，行踪不定，与残军、商盟有接触但不从属。
      地点: 北郊与东郊交界、伊甸园外围要道附近
      近期活动: ''
    - 名称: 末世古惑仔
      领袖: 坐馆崩牙雄（陈志雄）
      人数: 约40～60人
      背景: 主城西岸街头帮派，讲字头论辈分守地盘，收保护费、替黑市跑腿、偶有劫掠。不惹大势力，专吃西岸边缘与拾荒者油水。
      地点: 主城西岸老城街巷与地下车库
      近期活动: ''
    - 名称: 拾荒者聚落
      领袖: 无总舵主，各帮有话事人
      人数: 多股小团体，流动性大
      背景: 西郊与主城废墟边缘搜刮废墟、倒卖零碎物资，与黑市、商盟有松散联系，常为商盟或残军做向导。
      地点: 西郊棚户、主城西岸废墟边缘、地铁入口等
      近期活动: ''
    - 名称: 西岸黑市
      领袖: 大中间人共治（疤叔、阿凤、老拐等）
      人数: 交易网络，无固定总部
      背景: 西岸老城地下与废墟中的交易网络，情报、药品、武器、违禁品、人口均可经中间人交易。
      地点: 主城西岸地下停车场、防空洞、废弃商场地下室
      近期活动: ''
