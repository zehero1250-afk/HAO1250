---
战斗规则:
  title: 战斗规则（废土末世·DnD 式）
  type: mechanics
  desc: |
    本角色卡战斗采用**回合制**，命中与伤害依骰子与公式结算；与「敌人生成规则」「DnD规则_60级」「DnD检定说明」衔接。
    回合是结算单位，一轮内须完成所有应执行动作后再推进叙事；伤势描写须锚定当前 HP 百分比。

  执行优先级:
    - 回合铁律 > 数值结算规则 > 单位行为倾向 > 叙事表现
    - 规则冲突时按上列优先级执行。

  原则:
    - "每个攻击动作固定消耗：1 颗 D20（命中检定）+ x 颗 dy（伤害骰，x 由 xdy 决定，见「敌人生成规则」Step3/Step4）。"
    - "每个动作独立判定、独立结算；须输出该动作的检定与伤害结果（如 d20 结果、命中档位、xdy 骰表与最终伤害）。"
    - "禁止将单个技能拆成多次判定；AOE 不论命中几人，只算一次命中检定与一次伤害骰。"
    - "属性修正 = floor((能力值 - 10) / 2)；命中检定使用力量或敏捷（近战/投掷用力量，远程/敏捷型武器用敏捷）+ 熟练加值（见「DnD规则_60级」）。"

  检定分流:
    - "攻击行为（武器/技能攻击）→ 走 战斗检定（命中 + 伤害）。"
    - "其他结果不确定行为（躲闪、挣脱、抵抗等）→ 走 属性检定（d20 + 属性修正 vs DC），见「DnD检定说明」。"
    - "同一动作不得同时走两种检定。"

  战斗检定_玩家攻击:
    每轮动作数: "玩家每轮默认 2 个独立攻击动作；若剧情或玩家明确声明只做 1 次或 3 次，则按声明（1～3）。"
    动作选择: "未指定时，优先攻击当前威胁最高目标（高伤/高控/可击杀）；若并列则优先最近目标。"
    连击命中减值:
      第1个动作: "攻击检定无减值"
      第2个动作: "攻击检定 -3"
      第3个动作: "攻击检定 -6"
      注: "减值只作用于攻击检定值，不改变目标 AC。"
    单动作流程:
      - "1. 读取本动作目标的 AC（见下「AC 与命中」）。"
      - "2. 掷 1 颗 D20，攻击检定值 = D20 + 属性修正（力量或敏捷）+ 熟练加值 + 连击修正。"
      - "3. 对照命中判定表得到命中倍率。"
      - "4. 若命中倍率大于 0，执行伤害结算；否则本击伤害为 0。"
      - "5. 输出本动作的检定与伤害（含伤害骰原式与每颗骰结果，如 2d8=[5,3]）。"
      - "6. 若本动作为擦边或落空，玩家回合立即结束，跳过本轮剩余动作。"
    主角伤害公式:
      - "主角基本攻击力由当前武器/设定决定，建议与「DnD规则_60级」战斗节奏一致：基本攻击力 = 等级系数 × 伤害骰点 + 固定伤害；最终伤害 = 基本攻击力 × 技能倍率 × 命中倍率。"
      - "伤害骰 xdy：掷 x 颗 dy，颗数必须等于 x；伤害骰点数 = 各骰结果之和；等级系数只参与基本攻击力计算，不参与掷骰颗数；禁止将「等级系数×1dY」写成「等级系数dY」。"

  AC与命中:
    目标AC: "敌人 AC 由剧情或敌人生成约定（通常可设为 10 + 敏捷修正，或按阶级/等级给固定值，如杂兵 10～12、精锐 13～15、首领 16+）。主角 AC 同理（10 + 敏捷修正 + 护甲加值若有）。"
    命中判定表_说明: "以 攻击检定值 与 目标 AC 比较，得到命中档位与倍率。"
    命中判定表:
      暴击: "检定值 ≥ AC + 10 → 命中倍率 1.5（或 2.0，由剧情约定）。"
      命中: "AC ≤ 检定值 < AC + 10 → 命中倍率 1.0。"
      勉强: "AC - 5 ≤ 检定值 < AC → 命中倍率 0.5；连招不中断。"
      擦边: "AC - 8 ≤ 检定值 < AC - 5 → 命中倍率 0.2；玩家回合结束。"
      落空: "检定值 < AC - 8 → 命中倍率 0；玩家回合结束。"
    命中判定表_注: "自然 20 可约定为自动命中或暴击，由剧情统一；若不采用则仅按上表。"

  伤害结算_通用:
    - "属性修正只影响命中检定，不直接加进伤害。"
    - "倍率统一用小数（如 150% = 1.5）。"
    - "计算顺序：最终伤害 = 基本攻击力 × 技能倍率 × 命中倍率 × (1 + 额外倍率之和)；结果向下取整。"
    - "先扣临时生命值（若有），再扣当前 HP；扣血后更新 主角.当前HP 或敌人 HP。"

  敌人攻击玩家:
    - "每名敌人每轮默认 1 个攻击动作（特殊机制可例外）；敌人不受玩家连击减值。"
    - "敌人命中：掷 D20，检定值 = D20 + 敌人属性修正（见敌人生成或设定），对照命中判定表得命中倍率。"
    - "敌人伤害：按「敌人生成规则」Step4，基本攻击力 = 等级系数 × 伤害骰点 + 固定伤害；预伤害 = 基本攻击力 × 技能倍率 × 命中倍率。"
    - "主角承伤：若设定物理/魔法减伤，实际伤害 = 预伤害 × (1 - 减伤率)；未设定则全额承伤。"
    - "敌人动作也须独立结算并写出检定与伤害结果，不得只写玩家行动就结束回合。"

  回合铁律:
    结算层:
      - "一轮 = 所有存活单位完成其应执行动作的结算单位；不要求严格「玩家→敌人」串行，但同一轮内必须结算完。"
      - "严禁只写玩家行动就结束回复；敌人行动同样消耗骰子、走命中+伤害流程并写出结果。"
    演出层:
      - "演出顺序可交错（如玩家第 1 击→敌人抢攻→玩家第 2 击），以战斗流畅为准；敌我双方都可反击、打断、抢攻，但每动作仍须独立结算。"

  HP叙事:
    铁律: "伤势描写锚定当前 HP 百分比；敌人 HP 归零或明确投降/溃散前，禁止自动结束战斗。"
    HP阈值与表现:
      健康_90以上: "皮外伤，行动基本无碍。"
      轻伤_40至89: "明显受伤但不显著降低战斗能力。"
      受创_25至39: "伤势拖累动作，策略趋于保守。"
      重伤_10至24: "站立困难，大量失血。"
      濒死_10以下: "丧失战斗力，倒地挣扎。"
    禁止: "HP 大于 40% 时不得描写重伤或濒死；HP 大于 90% 时不得描写明显行动受限（强控类状态除外）。"

  敌人行为倾向:
    "由剧情或敌人生成约定，可选用：狂热（持续进攻，濒死可殊死一搏）、冷静（劣势时有序撤退）、怯懦（HP 小于 60% 优先撤离，被围可投降）、狡诈（诱敌/诈降/偷袭，优先落单目标）。"

  属性检定_非攻击:
    "躲闪、挣脱、抵抗、战术抉择等：确认相关属性与 DC，掷 D20，检定值 = D20 + 属性修正 + 熟练加值（若适用）+ 其他修正；检定值 ≥ DC 成功，否则失败。输出检定结果并推进叙事；失败后果如实呈现。DC 参考「DnD检定说明」（如 10/12/15/18）。"

  变量更新:
    "战斗结束后或每轮中受伤时，须用 UpdateVariable 更新 主角.当前HP（及 主角.最近检定 若做了检定）；若击败敌人，按「经验与掉落规则」更新 主角.经验值、物品栏 等。若陈莹姬/屠妇/教授参与战斗，同步更新其 当前HP、最近检定。"
