---
经验与掉落规则:
  title: 经验系统与掉落品级规则（DnD 式）
  desc: 击败敌人、丧尸、变异种等可获得经验值，并有机会获得掉落装备/道具；敌人按等级与层级分类，决定经验值与掉落品级。

  敌人层级分类与术语对应:
    说明: 本表与「敌人生成规则」的阶级对应——敌人生成用 杂兵/精锐/首领/领主/传奇（5档），本表用 杂兵/精英/首领/领主/传说（5档）。**精英=精锐、传说=传奇**，经验与掉落按下列层级计。
    杂兵: 最底层敌人，常成群出现，单体威胁低。如普通丧尸、落单变异鼠、伊甸园监工助手、虚弱跑尸。
    精英_同精锐: 较强个体或小头目，需一定策略或资源才能击败。如变异巨狗、强化丧尸、监工、B厂区常驻变异兽。
    首领: 区域或关卡级强敌，通常有独特机制或高血量。如陈莹姬（若与主角为敌）、屠妇、变异巢穴主、教授直属护卫。
    领主: 章节高潮级 BOSS，单独出现。如巨型变异体、区域霸主。经验与掉落介于首领与传说之间。
    传说_同传奇: 世界级或剧情终战级存在，极其罕见。如教授本人、完全体变异体、伊甸园核心守卫。

  敌人种类示例:
    丧尸_跑尸: 行动迟缓或奔跑型丧尸，多为杂兵，偶有精英。
    变异种: 变异兽、变异人、改造体等，从杂兵到首领均有。
    人类敌人: 监工、执法者、叛逃者、其他幸存者营地敌对者。
    变异兽: 变异巨狗、变异猪、地下巢穴生物等，B厂区与下水道常见。

  敌人等级:
    - 敌人拥有等级（1–60），与主角/NPC 同一套等级体系，等级上限 60。用于估算强度与经验/掉落。
    - 等级越高，经验值与掉落品级基准越高。同层级下，高等级敌人给更多经验、更高概率掉高品级。

  经验值表_击败后获得:
    与DnD经验线的关系: 主角.经验值为**累计经验**；升级线由「DnD规则_60级」定义（每级所需 = 100 × 当前等级，累计到 60 级约 177000）。下表经验量已按**与 1–20 级相当的升级节奏**设计：每级大致需 5–10 场杂兵级遭遇或 2–4 场精英级遭遇即可升级，避免 60 级体系下升级过慢。
    公式说明: 基础经验 = 等级 × 层级系数；层级系数见下。剧情中可微调（如以少胜多、首杀加成）。敌人等级 1–60。
    杂兵: 等级 × 10（例：L1=10，L6=60，L30=300，L60=600）
    精英_精锐: 等级 × 30（例：L1=30，L6=180，L30=900，L60=1800）
    首领: 等级 × 60（例：L6=360，L20=1200，L40=2400，L60=3600）
    领主: 等级 × 100（例：L20=2000，L40=4000，L60=6000；介于首领与传说之间）
    传说_传奇: 等级 × 160（例：L15=2400，L40=6400，L60=9600）
    交付方式: 击败敌人后，在本次回复末尾用 <UpdateVariable> 对 主角.经验值 做 delta 增加对应数值；若累计经验达到「DnD规则_60级」中该等级的升级线，则更新 主角.等级 与 主角.最大HP、主角.熟练加值。

  额外经验获取方式:
    说明: 除击败敌人外，以下行为也可获得经验值，同样用 delta 更新 主角.经验值；数值与击败经验同调，保持与 1–20 级相当的升级节奏。下表为参考区间，可由剧情与难度微调。
    探索新地点:
      - 首次进入此前未到过的地点或区域时，可获得探索经验。
      - 参考: 小区域（如单间、岔路、隐蔽角落）20~60；中型区域（如蜂巢某层、厂区某车间）60~160；重要地点（如B厂区抛尸点、C厂区入口、外界废墟据点）160~300；关键地标（如伊甸园核心、外界安全区）300~600。
      - 同一地点仅首次探索计经验，重复经过不计。
    完成任务:
      - 完成主线、支线、委托或每日类任务后，根据任务难度与重要性给予经验。
      - 参考: 简单/跑腿类 30~80；一般支线或情报任务 80~200；重要支线或阶段性主线 200~400；关键主线节点或终章任务 400~1000。
      - 任务失败或放弃不计；部分完成可酌情给少量经验（如 10~40）。
    其他可计经验行为_参考:
      - 发现重要情报或秘密（如教授身份、伊甸园真相）：100~300。
      - 成功说服或拯救关键 NPC、化解危机：60~200。
      - 破解机关、打开封锁、修复关键设施：40~160。
      - 达成剧情里程碑（如逃出某区、与某势力结盟）：200~600。
      - 首次击杀某类敌人、首次使用某机制等「成就」类，可给小额奖励 10~50。
    交付方式: 与击败敌人相同，在对应剧情发生时的回复末尾用 <UpdateVariable> 对 主角.经验值 做 delta 增加，必要时同步检查升级线并更新 主角.等级 与 主角.最大HP。

  装备与道具品级_六档:
    普通: 白板装备与消耗品，无特殊效果。杂兵常掉，精英小概率。
    精品: 略优于普通，轻微加成或耐久。精英常掉，杂兵低概率，首领小概率掉更高。
    稀有: 明显强化或特殊效果。首领与精英概率掉，杂兵极低概率。
    神器: 强效或唯一效果。首领与传说概率掉，精英极低概率。
    史诗: 剧情级装备，改变战局。传说与少数首领掉。
    传说: 世界级唯一装备，全剧本罕见。仅传说级敌人或特殊剧情获得。

  掉落品级与敌人层级_对应关系:
    杂兵: 多数掉 普通，低概率 精品（高等级杂兵略提概率）。
    精英_精锐: 多为 普通~精品，一定概率 稀有，极低概率 神器。
    首领: 多为 精品~稀有，高概率 神器，一定概率 史诗。
    领主: 多为 精品~稀有，高概率 神器~史诗，一定概率 传说。
    传说_传奇: 至少 稀有，高概率 神器~史诗，可能 传说。
    说明: 具体掉落物名称与描述由剧情决定，获得时在 主角.物品栏 中 insert 新物品，并填写 描述、数量、品级（若为装备/道具则必填品级）。

  升级与经验线_参考:
    - 等级上限 60。经验线可采用 每级所需 = 100 × 当前等级（1→2 需 100，2→3 需 200，…，59→60 需 5900）；累计到 60 级约需 177000 经验。也可采用更平缓或更陡的曲线，由剧情与节奏自定。详见「DnD规则_60级」。
    - "**升级判定**：主角.经验值为累计值。当前等级为 L 时，若 主角.经验值 ≥ 100×(1+2+…+L) = **50×L×(L+1)**，则应将 等级 设为 L+1 并更新 主角.最大HP、主角.熟练加值；若经验值足够可**连续判定**直至不达标（例如一次获得大量经验可连升多级）。"
    - 升级时更新 主角.等级，并按规定增加 主角.最大HP、主角.熟练加值（见「DnD规则_60级」）。
