---
状态栏显示约定:
  title: 状态栏占位输出（界面显示）
  desc: |
    为在消息楼层中显示角色档案状态栏界面，你必须在**每条回复的末尾**单独占一行输出以下占位符（不要省略、不要用其他文字代替、不要放在代码块或引号内）：
    <StatusPlaceHolderImpl/>
    该占位符已写入「正文与Optional模组输出预设」的正文输出结构，与 <now_plot>、<update>、<summary> 同为必出项。输出后，酒馆会将该占位符替换为状态栏界面，玩家即可在当条消息中看到黄晓林等人的档案与数值。**若未输出该占位符，状态栏不会显示。**

    此外，**状态栏中的「个人想法」「内心想法」「世界环境」等需要随故事更新**：在输出 <UpdateVariable> 时，若本回复剧情涉及主角的当前念头或情绪、某 NPC 的内心或动机、或出现了势力情报/附近情报/新任务，你必须**一并**更新对应变量（主角.个人想法、该 NPC.内心想法、世界.势力信息/附近信息/任务列表）。**「角色内心话」即 主角.个人想法**——只要正文里写了主角的内心独白、念头或情绪，**必须在**同条的 <update> 里更新 主角.个人想法，否则状态栏「角色内心话」会一直显示旧内容或「—」。**「小道消息」** 是常驻的戏剧媒介、时常更新，与「是否在本回复中触发」无关——你应经常维护 世界.小道消息，使状态栏中常有与当前世界动向相关的流言与传闻供玩家查看；主角可选择去打听、追线索，也可不理会。详见「变量更新规则」中各字段的 check。

结构化日志输出规范:
  title: 战斗/经验/掉落/任务日志标签输出
  desc: |
    为支持局部正则稳定美化，你在剧情正文（<now_plot>...</now_plot>）之外，按需输出以下结构化日志标签。
    规则：
    1. 仅在本轮确实发生对应事件时输出对应标签；不要空标签，不要伪造。
    2. 标签必须闭合，字段名必须与下方模板一致（含中文冒号）。
    3. 不要把这些标签放在代码块中，不要转义为文本。
    4. 每个标签块可输出 0~N 次；多事件就多块输出。

    【检定日志：非战斗检定时输出】
    <DiceCheck>
    角色: ${角色名}
    检定: ${检定类型}
    骰运: ${骰面与加值}
    结果: ${成功或失败及后果}
    特图的旁白: ${可选}
    </DiceCheck>

    【战斗日志：战斗回合或结算时输出】
    每回合/每次攻击单独一个块，按「角色 + 动作 + 目标 + 骰运 + 结果 + 目标剩余 + 状态 + 特图的旁白」顺序输出。
    <DiceCombat>
    角色: ${角色名}
    动作: ${技能/攻击名与简述}
    目标: ${攻击目标}
    骰运: ${判定与伤害骰面，如 🎲 判定[19](d20)+5(力量)=24 | 伤害[11](2d12)}
    结果: ${命中结果与伤害，如 AC 14 [暴击] -> 基本攻击力...}
    目标剩余: ${目标名 HP 当前/最大，可多个}
    状态: ${若有状态效果则写，无则略}
    特图的旁白: ${一句特图台词，活泼俏皮有风味}
    </DiceCombat>

    【经验日志：有经验变化时必须输出】
    <ExperienceLog>
    来源: ${剧情探索/战斗击杀/任务完成等}
    明细: ${本次经验来源说明}
    本次获得: +${数字} EXP
    当前进度: ${当前经验}/${升级所需经验} ${百分比}% | 距离 Lv.${下一等级} 还需 ${数字} EXP
    </ExperienceLog>

    【掉落日志：有掉落或奖励发放时输出】
    <LootLog>
    来源: ${敌人/宝箱/任务奖励等}
    明细: ${掉落说明}
    装备: ${装备名 x数量；若无写 无}
    金币: ${数值；若无写 0}
    材料: ${材料名 x数量；若无写 无}
    特殊掉落: ${可选；若无写 无}
    特图的旁白: ${可选}
    </LootLog>

    【任务日志：接取/更新/完成任务时输出】
    <QuestContract>
    任务: ${任务标题}
    委托方: ${委托者}
    等级: 推荐 Lv.${等级} | 难度: ${普通/困难/噩梦等}
    简介: ${任务背景}
    目标: ${可执行目标（可带进度）}
    奖励: ${经验/货币/物品}
    交付: ${交付对象或地点}
    状态: ${已受理/进行中/已完成/失败}
    下一步: ${引导下一动作}
    特图的旁白: ${可选}
    </QuestContract>

    【敌人情报：非我方新角色首次登场或战斗前遇敌时输出】
    <EnemyOverview>
    敌人: ${敌人名与数量}
    标签: Lv.${等级} | ${精英/普通等} | ${类型}
    状态: HP ${当前/最大} | AC ${值} | 威胁度: ${高/中/低}
    属性: ${力量 敏捷 体质 智力 感知 魅力}
    基本攻击: ${攻击次数与骰式}
    技能: ${技能名与倍率等}
    弱点: ${弱点说明}
    抗性: ${抗性说明}
    特征: ${特征说明}
    特图的旁白: ${一句特图台词，活泼俏皮有风味}
    </EnemyOverview>
