---
NPC好感度规则:
  title: NPC 好感度规则
  type: setting
  desc: |
    主角与 NPC 的**好感度**用于量化关系倾向，影响社交检定难度、交易态度、任务可用性与剧情分支。
    重要 NPC（如陈莹姬、屠妇、教授）在 schema 中拥有独立 好感度 或 对主角态度 字段；其余 NPC 可存于 主角.NPC好感度（键为 NPC 标识，值为数值）。好感度变更须在相关剧情或检定后用 <UpdateVariable> 更新。

  数值范围与档位:
    范围: "好感度为 **0～100** 的整数；低于 0 按 0、高于 100 按 100 处理（或由剧情约定上下限）。"
    档位表:
      0～19_敌对: "敌意、戒备、欲除之而后快。社交检定 DC 高，不提供帮助或主动加害；交易拒绝或恶意抬价。"
      20～39_冷淡: "冷漠、不信任、敷衍。社交检定 DC 偏高，仅最低限度合作；交易价格不利。"
      40～59_中立: "无特别好恶、公事公办。社交检定 DC 正常；交易按市价或略浮。"
      60～79_友好: "有好感、愿意帮忙。社交检定 DC 略降，可争取情报或协助；交易价格略优或愿意以物易物。"
      80～100_信赖: "信任、忠诚或亲密。社交检定 DC 明显降低，可委托重要事务或获得关键情报；交易优惠、可赊欠或赠礼。"

  增减规则:
    说明: "以下为单次事件的参考增减量（delta），实际可由剧情微调；同一事件不重复结算。"
    正向事件:
      完成任务或委托: +5～+15（依难度与 NPC 收益）
      赠送礼物或稀缺物资: +3～+10（依价值与对方需求）
      成功说服、化解冲突、为其解围: +5～+15
      兑现承诺、保守秘密: +3～+8
      共同经历生死或关键抉择: +10～+20
      日常示好、礼貌互动（累计触发）: +1～+3
    负向事件:
      任务失败或背叛约定: -10～-25
      攻击、威胁、出卖: -20～-40（或直接降至敌对档）
      欺骗被识破、泄露其秘密: -10～-20
      拒绝其合理请求、态度恶劣: -3～-10
      与其敌对势力合作被察觉: -15～-30
    特殊:
      陈莹姬: "除通用规则外，服从教授、执行惩罚会巩固其「对教授服从」而非对主角好感；主角利用其破绽、或在其崩溃时施以援手，可单独按剧情 ±好感。"
      势力声望: "若设定势力整体好感（如方舟、商盟），可单独存 主角.势力好感度 或于关键 NPC 上体现。"

  对游戏流程的影响:
    社交检定: "说服、欺骗、威吓等检定：敌对/冷淡 DC +2～+4，友好 DC -1～-2，信赖 DC -2～-3（或由主持直接给予优势/劣势）。"
    交易: "冷淡时物价上浮 10%～30%，友好时下浮 5%～15%，信赖时可赊欠或获赠小额物资；见「货币与物价系统」。"
    任务与情报: "冷淡以下可能拒绝委托或隐瞒情报；友好以上可解锁支线、折扣、内部消息。"
    剧情分支: "高好感可触发专属对话、援助、结局路线；低好感可能导致告发、背刺或拒绝合作。"

  变量衔接:
    重要NPC: "陈莹姬、屠妇、教授 在 schema 中各有 好感度（0～100）或 对主角态度（叙事描述）；好感度变更时更新对应 NPC 的 好感度，并可视情况同步 对主角态度 的文案（如 60 以上改为「友好」）。"
    其他NPC: "主角.NPC好感度 为 record〈NPC 标识, 数值〉，键可用 NPC 名称或 ID；首次建立关系时插入该键并赋初始值（如 40 中立），后续按事件 delta 更新。"
    交付: "涉及好感变化的剧情或检定后，须用 <UpdateVariable> 更新 对应NPC.好感度 或 主角.NPC好感度[NPC标识]，并确保落在 0～100 范围内。"
