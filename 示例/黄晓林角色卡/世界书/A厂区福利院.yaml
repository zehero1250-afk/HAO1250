---
A厂区福利院:
  title: A厂区福利院 - 工分兑换性服务的合法场所
  type: location

  desc: |
    A 厂区内的「福利院」是伊甸园官方设立的、供劳工用工分兑换性服务的场所。
    名义上为「缓解劳工压力、维持秩序」，实则为回收工分、控制欲望与区分「有资格消费」与「被消费」的管道之一。
    男性劳工花费工分即可在此与女劳工发生性关系；女劳工多为被指派或为抵债/抵罚而进入福利院「服务」，仍属劳工身份，无额外报酬，仅能借此减免部分劳动或换取少量配给。

  position:
    位置: 位于 A 厂区内部，多与工分商店、休息集结点相邻或同栋不同区，便于劳工下工后持工分前来消费；由监工或主管轮值看守，陈莹姬不定期巡视，严禁私斗与逃单。

  rules:
    - 准入: 仅持有效工分的男性劳工可进入消费；女劳工不得以「顾客」身份进入（若设定中存在男性服务者则另见补充）。
    - 消费: "**200 工分起步**，一次就要花掉很多工分——普通劳工日薪仅 10 工分，去一趟福利院相当于大半个月白干；视对象、时长或「档次」可上浮至 300、400 甚至更高。在福利院前台或登记处先扣款后分配房间与对象；多数劳工攒很久才敢消费一次。"
    - 对象来源: 提供服务的女劳工由管理层指派——多为工分长期垫底、被罚「以劳抵过」、或自愿报名换取减劳/配给者；她们在福利院内的「服务」计入劳动，但不另加工分，仅可能获得少量配给或减免部分重体力班次。
    - 禁止: 不得对服务对象施暴至伤、不得强行带走或私约（违者依规处罚直至回收）；不得赊账、不得以物易性（须经工分扣除）；闹事、逃单者由监工或陈莹姬处理。

  atmosphere:
    日常: 排队登记、叫号进房、限时使用；走廊里常有等待中的男劳工与刚下班的「服务」女劳工擦肩，气氛压抑而机械。隔音差，声响与气味混杂，无人会多嘴议论。因 200 工分起步、一次消费高昂，能常来的人不多，多是攒够工分才来一趟。
    与禁欲规则的关系: 园内普通劳工严禁私自性行为；福利院是唯一合法、公开的性宣泄口，门槛高（200 工分起）、一次花销大，既强力回收工分又集中管控「谁可以碰谁」，避免地下交易与私斗失控。

  narrative_use:
    - 玩家可用 主角.积分 支付工分前往福利院，与 NPC 女劳工发生性关系；消费后须在剧情中扣减对应工分并更新 主角.积分。
    - 福利院可作为情报交换、偶遇特定 NPC、或观察伊甸园权力与性别结构的场景；也可与「工分商店」「老张」等设定联动——例如先到工分商店确认余额，再前往福利院消费。
    - 服务侧女劳工可为无名 NPC 或由世界书/剧情指定名字与简短设定，以配合具体剧情需要。

  summary: A 厂区福利院是劳工用工分兑换与女劳工性关系的官方场所，**200 工分起步**，一次消费就要花掉很多工分（普通劳工日薪 10，相当于大半个月白干），由管理层指派女劳工「服务」、男劳工扣工分消费，既强力回收工分又管控欲望；剧情中前往消费须扣减至少 200 工分并更新 主角.积分。
