---
敌人生成规则:
  title: 末日废土敌人生成规则
  desc: 当玩家在伊甸园及周边遭遇敌人时，按以下规则生成敌人数据

  敌人生成步骤_遭遇敌人时必须按顺序执行:
    Step1_确定阶级:
      根据剧情定位从下表选择阶级:
        杂兵: 普通敌人，单个或成群出现，如饥饿难民、拾荒者、普通丧尸、低级变异体、逃逸实验体
        精锐: 精英敌人，1个精英带1d3个杂兵出现，如变异疯狗、盗贼团精锐、伊甸园武装守卫、中级变异体
        首领: 副本关底BOSS，通常单独出现，如变异巨兽、盗贼团头目、伊甸园执法队队长、高阶变异体
        领主: 章节高潮BOSS，单独出现，如巨型变异体、区域霸主
        传奇: 世界唯一/不可再生，如教授本体、使徒级存在

    Step2_确定敌人等级:
      desc: 参考当前区域和任务难度判定，不与玩家等级挂钩，按照所处区域等级匹配。即便玩家能力很强去低风险区域碰见的绝大部分也只是低威胁敌人，而不是低风险区域强行刷跟玩家一样等级的敌人
      区域等级参考:
        蜂巢_A厂区外围: 1-5级
        A厂区核心区_B厂区: 6-15级
        C厂区_伊甸园外围废墟: 16-25级
        辐射区_外界的危险地带: 26-40级

    Step3_查难度表取参数:
      按阶级查以下难度表参数:
        杂兵:
          {
            骰子: 1d6,
            伤害倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.杂兵.伤害倍率,
                },
              },
            HP倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.杂兵.HP倍率,
                },
              },
          }
        精锐:
          {
            骰子: 1d8,
            伤害倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.精锐.伤害倍率,
                },
              },
            HP倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.精锐.HP倍率,
                },
              },
          }
        首领:
          {
            骰子: 2d8,
            伤害倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.首领.伤害倍率,
                },
              },
            HP倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.首领.HP倍率,
                },
              },
          }
        领主:
          {
            骰子: 3d12,
            伤害倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.领主.伤害倍率,
                },
              },
            HP倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.领主.HP倍率,
                },
              },
          }
        传奇:
          {
            骰子: 4d10,
            伤害倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.传奇.伤害倍率,
                },
              },
            HP倍率:
              {
                {
                  format_message_variable::stat_data.系统配置.敌人倍率.传奇.HP倍率,
                },
              },
          }

    Step4_计算面板数值:
      用敌人等级和Step3的参数代入公式:
        等级系数 = floor( (floor(敌人等级/10) + 1) × 伤害倍率 )
        固定伤害 = floor( 敌人等级 × 伤害倍率 )
        HP = 敌人等级 × 体质 × HP倍率

    Step5_填写EnemyOverview:
      基本攻击字段格式: 等级系数 × 骰子 + 固定伤害
      技能配置按阶级:
        杂兵: 无技能
        精锐: 1个技能普攻×2
        首领: 2个技能普攻×2
        领主: 3个技能普攻×2/×2/×3
        传奇: 4个技能普攻×2/×2/×3/×3

  敌人类型参考:
    杂兵类型:
      饥饿难民: 为求生存不择手段的难民，手持简陋武器
      拾荒者: 在废墟中搜寻资源的游民，警惕性高
      普通丧尸: T-病毒感染的初级产物，行动迟缓但数量众多
      低级变异体: 辐射或病毒导致的身体变异者，智力较低
      逃逸实验体: C厂区逃出的失败改造体，状态不稳定

    精锐类型:
      变异疯狗: B厂区变异兽栏逃出的嗜血猎犬，行动迅捷
      盗贼团精锐: 外来盗贼团的专业战斗人员，装备较好
      伊甸园武装守卫: 负责押送与巡逻的安保人员，训练有素
      中级变异体: 经历过多次改造的变异体，拥有一定智力

    首领类型:
      变异巨兽: 多次辐射变异形成的巨型生物，生命力顽强
      盗贼团头目: 领导一股势力的强大角色，战斗经验丰富
      伊甸园执法队队长: 如陈莹姬般的高级执法者，实力强悍
      高阶变异体: 接近完美的改造体，各项能力突出

    领主类型:
      巨型变异体: 体积庞大的终极变异体，一个可以毁灭一个小队
      区域霸主: 控制某一区域的强大存在，如废墟之王

    传奇类型:
      教授: 伊甸园的创造者，唯一成功将T-病毒应用于人体的存在
      使徒级存在: 传说级的终极生命体

  集群战术配置:
    集群规则:
      - 3个及以上同类型敌人时，禁止克隆人配置，必须混合不同兵种构建战术深度
      - 个体HP和攻击力必须在标准值 ±5%~10% 之间随机浮动取整数
