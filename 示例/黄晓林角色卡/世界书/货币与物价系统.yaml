---
货币与物价系统:
  title: 幸存者通用货币与物价系统
  type: setting
  desc: |
    S 市及周边幸存者势力之间逐渐形成的**通用交易媒介**与**常见物资价格参考**，
    便于剧情中买卖、酬劳、贿赂、黑市与势力间贸易时保持一致性。伊甸园内部另见「与伊甸园的关系」。

  通用货币_废土券:
    名称: "**废土券**（俗称「券」「票子」）"
    形态: "由渡口商盟牵头、多势力认可的小额**实物代币**——多为回收的金属片、压制的铝牌或商盟统一印制的防水纸券，面额有 1、5、10、50、100 五种单位（单位名「券」或「点」）。防伪依赖商盟印记与各势力背书，离开 S 市周边后认可度下降。"
    流通范围: "渡口商盟、方舟、铁腕残军、拾荒者聚落、西岸黑市及多数主城与郊区的幸存者据点普遍接受；R 市上帝教区以物易物为主，废土券可用但非主流。伊甸园内部**不使用**废土券（见下）。"
    获取方式: 完成任务或委托的酬劳、出售物资或情报、从废墟搜刮到可兑换的贵金属/弹药后到商盟或黑市兑换、掠夺或缴获（风险高）。
    用途: 在各势力据点或黑市购买食物、水、药品、弹药、装备、情报、通行或庇护；支付雇佣与贿赂。

  物价参考_通用区间:
    说明: "以下为**单次交易**的参考区间（单位：废土券），实际由地点、稀缺程度、势力关系与剧情决定，可在此基础上下浮动约 ±30%。"
    食物与饮水:
      一瓶干净水: 2~8。废墟与黑市偏贵，商盟与方舟配给点略便宜。
      一日口粮_压缩或罐头: 5~15。
      一日口粮_新鲜或热食: 10~25。据点内食堂、商盟码头较常见。
      一餐饱饭_含肉: 15~40。
    药品与医疗:
      绷带与消毒品: 5~20。
      止痛药_常见: 10~30。
      抗生素_一疗程: 50~150。稀缺时翻倍。
      血清或抗病毒剂: 100~500。视种类与来源。
    武器与弹药:
      一把砍刀/棍棒: 15~50。
      一把手枪_旧: 80~200；弹药每发 3~10。
      一把步枪_旧: 150~400；弹药每发 5~15。
      一把精品/稀有武器: 按「经验与掉落规则」品级，通常 300~2000+，有价无市。
      手雷或爆炸物_单枚: 30~100。
    装备与杂物:
      一套普通护甲_护具: 40~120。
      手电、打火机、绳索等杂物: 5~25。
      电池或燃料_单次用量: 8~30。
    情报与服务:
      一般情报_路线/据点位置: 20~80。
      重要情报_势力内幕/军火库: 100~500。
      雇佣护卫_一日: 50~150。精锐或危险路线翻倍。
      黑市通行或庇护_一次: 30~200。

  地点与势力差异:
    渡口商盟码头: 价格相对稳定，废土券最权威；可兑换贵金属与弹药为券，抽成约 10%~15%。
    方舟: 内部以劳换食为主，废土券可用于换配给或与外来商队交易；物价略低于黑市。
    西岸黑市: 什么都贵一截，但违禁品（武器、药品、情报）齐全；可匿名交易，风险自担。
    拾荒者聚落: 以物易物常见，废土券接受但不如商盟区普遍；食物与水偏贵（依赖输入）。
    铁腕残军: 弹药与武器管制，废土券可换口粮与部分物资，大额需审批或任务抵扣。
    伊甸园: 见下。

  与伊甸园的关系:
    说明: "伊甸园内部**不流通废土券**。劳工无工资，生存依赖配给与「价值」——表现好则配给略多、调岗、免于「回收」；表现差则扣口粮、惩罚或送入 B 厂区。进入伊甸园时私人物品（含废土券）通常被没收；若主角在园内通过秘密渠道获得废土券，仅能在**逃出后**或与极少数的园内黑市/外联人员交易时使用。离开伊甸园后，主角若携带或赚取废土券，则按本系统在 S 市及周边使用。"

  变量与剧情衔接:
    说明: "主角持有废土券数量存于 **主角.货币**（数字，≥0）。交易、酬劳、拾取、被没收、丢失时须更新该变量；进入伊甸园时若设定为没收私产，可将 主角.货币 设为 0 或保留为逃出后使用的隐藏储备（由剧情决定）。"

  伊甸园工分制:
    名称: "**工分**（仅伊甸园内部使用）"
    定义: |
      工分是伊甸园内部维持秩序与配给的**内部记分制度**，只在园区内有效，
      离开伊甸园后不得兑换为废土券，也不能在外部据点直接流通。
      对劳工来说，工分几乎等同于「生存资格」与「待遇等级」。
    获取方式: |
      - **日常工作**：按身份每日发放固定工分（不随当天表现波动）：
        - 普通劳工：每日 +10 工分
        - 监工：每日 +100 工分
        - 主管：每日 +200 工分
        - 管理层（陈莹姬，A区管理者）：每日 +1000 工分
      - **委托任务**：完成伊甸园内部委托（如加班、告密、维护设备、处理麻烦人物），
        额外奖励工分，数额随**委托人地位**与任务风险浮动（底层职员少，高层与核心部门多）。
    用途: |
      工分**只能在伊甸园内消费**，典型用途包括：
      - 在内部食堂换取更好的食物或额外配给（肉类、甜点、夜宵等）
      - 兑换恢复药剂、绷带等基础医疗物资
      - 换取居住条件更好的「单间蜂窝」或临时升级床位
      - 置换零星杂物、奢侈品（含香烟、酒类、毒品等，见工分物资价位规则）及走私小物
      - 用于贿赂监工、主管或陈莹姬（A区管理者/管理层）等，以争取照顾、隐瞒过失、提前放工或特殊情报
      - 换取特殊服务（如发生性关系等），价位见「工分物资价位规则」-「特殊服务」
    变量与剧情衔接: |
      工分数值存于 **主角.积分**（数字，≥0）。每日剧情结算时：按主角在伊甸园内当前身份发放当日固定工分（劳工 +10、监工 +100、主管 +200、管理层即陈莹姬/A区管理者 +1000）；若当日完成委托任务，按委托人地位与任务难度额外增加（建议 10~200 区间）。使用工分换取物资、改善居住或行贿时，须在叙事中点明支出数额并在 <UpdateVariable> 中对 主角.积分 做相应减少（不得出现负数）。离开伊甸园后工分通常清零或冻结，由剧情决定。

  工分物资价位规则:
    说明: "以下为伊甸园内**单次消费**的工分参考区间（单位：工分），实际由配给紧张程度、监工心情、黑市行情与剧情决定，可在此基础上下浮动约 ±30%。"
    食物与配给:
      基础配给外的一餐加菜_素: 5~15。
      基础配给外的一餐加菜_含肉: 15~40。
      甜点或夜宵_单次: 10~25。
      整日「优待口粮」_换更好的三餐: 30~80。
    医疗与恢复:
      绷带与消毒品: 8~25。
      止痛药_常见: 15~35。
      恢复药剂_小（如止血、退烧）: 20~50。
      恢复药剂_中（如体力恢复、伤口愈合）: 50~120。
    居住与床位:
      单间蜂窝_一日临时升级: 40~100。
      单间蜂窝_一周或长期调换: 200~500。
      更好床位_同舱内换位: 15~40。
    杂物与黑市:
      小饰品、书刊等零星杂物: 5~25。
      走私小物或违禁品_视种类: 30~150。
    奢侈品:
      香烟一包: 25~60。劳工区紧俏，黑市更贵。
      酒类_单瓶或单次: 40~120，视档次。
      毒品_单次用量（如兴奋剂、镇静类）: 80~250，高风险高价位，视种类与来源。
      毒品_成瘾性较强或管控更严的品种: 150~500。
      高档化妆品、香水等: 60~200。
      性玩具_视种类与档次: 40~180，黑市或稀缺款更贵。
    特殊服务:
      性服务_劳工或底层（一次性）: 30~80，视对象与场合。
      性服务_监工、主管或较稀缺对象: 80~250。
      性服务_陈莹姬（A区管理者）或管理层级: 200~600，视关系与剧情。
      其他特殊服务_陪伴、私密照顾等: 20~150，视内容与对象。
    贿赂与打点:
      监工_小恩小惠（换班、少挨骂）: 20~60。
      监工_较大照顾（隐瞒过失、提前放工）: 60~150。
      主管_特殊关照: 100~400。
      陈莹姬（A区管理者/管理层）_一次打点: 50~200，视所求与关系浮动；重大关照 200~500。
