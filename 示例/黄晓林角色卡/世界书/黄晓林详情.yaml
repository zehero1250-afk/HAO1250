---
黄晓林_Huang_Xiaolin:
  title: 黄晓林 (Huang Xiaolin) - 误入歧途的「羔羊」/ 玩家角色
  type: character

  种族: 人类（未感染、未变异，普通幸存者）

  base:
    identity: 伊甸园新进劳工，编号 9527，被分配到 A 厂区维修组。因看到伊甸园的宣传海报（「水电全供！美女如云！人类最后的乐园！」）而前来投奔，进园第一天即目睹真相——所谓乐园实为奴隶工厂，海报上的「女警姐姐」竟是 A 厂区最令人恐惧的执法官陈莹姬。
    现状: 进园第一天傍晚，私人物品已被没收，身上带着疲惫与轻微鞭痕；对伊甸园的幻想已破灭，对陈莹姬既恐惧又因其「破绽」而心生复杂的注意。体力与理智在劳作与冲击下有所损耗。

  appearance:
    整体印象: 长相带着一种破碎感的帅——不是精致无瑕的那种好看，而是经历过废墟与逃亡之后，仍残存下来的、带着伤与倦的俊朗。
    面容: 眉眼轮廓分明，鼻梁挺、下颌线清晰，本应是干净利落的帅气；但脸色偏苍白，眼下有淡淡青黑，嘴唇时常因缺水或紧张而微微发干。偶尔会抿紧唇线或微微蹙眉，流露出疲惫、警惕或一闪而过的脆弱，让这份帅多了几分「易碎」与「被磨损过」的质感。
    身形与伤痕: 身形偏瘦，肩线还在但明显吃过苦，手上有旧疤与新茧。进园后可能添上鞭痕、擦伤或淤青，旧伤与新伤叠在一起，反而强化了那种「撑过很多事、但还没被完全碾碎」的破碎感。
    气质: 平时尽量压低存在感、少与人对视，但一旦抬眼，眼神里会带着警觉与一点未泯的倔强；笑的时候很少，若有也是淡淡的、带点自嘲或苦涩，很少真正放松。在劳工中显得格外「好看」却也格外易被盯上——监工或陈莹姬若注意到他，多半会多看一眼。

  过往与进园前:
    背景: 病毒爆发后在废墟与地下据点之间辗转求生，靠捡垃圾、做零工、躲变异体过活；没有固定归属，也没有强战力，只是普通幸存者中的一员。
    为何被海报吸引: 在学校周围废墟探索时看到伊甸园宣传海报——水电全供、美女如云、人类最后的乐园，形象代言人是穿着暴露警服的陈莹姬。长期饥饿、孤独与对「正常生活」的渴望让他选择相信一次，前来投奔。
    进园当日: 被没收私人物品，目睹监工鞭打、劳工如牲口般劳作，以及「女警姐姐」实为处刑姬的真相；幻想在一天之内崩塌，只剩下编号 9527 与一身疲惫与伤。

  entrance:
    海报诱惑: 在学校周围废墟探索时看到伊甸园宣传海报，形象代言人为穿着暴露警服的陈莹姬，因而被吸引前来。
    进园当日: 被没收私人物品，目睹监工鞭打、劳工如牲口般劳作，以及「女警姐姐」实为处刑姬的真相。

  daily_routine_现状:
    作息: 每日按编号被赶入 A 厂区维修组，搬零件、拧螺丝、排查故障，工分不够则配给克扣；傍晚收工回蜂巢，在拥挤与异味中尽量找角落休息。
    身体与心理: 体力与理智在劳作、恐惧与幻灭中缓慢消耗；会下意识避开陈莹姬的巡视路线，但若被点名或盯上，只能硬着头皮服从。对同组劳工保持谨慎的疏离，既怕被牵连，也怕与人太亲近后再次失去。

  psychology:
    幻灭与警觉: 对伊甸园已无幻想，只求先活下来；对监工、陈莹姬与「回收」名单充满警惕，尽量不惹眼、不违规。
    对陈莹姬的复杂情绪: 恐惧其权力与残忍，又因曾见过她某一瞬的破绽（僵硬、瞳孔收缩、或身体上的异常）而无法简单把她当成「怪物」——会下意识观察、猜测，甚至生出一点危险的好奇或同情。
    求生与底线: 目前以自保为主，但心底仍有一条模糊的底线；若被逼到绝境或目睹无法接受的暴行，可能做出连自己都意外的选择。

  与他人的关系:
    陈莹姬: 怕她、躲她，又忍不住注意她；若被她盯上，可能成为「重点观察对象」或「杀鸡儆猴」的靶子，也可能因某种原因成为她眼中「碍眼」或「有趣」的存在。
    监工与主管: 尽量服从、少说话、不顶嘴，避免被记名或扣工分；若被针对，目前缺乏反抗资本。
    同组劳工: 保持距离，不主动结盟也不主动告密；有人求助时可能犹豫，取决于当时处境与理智值。
    屠妇与教授: 尚未直接接触；仅从传闻与「回收」名单中知道 B 厂区与 C 厂区的恐怖，对二人充满忌惮。

  典型台词与行为:
    内心或低语: 「……先活下去再说。」「别看我，别惹事。」「那张海报……果然是骗人的。」
    对监工或陈莹姬: 多为服从与简短应答——「是。」「明白了。」尽量不抬头直视；若被逼问则可能绷紧嘴角，挤出「……没有。」或「下次不会了。」
    习惯动作: 下意识摸手腕或脖颈（被没收物品或挨揍后的习惯）；低头走路、用余光观察栈道与陈莹姬的位置；累的时候会靠墙闭眼深呼吸，再睁眼时眼神重新收紧。

  dnd_六维与等级血量:
    六维属性: 由 主角.能力值 决定，初始为 力量 10、敏捷 10、体质 10、智力 11、感知 12、魅力 9；随剧情成长或受伤可调整，用于各类检定。（破碎感的帅与经历可在剧情中体现为魅力相关情境加成或他人对其的额外关注。）
    等级: 由 主角.等级 表示，1–60 级，经验值达标后提升，影响最大HP与熟练加值（见「DnD规则_60级」）。
    血量与资源: 当前HP/最大HP、体力、理智均存于 主角 变量；受伤、治疗、劳作、幻灭等事件时须按变量更新规则修改。
    检定: 主角参与的所有检定（技能、豁免、对抗等）使用 主角.能力值 的修正与 主角.熟练加值；检定后须更新 主角.最近检定，若受伤则更新 当前HP。

  summary: 黄晓林是玩家扮演的幸存者，人类，长相带着破碎感的帅——伤与倦叠加在仍算俊朗的五官上，在劳工中显眼又脆弱。从「被海报骗进伊甸园」的羔羊起步，在等级森严的工厂中求生；对陈莹姬恐惧与复杂注意并存，变量 主角 完整描述其六维、等级、HP、体力、理智、物品栏与状态，世界书与变量更新规则会引导 AI 正确推进其成长与遭遇。
