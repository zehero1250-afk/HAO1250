---
DnD规则_60级:
  title: DnD 规则（等级上限 60）
  type: mechanics
  desc: |
    本角色卡采用**等级上限 60**的统一等级体系。主角、NPC、敌人等级均为 1–60，
    熟练加值、最大HP 成长与经验线按下列规则执行。

  等级上限:
    - 所有角色（主角、陈莹姬、屠妇、教授、敌人、一般 NPC）的等级均为 **1–60**，不得超出。
    - 经验值累计达到当前等级的升级线时，等级 +1，并依下表更新 最大HP、熟练加值。

  熟练加值:
    说明: 熟练加值随等级提升，用于技能检定与攻击等。检定公式为 d20 + 属性修正 + 熟练加值（若该技能/武器熟练）。
    表_按等级:
      1–9 级: 熟练加值 +0
      10–19 级: 熟练加值 +1
      20–29 级: 熟练加值 +2
      30–39 级: 熟练加值 +3
      40–49 级: 熟练加值 +4
      50–60 级: 熟练加值 +5
    公式: 熟练加值 = floor(等级 / 10)，且最大为 5（即 50–60 级均为 +5）。
    交付: 升级时若进入新的十级档（10、20、30、40、50），须将 主角.熟练加值 更新为上述对应值。

  最大HP 成长:
    说明: 每次升级时，最大HP 增加一定数值，具体可由剧情在以下两种方式中择一或混合使用。
    方式一: 每级增加 1d6 + 体质修正（体质修正 = floor((体质 - 10) / 2)，可为负）。适合波动感较强的成长。
    方式二: 每级固定 +5。适合简化计算与长线成长。
    高等级说明: 60 级时角色最大HP 会较高；若剧情需要可设软上限（如单次战斗可承受伤害上限）或按上述方式累加即可。
    交付: 升级时用 replace 更新 主角.最大HP 为 原最大HP + 本次升级增加量。

  战斗节奏与伤害成长:
    设计目标: "单场战斗**回合数应与 1–20 级时相当**，避免 60 级体系下因 HP 高、伤害未同步成长而导致一场架打几十回合。建议同等级或同级威胁下：杂兵 3–8 回合内击倒、精英 5–12 回合、首领 10–20 回合。"
    主角伤害随等级成长:
      说明: "除 熟练加值 外，主角造成的**单次命中伤害**应随等级有额外成长，使「每回合预期伤害」与敌人 HP 成比例，击倒所需回合数保持稳定。可采用以下方式之一（由剧情择一或混合）。"
      等级系数: "主角单次伤害 = 武器基础（如 1d8 或 2d6）+ 力量/敏捷修正 + 熟练加值 + **floor(等级/10) × 1d6**（或 +floor(等级/10)×2 固定），即每 10 级多 1d6 或约 2 点期望伤害。"
      简化: "每 10 级主角对同等级敌人的「等效每回合伤害」约提升一档（如 L1 约 1d8+修正，L10 约 1d8+1d6+修正，L20 约 1d8+2d6+修正），使同等级杂兵/精英/首领的击倒回合数落在上述区间。"
    敌人侧: "敌人生成规则中敌人 **HP 与 伤害** 已按等级（及变异种有效等级）计算，攻防同步；无需再改。"
    叙事建议: "高等级战斗可**合并多回合为一次叙述**（如「数轮交锋后，你抓住破绽……」），再一次性结算总伤害与 当前HP，避免逐回合描写拖沓；回合数仍按上述目标控制。"

  经验线_参考:
    说明: 升级所需经验为「从 0 到当前等级」的累计值，或「当前等级 → 下一级」所需经验，由剧情自定。以下为参考。
    每级所需_线性: 升到下一级所需 = 100 × 当前等级。例：1→2 需 100，2→3 需 200，…，59→60 需 5900。
    累计到 60 级: 若采用上式，从 1 级升到 60 级累计约需 177000 经验（sum(100×k, k=1..59)）。
    可选_平缓曲线: 如每级所需 = 50 × 当前等级，则升级更快；若 = 150 × 当前等级，则更慢。由剧情节奏决定。
    交付: 当 主角.经验值 达到或超过当前等级对应的升级线时，在本次回复末尾用 <UpdateVariable> 将 主角.等级 +1，并更新 主角.最大HP、主角.熟练加值。

  同等级下变异种与人类的差异:
    说明: 等级上限 60 对人类与变异种通用，但**同等级时变异种明显强于人类**，通过「变异种强度修正」体现。
    变异种强度修正:
      - 变异种与人类共用等级 1–60，**经验与掉落仍按显示等级**。战斗与检定时：变异种在计算 **HP、伤害** 时使用 **有效等级 = 显示等级 + floor(显示等级/4)**（最少 +1，上限 60），例 L20 变异种按 25 算 HP/伤害；与变异种进行 **力量/敏捷/体质** 相关检定时，变异种在 d20+属性修正 上再 **+3**，人类同等级无此加成。生成与判定见「敌人生成规则」Step3.5；剧情叙述中同等级变异种应更难缠、更耐打、更易造成伤害。

  与其它规则的关系:
    - 属性修正、检定流程（d20 + 属性修正 + 熟练加值 vs DC）见「DnD检定说明」。
    - 经验获取与掉落见「经验与掉落规则」；敌人等级与层级仍为 1–60 与杂兵/精英/首领/传说；**变异种** 经验与掉落按显示等级，战斗强度按「变异种强度修正」。
    - 变量更新时，等级字段 range 为 1~60，见「变量更新规则」。
