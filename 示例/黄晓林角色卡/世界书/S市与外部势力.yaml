---
S市与外部势力:
  title: S市 (Scaled City) - 缩小版广东与周边势力
  type: location

  S市规模与结构:
    desc: S市为病毒爆发前南方重要的港口与制造业中心，规模可理解为**缩小版的广东**——面积与人口约为原广东省的 1/3～1/4，保留「一核多区」的格局：主城沿大河入海口分布，东岸为新区与商贸区，西岸为老城与居民区，北侧为工业带与物流园，南侧为滨海区与码头。病毒爆发后城区大半沦陷为废墟与尸潮区，仅少数据点被幸存者或势力占据；郊区工业带与北郊则分布着伊甸园、残军与商盟等势力。
    大河: 自北向南穿城入海，将主城分为东岸与西岸，河上数座大桥多已断裂或封锁，渡河需走渡口或绕行北郊。
    主城_东岸: 原新区与CBD，高楼林立但多数已空置或成为丧尸巢穴；**方舟**占据其中一片 reclaimed 核心区，与伊甸园势均力敌；其余为尸潮与废墟，部分地下设施与地铁站被小型团体占据。
    主城_西岸: 老城区，街巷狭窄，物资点与陷阱多；拾荒者与黑市多活动于此。
    北郊_工业带: 原工业园区、物流园与厂房集中地；**伊甸园**即位于北郊东侧一座大型工业园区内，扼守通往东岸与主城的要道。
    南郊_滨海与码头: 港口、仓库与沿海公路；渡口商盟控制主要码头与船运，与对岸据点通商。
    东郊: 新区外延，部分别墅区与科技园；铁腕残军据点在东郊某处旧军营。
    西郊: "老城外围，农田与零散村落；散布小型避难所与拾荒者路线；再往西为通往 **R 市** 的废土与公路，R 市境内有大型教权势力「上帝教」。"
    R市_方位: "S 市西侧邻市，病毒爆发后沦陷程度与 S 市类似；上帝教在 R 市为统治级大型势力，并派传教队东进，在 S 市西郊及主城西岸设有小据点。"

  地点位置_总览:
    - 伊甸园: 北郊东侧，大型工业园区内；对外以「人类最后净土」招人，实际为教授统治的奴隶工厂。
    - 方舟: 主城东岸 reclaimed 区，原 CBD 核心地带；与伊甸园势均力敌的大型势力，收容逃奴、反对奴役，与伊甸园长期对峙。
    - 铁腕残军据点: 东郊，原某武警/驻军营地或加固厂区；扼守东岸进出要道。
    - 渡口商盟主码头: 南郊滨海，主码头及相邻仓库区；控制河海转运与对岸贸易。
    - 主城西岸黑市: 西岸老城地下或废墟掩体，无固定「总部」，多为接头点与流动摊。
    - 拾荒者聚落: 西郊零散、主城废墟边缘的棚户与地下室；多股小团体，无统一领袖。
    - 其他小型据点: 地铁站、学校、医院、商场地下室等，多为数十人规模的避难所，位置分散，常因尸潮或内斗迁移。
    - R市上帝教: S 市西侧 R 市境内的大型教权势力；在 S 市西郊或主城西岸有传教小据点，信徒能学「丧尸语」、引导尸群、藏身尸潮。

  与伊甸园势均力敌的势力_方舟:
    name: 方舟 (The Ark)
    type: 大型势力（与伊甸园同级）
    desc: 占据**主城东岸**一片 reclaimed 城区的幸存者政权，规模与伊甸园相当，是 S 市境内唯一能在人口、地盘和武装上与伊甸园分庭抗礼的势力。由病毒爆发初期的民间自卫团、逃难市民与部分前政府人员逐步整合而成，奉行「以劳换食、不奴役人」的公约，公开收容从伊甸园逃出的劳工并拒绝交还，与教授治下的伊甸园处于长期对峙与摩擦状态。
    据点位置: 主城东岸原 CBD 核心区——数栋相连的高层与地下综合体经加固、清剿后形成封闭生活区；控制东岸大桥北侧桥头堡及沿岸码头之一，与渡口商盟、铁腕残军均有通道可联络。
    规模: 约 1200～2000 人，其中可动员战斗人员约 1/4；拥有从废墟回收的轻武器、自制护甲与陷阱网，以及少量从商盟或残军换来的重火器；粮食与能源部分自给（屋顶种植、小型发电），部分依赖与商盟、拾荒者的贸易及东岸废墟搜刮。
    体制与结构:
      议会制: 由各区推选的「代表」与常设的军事、物资、外联委员组成议事会，重大事项投票决定；日常防务与外出队由「护民官」统辖，护民官由议事会任命，可连任。
      以劳换食: 无奴隶制，所有居民按工种与工时换取配给与居住权；逃入方舟的伊甸园劳工经甄别后可按自愿加入劳动或防卫队，不会被强制「遣返」。
      对外立场: 明确反对伊甸园的奴役与「回收」制度，视教授为战犯级人物；与铁腕残军关系尚可（共同敌人），与渡口商盟保持贸易但警惕其人口买卖；对断链等游击队持默许态度，偶有情报或物资上的暗中支援。
    对伊甸园: 公开敌对但避免全面开战——双方都清楚谁也难以一口吃掉对方。伊甸园外出小队与方舟巡逻队在东岸废墟、北郊边缘时有交火；教授多次通过商盟或中间人要求「遣返逃奴」，方舟一律拒绝。伊甸园若大举进攻方舟将付出惨重代价，方舟若主动北伐伊甸园同样会两败俱伤，故目前以边界摩擦、争夺废墟物资与逃奴归属为主。
    对主角_可选: 若主角逃出伊甸园并抵达东岸或接触方舟巡逻队/商队，可申请庇护；通过基本甄别（非间谍、非重罪）后可获收容，以劳换食，甚至加入防卫队或外勤队参与对伊甸园的前线对峙。方舟也是打听伊甸园内部情报、策划进一步行动的重要据点。
    领袖信息:
      议事会主席: 林婉（女），原区政府公务员，病毒爆发时带队组织东岸难民自救，被推举为方舟初创期的协调人，后成为首任议事会主席。务实、善斡旋，主张对伊甸园强硬但不主动扩大战事，在方舟内威望高。
      护民官: 程刚，前武警排长，负责日常防务与外出队指挥，由议事会任命、可连任。主战派，常带队与伊甸园在边界摩擦，对逃入方舟的劳工较为照拂。

  中型外部势力_一_铁腕残军:
    name: 铁腕 (Iron Fist) / 残军
    type: 中型势力
    desc: 由病毒爆发后未完全溃散的**原S市武警、特警及部分驻军残部**重组而成，以「恢复秩序、清剿尸潮」为口号，实际控制东郊一片加固营地与若干前哨。纪律严明但补给紧张，常与伊甸园、商盟既有摩擦又有临时交易（武器换粮食、情报换通行）。
    据点位置: 东郊，原军营或大型厂区改造的堡垒；控制东岸进出主城的几条要道。
    规模: 约 200～400 人，其中可作战约 1/3；有轻武器、少量载具与无线电。
    对伊甸园: 警惕且鄙夷，视教授为「疯子」与奴隶主，但因弹药与粮食不足，暂未大规模开战；偶有逃出伊甸园的劳工被残军收留或转手给商盟。
    对主角_可选: 若主角逃出伊甸园并接触东郊，可能遭遇残军巡逻队；表现合作或有用可被带去据点，否则可能被盘问、征用或驱逐。
    领袖信息:
      指挥官: 赵志国，原 S 市某区武警中队长，溃散后收拢残部据守东郊，自称「铁腕」。作风硬朗、不妥协，视伊甸园为必须铲除的毒瘤，但苦于补给不足只能维持现状；对逃奴持同情态度，若有用可吸纳，无用则转交商盟换粮。

  中型外部势力_二_渡口商盟:
    name: 渡口商盟 (Ferry Merchants League)
    type: 中型势力
    desc: 以**南郊主码头与河海转运**为核心的中型势力，由原码头工人、船主、走私贩与幸存商人组成。不追求「秩序」或「净土」，只做交易：粮食、药品、武器、情报、人口（含逃奴与「自愿」劳工）均可买卖。与伊甸园、铁腕、各小型聚落均有贸易往来，立场中立偏利己。
    据点位置: 南郊滨海主码头及相邻仓库区；部分成员常驻对岸据点或跑船，形成两岸一体的商路。
    规模: 约 150～300 人，核心是船队与码头工人；武装以轻武器与雇佣护卫为主，战斗力不如残军但情报与物资渠道广。
    对伊甸园: 与教授有默契——商盟不主动招惹伊甸园，伊甸园用「回收」外的过剩劳工或物资换商盟的稀缺品；逃奴若被商盟截获，可能被卖回伊甸园或转卖他处。
    对主角_可选: 主角若在南郊或渡口活动，可能遇到商盟掮客；可打工换口粮、搭船过河，也可能被当成「货物」盯上。
    领袖信息:
      盟主: 老金（金满堂），原码头仓库老板兼走私线头目，末世后把船主、掮客、打手拢成渡口商盟，自任盟主。只认钱不认立场，和伊甸园、方舟、铁腕都做生意；话少心狠，人口买卖经他点头才能做大单。

  外部大型势力_R市上帝教:
    name: 上帝教 (Church of God's Baptism) / 洗礼派
    type: 外部大型势力（本部在 R 市；S 市为传教前哨与小据点）
    desc: 以 **R 市**（S 市西侧邻市）为根据地的宗教政权，信奉「病毒是上帝对人类的洗礼」——末世并非惩罚，而是涤罪与试炼，唯有经洗礼而存留者方为上帝拣选之民。教众四处传教，从 R 市向东进入 S 市，在西郊及主城西岸设小型据点与布道点，收纳信徒、宣讲教义，与 S 市本土势力（圣烛、方舟、伊甸园等）在教义与地盘上时有摩擦。
    据点位置:
      R市本部: R 市境内占有多片 reclaimed 区与「圣所」，为当地统治级大型势力，人口与组织度可与伊甸园或方舟相比拟。
      S市据点: 西郊边缘或主城西岸废墟中的隐蔽据点——旧教堂、学校、地下掩体等，由「传教使」带领少量骨干与信徒维持，规模小但渗透力强。
    教义与行为:
      洗礼观: 病毒是上帝对人类的洗礼；感染者与丧尸是「未完成洗礼」或「洗礼之器」，信徒不仇视尸群，而是学习与之共存、甚至「与祂们同行」。
      传教: 主动向幸存者布道，吸纳信众；对拒绝或「异端」势力（如伊甸园、圣烛）持排斥或敌视态度，视伊甸园为渎神奴役、圣烛为曲解神罚。
    核心能力_丧尸语与尸群:
      丧尸语言: 教内经长期观察与秘密传承，掌握了一套与丧尸沟通的方式——并非人类语言，而是模仿尸吼、肢体与气味等，使丧尸将信徒识别为「同类」或「非威胁」。
      引导尸群: 能通过声音、气味与站位，在一定范围内**影响尸群行军方向**，使尸潮改道或集中冲击某处，用于护教、突围或对敌（如把尸潮引向伊甸园外围）。
      隐匿于尸群: 信徒可涂抹特制尸油、穿戴尸衣、按律「静默行进」，混入尸群中移动，从而穿越危险区、侦察或发动奇袭；外人难以从尸潮中分辨出他们。
    规模与结构:
      R市: 大型势力，人口数千级，有圣所、牧区、护教军与「洗礼修士」；领袖自称**上帝之子**，为教权与俗权最高者。
      S市: 小据点与流动传教队，每处数十人规模，由传教使统领，负责布道、接引信徒回 R 市或就地发展。
    对S市各方: 与圣烛在教义上冲突（洗礼 vs 神罚）；与方舟、铁腕无直接统属关系，可接触可摩擦；视伊甸园为渎神政权，偶有将尸群引向伊甸园边界的传闻。
    对主角_可选: 主角若在西郊或西岸活动，可能遭遇上帝教传教队；可被劝诱入教、学习「与尸同行」的入门术，也可能因拒绝或被视为异端而遭敌视；若深入 R 市，将直面上帝教本部与上帝之子。
    领袖信息:
      上帝之子: 本名与出身成谜，自称受上帝拣选、为「上帝之子」，统领 R 市上帝教一切教务与军政。据传能自如行走于尸群之中、以「圣言」驱使尸潮，信徒视其为神迹化身；外人多视为狂热教主或变异体边缘者，真实面目不详。

  小型幸存者组织_列举:
    拾荒者帮:
      - 西郊与主城废墟边缘多股拾荒者，无统一名称，多以「帮」「伙」相称。以搜刮废墟、倒卖零碎物资为生；与黑市、商盟有松散联系，有时为商盟或残军做向导、探路。
      - 位置: 西郊棚户、主城西岸废墟边缘、地铁入口等，流动性大。
      - 领袖信息: 无总舵主；各帮各有「话事人」或「带队的」，多为能打、认路、敢进废墟的老拾荒者，谁拳头大或谁先占住一块废墟谁说了算，彼此常为地盘和物资起冲突。
    西岸黑市:
      - 非单一组织，而是西岸老城地下与废墟中的**交易网络**：情报、药品、武器、违禁品、人口均可经中间人交易。无固定总部，接头点与「安全屋」常换。
      - 位置: 主城西岸，地下停车场、防空洞、废弃商场地下室等。
      - 领袖信息: 无单一领袖；由几名「大中间人」把持不同线路——人称「疤叔」「阿凤」「老拐」等，各自握有货源、客户与打手，彼此既合作又提防，谁也不敢称王，形成地下掌柜共治。
    地铁避难所:
      - 若干段地铁隧道与站台被不同团体占据，每处数十人规模；有的偏封闭排外，有的与拾荒者、黑市交换物资。
      - 位置: 主城东岸与西岸地铁线，具体站点依剧情设定。
      - 领袖信息: 各站点各自为政，领袖不一——有的是原站长或保安头子，有的是后来打下来的「站霸」；通常每站有一个说了算的人（或称站长、或称老大），彼此无统属关系。
    教会聚落_圣烛:
      - 小型宗教型聚落，约 30～50 人，信奉「病毒为神罚、赎罪者得存」；聚集在某个旧教堂或学校，不主动扩张，对「异端」（如伊甸园）持敌视态度。
      - 位置: 西郊或北郊边缘，具体可定为某教堂/学校。
      - 领袖信息: 「烛座」苏嬷嬷（苏静修），原小学教师，末世后自称得启、创立圣烛教，掌管礼拜与戒律。瘦小严肃，说一不二，视伊甸园与变异体为神罚之证、必清之孽；信徒称其「点烛人」。
    游击队_断链:
      - 自称「断链」的小股武装，专门袭击伊甸园外出小队（如搜寻物资的 5 人+2 守卫）、劫持补给或解救劳工；人数少（约 20～40）、行踪不定，与残军、商盟均有接触但不从属。
      - 位置: 北郊与东郊交界、伊甸园外围要道附近；无固定据点，多藏身废墟或临时营地。
      - 领袖信息: 「链头」阿断（本名不详），据传是从伊甸园 B 厂区逃出的前劳工，左臂有烙痕。话不多、下手黑，专咬伊甸园外出队与押送队；不投靠方舟或残军，坚持「自己断自己的链」，在逃奴与边缘势力里口碑两极。
    末世古惑仔:
      - 主城西岸老城深处盘踞的**街头帮派**，约 40～60 人，自诩「末世古惑仔」——讲字头、论辈分、守地盘。多为病毒爆发前就混迹街头的混混与底层青年，末世后抱团占了几条街与一片废墟地下室，靠收保护费、替黑市跑腿、偶尔劫掠落单过路者维生；有「大佬」「红棍」「四九」那套称呼，纹身、改装电单车与砍刀是标配，不惹大势力（伊甸园、方舟、残军），专吃西岸边缘与拾荒者、小商贩的油水。
      - 风格: 义气当先、有仇必报，对外人狠对兄弟护短；地盘内设地下赌档、私酿与黑市接头点，和西岸黑市、拾荒者帮既有合作也有抢生意的时候。逃出伊甸园的人若误入他们地盘，可能被敲一笔「过路费」或强行拉入伙，也可能被当成「肥羊」交给商盟换好处——全看当时大佬心情与主角会不会「做人」。
      - 位置: 主城西岸老城某几条相连的街巷与地下车库、废弃游戏厅；与西岸黑市活动区重叠但各有堂口，和拾荒者聚落相邻时常有摩擦。
      - 领袖信息: 「坐馆」崩牙雄（陈志雄），末世前就是西岸一带的混混头，病毒爆发后带弟兄占住几条街，自封大佬。门牙缺了一颗、嗓门大、讲义气但也很记仇；手下红棍「刀疤杰」管打、「肥仔明」管账，逃奴过境要不要交人他说了算。

