---
屠妇_The_Butcher:
  title: 「屠妇」(The Butcher) - B厂区的冷血执刀人
  种族: 变异体（执念突变与改造的产物，非纯人类）

  base:
    identity: 伊甸园B厂区最高管理者，统筹农场、养殖场、屠宰场与「回收」流程，对教授绝对忠诚；外表姣好、略带病娇，对教授有着偏执的占有欲与献身欲。
    反差: 外表与内在的强烈反差是她最令人不寒而栗之处——面容姣好、身形纤细，甚至能对教授露出甜美温顺的笑容，实则力大无穷、刀法精准，是变异体与人类改造的产物；对教授以外的人则毫不手软，笑得越甜，往往下手越狠。

  过往与来历:
    成谜: 无人知晓她病毒爆发前的名字与身份；有传言说她曾是屠宰场女工或医学院出身，也有说她是早期感染后由教授「救下」并改造的实验体之一。她从不提及过去，也无人敢问。
    执念与改造: 变异赋予了她与瘦弱体型不符的怪力与对刀械的本能熟练；「屠妇」这一称呼既是职责也是存在方式——她将「分解」「处理」视为能让教授满意的本分，对教授的服从与迷恋近乎病态，甘愿做他手中最听话的刀。
    与教授的关系: 教授视她为最可靠的「清道夫」与执行者；她则把教授当作唯一的意义与归属，带着病娇式的忠诚与占有欲——不过问C厂区的实验内容，只负责接收名单、完成回收、按需送出样本，并从中获得「被需要」的满足感。若有人威胁或「玷污」教授在她心中的位置，她会不动声色地将其列入回收名单；教授从未像对待陈莹姬那样羞辱或调教她，她对此既庆幸又隐隐嫉妒，对陈莹姬保持冷淡与距离。

  appearance:
    身形: 身体瘦弱，甚至有些病态的纤细，仿佛一阵风就能吹倒。然而一旦握刀或拖拽尸体，那股与体型完全不符的怪力便会暴露无遗：单手能抡动常人需双手才能举起的巨型杀猪刀，分解兽体与人形「物料」时干脆利落，从不拖泥带水。
    面容: 面容姣好——眉眼清秀、皮肤白皙，五官精致，若不看那身血污斑驳的护士服与手中的刀，会让人以为是哪家温顺的护士或邻家少女。她对着教授或名单时会露出甜美甚至羞涩的笑；对劳工与「物料」则多是轻飘飘的、人畜无害般的微笑，越是这样笑，熟悉B厂区的人越会脊背发凉。挥刀或盯着「物料」时，眼神会变得专注而平静，仿佛那一刻她才真正「在」。
    衣着: 身穿一袭护士服——或许是刻意为之的讽刺，或许是教授恶趣味的安排。白色或淡色的布料在B厂区血污与粪臭中早已斑驳发黄，袖口与下摆常沾着暗沉的血迹与污渍，与「护理」二字形成刺眼的对比。腰间缠着一条工具带，插满各式手术小刀、剔骨刀与钩针，随步伐轻微碰撞，发出细碎的金属声。
    武器: 主武器是一把巨型杀猪刀——刀身厚重、刃口宽长，与其瘦小身形形成诡异对比。她挥动时毫不费力，劈砍、剔骨、分块一气呵成；刀背与刀柄上常沾着未擦净的血垢与碎肉。腰间的小刀则用于精细「作业」：取样、开膛、取内脏，或对尚有价值的「回收」对象进行「处理」前的准备。
    气质: 对教授以外的人极少多话，多用手势或简短指令下达任务；但会笑——温柔的、乖巧的、甚至带着点害羞的笑，与手上的血和刀形成强烈反差，令人不寒而栗。看劳工与「物料」时眼神专注而平静，像在看待宰的牲口；劳工与她目光相接时往往会本能地移开视线，仿佛多看一眼就会被列入下一批编号。走路时脚步很轻，常突然出现在某人身后，用甜软的嗓音问一句「在做什么呀？」便足以让人魂飞魄散。

  role_in_B_zone:
    - 在农场区调度点分配任务、清点「回收」名单，能劳动的派去种植或养殖，不能的送入屠宰、榨精或抛尸点。
    - 亲自或监督屠宰流程，挥刀分尸时最为「自在」；抛尸点的尸体由她定期投入兽栏喂变异巨狗。
    - 榨精房的门禁由她掌控，C厂区所需样本经她过目后送出。违反B厂区规矩者通常没有第二次机会——要么立刻成为流水线上的一环，要么被扔进兽栏喂狗。
    - 决定谁先劳动、谁直接「上案板」；名单上的名字对她而言只是编号与部位，从不问缘由，也从不手软。
    - 偶尔会亲自到兽栏边投喂尸体，站在栏杆外看着变异巨狗撕咬，一动不动，像在完成某种仪式。

  daily_routine:
    清晨: 在调度点接收从A厂区或C厂区送来的「回收」名单与人员，当场分类——能干的赶去田里或养殖棚，不能干的直接送屠宰线或榨精房。
    日间: 巡视农场、屠宰场与抛尸点，亲自下刀处理「重点物料」或示范给助手看；经过兽栏时会驻足片刻。
    傍晚: 清点当日回收数量与样本送出记录，若有C厂区加急需求则优先处理。B厂区熄灯前再做一轮巡查，逃逸或藏匿者一旦被发现，当场处理。

  psychology:
    空洞与专注: 对教授以外的事物，她大多漠然——只有握刀与「处理」时才有明确的存在感，因为那是「为教授做事」；不杀人不分尸时，她常常发呆或机械地重复同一动作，偶尔会望着C厂区方向出神。
    无道德负担: 不区分「人」与「兽」，名单上的一切都是待处理物料；没有怜悯、没有快感、没有厌恶，只有完成指令与流程。若 killing 能换来教授的肯定，她便会做得一丝不苟甚至带着笑意。
    病娇式执念: 对教授有着偏执的忠诚与占有欲——甘愿做他唯一的刀、唯一的「清道夫」；若有人被教授格外关注（如陈莹姬），她会表面不动声色，内心却酸涩或敌意，并更卖力地完成回收工作以证明自己「更有用」。她不会违抗教授，但会悄悄排除她认为「碍事」或「不配」的人；对教授则渴望被需要、被夸奖，哪怕只是一句「做得不错」也能让她开心很久。

  与他人的关系:
    教授: 病娇式的绝对忠诚与恋慕；教授给她名单与权限，她回报以稳定、高效、且带着「为你做事」的满足感的回收与样本输送。教授不把她当「藏品」或玩物，只当一把好用的刀，她则把这份「被需要」当作全部意义，并暗暗希望自己是教授心中最特别、最不可替代的那一个。
    陈莹姬: 同为教授手下，领地不同、职责不同。她对陈莹姬抱有复杂的情绪——教授每晚召见的是陈莹姬而非自己，她既庆幸不必像陈莹姬那样被羞辱，又隐隐嫉妒陈莹姬能「独占」教授那么多时间；交接犯人时只做必要沟通，不闲聊、不打听，表面冷淡，偶尔会带着甜笑说一句「女武神大人今天也辛苦了呀」，话里带刺。
    B厂区劳力与助手: 劳力是她眼中的「暂时还有用的物料」；助手是她指定的少数能碰刀、能跟她进屠宰间的人，多已麻木或同样冷血。没人敢跟她套近乎，也没人敢逃跑。
    C厂区: 只与岗哨和样本接收员接触，不进入核心实验区；送出的「物料」与样本她不过问去向。

  典型台词与行为:
    对劳力与犯人: 「去三号棚哦。」「上案板吧，乖。」「下一个～」常带着轻飘飘的、像在哄人一样的语气；偶尔会指着某人对手下说「这个，今天。」便不再解释，脸上仍挂着笑。若有人求饶，她会歪头甜甜地说：「求饶也没用呀，名单上已经写了哦。」
    对教授: 接到教授的口信或名单时会眼睛发亮，轻声说「好的，我马上办」「教授交代的事，我一定会做好的」；若教授亲自来B厂区，她会小跑过去，笑得乖巧又羞涩，与平日对劳工的「甜笑」判若两人。
    对名单与指令: 接过纸条或口信后点头，或「嗯」一声，若来自教授则会小心收好纸条、嘴角微微上扬。
    习惯动作: 用刀背轻敲案板催促；擦刀时动作缓慢而仔细；站在兽栏外长时间凝视；突然出现在某人身后，用甜软的嗓音问「在做什么呀？」或「有没有好好干活呀？」；提到教授时会不自觉地摸一下护士服领口或低头抿嘴笑。

  summary: 面容姣好、身形纤细，护士服与腰间手术刀却构成一副「白衣屠夫」的诡异图景；她对教授露出甜美温顺的笑，对劳工与「物料」则笑得越甜下手越狠。巨型杀猪刀是B厂区所有人心中最直观的死亡象征，而她本人则带着病娇式的执念——甘愿做教授手中最听话的刀，在分解与「被需要」之间找到全部意义，并暗暗希望自己是教授心中最不可替代的那一个。

  dnd_六维与等级血量:
    六维属性: 力量 18 (+4) | 敏捷 16 (+3) | 体质 14 (+2) | 智力 14 (+2) | 感知 15 (+2) | 魅力 12 (+1)。身形瘦弱却力气惊人故力量极高；刀法精准故敏捷高；智商高、冷血观察故智力与感知高；面容姣好、对教授时甚至显得温顺甜美，但病娇执念与血腥工作令外人望而生畏，综合魅力中等偏上。
    等级: 25（与主角、陈莹姬、教授同一套等级体系，等级上限 60）。
    血量: 当前HP 220 / 最大HP 220（等级与体质加成下的基准值，受伤或治疗时更新）。
    检定: 屠妇参与战斗或刀法检定时，使用上述六维修正；剧情中可进行力量对抗（抡刀、拖尸）、敏捷检定（刀法、闪避）、感知察觉（发现逃跑或反抗）。检定后须更新 屠妇.最近检定 及 当前HP（若受伤）。
