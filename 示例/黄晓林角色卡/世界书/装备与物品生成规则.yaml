---
装备与物品生成规则:
  title: 装备与物品生成规则（伊甸园·战后掉落与词条）
  type: setting
  desc: |
    本条目规定**战斗胜利后**装备与道具的**品质锚定**、**数值与词条分离**、**品质效果表**及**词条设计方向**。
    **本角色卡等级上限为 60**，下述敌方等级、装备等级、技能段等所有等级区间均按 **1–60** 界定。适用于：战后掉落判定、由 AI 生成新装备/道具时填写 主角.物品栏 与 主角.已装备。与「武器与装备数值规则」「装备栏位规则」「经验与掉落规则」配合使用；品级沿用六档 普通/精品/稀有/神器/史诗/传说。

  第一步_品质锚定_触发与层级:
    触发时机: "战斗**完全结算后**，由叙事判定是否掉落装备/道具；若掉落，先过本步确定「本次掉落的目标品质区间」。"
    敌方有效等级: "取**本场最高敌人等级**（1–60 与主角同体系），查下表得「基础品质」与「上限品质」。"
    层级表_敌方等级到品质:
      "Lv.1-10": "基础=普通 | 上限=稀有"
      "Lv.11-20": "基础=精品 | 上限=神器"
      "Lv.21-30": "基础=稀有 | 上限=神器"
      "Lv.31-40": "基础=稀有 | 上限=传说"
      "Lv.41-50": "基础=神器 | 上限=史诗"
      "Lv.51-60": "基础=史诗 | 上限=传说"
    说明: "本角色卡的等级上限为 60；若个别剧情需要超出 60 级的存在，可由剧情单独指定其掉落品质，不再使用本表。"

  第一步_品质锚定_检定修正:
    基础骰: "d100。"
    修正项_可叠加:
      击杀数量: "每比「最低胜利所需击杀数」多击杀 1 名敌人 +2，上限 +20。"
      战斗难度: "[困难] +5；[极难] +10；[噩梦] +15。（由世界书或叙事标记本场难度）"
      特殊条件: "[单挑 Boss] +5；[等级压制（敌方平均等级 ≥ 主角等级+10）] +10。"
    产出表_d100加修正后:
      "01-10": "品质**降一阶**（生成瑕疵品，仍不低于普通）。"
      "11-50": "保持**基础品质**。"
      "51-75": "基础品质，且**额外附加 1 条「基础品质词条」**（见词条设计）。"
      "76-95": "品质**升一阶**（不得超过「上限品质」）。"
      "96+": "升一阶，且**额外附加 1 条基础品质词条**。"
    硬约束: "最终品质**绝不可高于「上限品质」**；若本应再升则视为溢出，溢出部分转为**额外废土券**或**材料类战利品**（如拆解用零件、变异材料），不继续堆品质。"

  第二步_装备生成_通用字段与结构:
    装备类_须写入主角物品栏与已装备:
      "名称": "从废土/伊甸园/蜂巢风格命名；可与「特质商店」抽奖名称池风格一致。"
      类型: "武器 | 防具 | 饰物（与装备栏位规则对应）。"
      部位: "栏位标识：Head/Neck/Body/Back/Waist/Wrists/Hands/Feet/Trinket1/Trinket2/MainHand/OffHand，见「装备栏位规则」。"
      品质: "普通 | 精品 | 稀有 | 神器 | 史诗 | 传说。"
      等级: "1–60（建议与敌人等级接近），用于首饰额外 HP 等计算。"
      属性加成: "六维及 HP、检定等**固定数值**，由品质效果表决定；写入 物品栏 时可用 伤害骰/攻击力/固定伤害/防御 等字段，见「武器与装备数值规则」。"
      效果: "词条描述，格式为 [词条名] 具体效果；多条用分号分隔。"
      描述: "风味文字，须贴合名称与来历（蜂巢、HOT、处刑班、前军、拾荒者等）。"
    道具类_消耗品与材料:
      名称与品质: "同风格命名；品质可为普通–传说，材料多为普通/精品。"
      效果: "消耗品写回复/增益/一次性效果；材料写「用于××制作/强化」等。"
      描述: "叙事性风味。"
    战利品归属: "**装备类战利品（武器/防具/饰物）必须添加至 主角.物品栏**，装备到身体部位时更新 主角.已装备；**严禁将装备长期当作背包道具**堆放。"

  数值加成与词条_分离原则:
    数值加成: "由**品质+等级**直接赋予：六维总点、单项六维上限、首饰额外 HP、某类检定加值、技能等级加值等。按「品质效果表」严格取值；在 效果 栏可简短注明「品级加成已计入面板」。"
    词条: "独立于数值加成之外的**特殊效果**（条件触发、对特定敌人、环境、主动发动等），体现装备独特性与世界观风味；**不得重复提供品质已给的纯属性加成**。"
    词条分类:
      被动: "常驻生效（对 HOT 变异体优势、某厂区内察觉+1、环境抗性等）。"
      触发: "满足条件时激活（命中 d20≥17 时目标移速减半 1 回合、HP 首次归零时留 1 点等），须注明触发条件与持续。"
      主动: "主动使用（每长休/每场战斗 N 次，如短距瞬移、临时护盾），须注明消耗与冷却。"
      风味: "不影响战斗数值的叙事效果（永洁、微光、靠近处刑区微震等），**不占词条上限**。"

  品质效果表_六档:
    说明: "词条上限不含风味；六维为 DnD 六维；**装备等级 L 为 1–60**，与角色/敌人等级体系一致；首饰额外 HP 按 L 计算。"
    普通:
      词条上限: "0（可 +1 风味）"
      六维总点: 0
      单一六维上限: 0
      首饰额外HP: 无
      攻击或检定: 无
      技能加成: 无
      可用词条类型: 仅风味
    精品:
      词条上限: 1
      六维总点: 1
      单一六维上限: 1
      首饰额外HP: "等级×0.5"
      攻击或检定: 无（可生活类检定+1，不涉战斗）
      技能加成: 无
      可用词条类型: 被动（生活便利）、风味
    稀有:
      词条上限: "1–2"
      六维总点: 1
      单一六维上限: 1
      首饰额外HP: "等级×2"
      攻击或检定: "某单一检定+1（如对变异体攻击+1）"
      技能加成: "低级技能+1（Lv1–20 段）"
      可用词条类型: 被动、触发（简单条件、弱效果）
    神器:
      词条上限: 2
      六维总点: 2
      单一六维上限: 1
      首饰额外HP: "等级×5"
      攻击或检定: "某检定+2 或 攻击检定+1"
      技能加成: "中段技能+1（Lv21–40 段）"
      可用词条类型: 被动、触发、主动
    传说:
      词条上限: 3
      六维总点: 2
      单一六维上限: 2
      首饰额外HP: "等级×8"
      攻击或检定: "某检定+2 或 攻击检定+1（可带小范围光环）"
      技能加成: "相关系技能全+1（不含觉醒技）"
      可用词条类型: 被动、触发、主动（显著影响战斗节奏）
    史诗:
      词条上限: "3–4（须含≥1 条规则级）"
      六维总点: 3
      单一六维上限: 2
      首饰额外HP: "等级×12"
      攻击或检定: "某检定+3 或 攻击检定+2"
      技能加成: "相关技能全+2"
      可用词条类型: 全部（至少 1 条规则级效果）

  品质风味与来历:
    普通: "量产货、废土常见粗制。"
    精品: "精工非魔法、轻微改造。"
    稀有: "低级魔造/大师工匠、蜂巢制式流出。"
    神器: "有故事的魔造物、处刑班或前军遗物。"
    传说: "英雄标志、伊甸园核心流出。"
    史诗: "时代标记、规则级效果。"
    神器及以上: "装备须有来历（持有者/制作者/事件）；词条应与来历呼应，符合伊甸园/蜂巢/HOT 基调。"

  词条设计方向_伊甸园基调:
    被动_示例方向: "对 HOT 变异体攻击检定优势；在 A 厂区内察觉+1；高温/低温环境不受伤；对处刑班制式武器伤害减免等。"
    触发_示例方向: "命中 d20≥17 时目标移速减半 1 回合；穿戴者 HP 首次归零时恢复 1 HP 并倒地；对同一目标连续 3 次命中后「被锁定」状态、来自你的伤害+X% 持续 N 回合。"
    主动_示例方向: "每长休 1 次：短距瞬移 5 米并在落点造成轻度冲击；每场战斗 1 次：蜂巢式临时护盾，获得体质修正×X 临时 HP 持续 3 回合。"
    风味_不占上限: "黑暗中微光、永洁、靠近处刑区微震、沾血不锈等。"
    规则级_史诗至少1条: "改写一条基础战斗规则：如暴击时额外一次武器攻击（每轮限一次）、近战攻击视为对相邻全体扫击、短时飞行/相位移动等。"

  词条生成禁令:
    - "词条**不得重复**品质已给的属性加成（品质已写力量+2，词条不可再写纯力量+2；可写条件式如对变异体攻击+1）。"
    - "同一装备的多个**触发词条**不可共用同一触发条件（如不能都写 d20≥15；可区分命中检定、被命中、HP 阈值、环境等）。"
    - "**低品级禁止高阶词条**：普通/精品仅生活便利与风味、无战斗收益；稀有无主动与规则级；神器起才有明显触发/主动；传说/史诗才有规则级。"

  与变量和现有规则衔接:
    - "装备写入 **主角.物品栏** 时须含 描述、数量、品级、可装备部位；武器填 伤害骰/攻击力/固定伤害，防具填 防御，见「武器与装备数值规则」。"
    - "装备到身体部位时更新 **主角.已装备**，键为栏位英文名，值为物品名称，见「装备栏位规则」「变量更新规则」。"
    - "状态栏抽奖「打包带走」生成装备时，前端按「武器与装备数值规则」生成基础数值；若由 AI 在剧情中发放装备，应尽量按本条目完成品质锚定与词条设计后，再写入变量。"
