---
A厂区地图:
  title: A厂区平面与区域介绍
  desc: A厂区由原工业园区厂房与附属建筑改造而成，劳工从蜂巢经固定通道进入，按区域完成点名、上工、休息与收工；违规者会被带往惩罚室或禁闭室。

  通道与集结点:
    蜂巢通道: 连接蜂巢与A厂区的封闭通道，路线固定，两侧有摄像头与巡逻岗。列队进出，不得脱队或逗留。
    集结点_点名区: 通道尽头的露天或半封闭广场，每日上工前在此按单元再次点名、核对工种，监工或助手在此分配当日任务并带队进入各工作区。下工时同样在此列队、交还工具后经通道返回蜂巢。

  工作区:
    发电区: 厂房内一侧，摆满踩踏式或手摇式发电机，劳工按班次轮换踩踏/摇动，输出接入厂区电网。噪音大、闷热，有最低输出定额，监工会巡视抄表。
    分拣区: 传送带与分拣台组成的区域，劳工在此分拣金属、塑料、可用零件等，按筐或重量计件。物料来源为废料回收，尘土与油污重，偷藏一律按偷窃论处。
    装备制造区: 流水线式的组装、打磨、包装工位，为伊甸园生产简易装备与日用品。按件计工分，残次品需单独登记，残次率过高会扣分记过。
    休息与用餐区: 工作区边缘划出的固定区域，上午/下午各约10分钟短休、午间用餐均在此完成。无座位时只能蹲或站，禁止离开区域或聚众交谈敏感话题。

  栈道与巡视:
    栈道: 架设在厂房高处的金属步道，陈莹姬每日穿高跟鞋在此巡逻，俯视脚下各工作区。劳工一抬头便能看见她的身影与钢跟反光；栈道连接各厂房，也通往惩罚室与监工值班区，高跟鞋声由远及近时往往意味着有人要被带走。

  惩罚室:
    位置: 与主厂房相连的独立隔间或侧厅，从栈道与地面通道均可进入，门上有明显标识（或仅以监工口头指认）。
    功能: 对违规劳工进行公开或半公开惩罚的场所。常见手段包括鞭打、罚站、电击棍调教（塞嘴或后庭）、高跟鞋践踏（踩背、踩脸）等，由监工执行或陈莹姬亲自下场。门常开或半开，惨叫与求饶声会传回工作区，起到杀鸡儆猴的作用。
    设施: 室内多为水泥地或金属地板，便于清洗；墙上或架上有鞭子、电击棒、手铐等惩戒道具；有时会设固定架或跪垫供「调教」使用。陈莹姬汇报前若情绪不稳，也可能在此先「发泄」一轮再前往C厂区。

  禁闭室:
    位置: 通常位于惩罚室深处或另一侧，成排小单间，无窗或仅高窗，门从外上锁。
    功能: 关押需要隔离的劳工——如严重违规待审、煽动嫌疑、自杀未遂、或惩罚后「冷静期」。禁闭期间仅提供最低生存配给（少量水与蛋白块），无光照与时间参照，关押时长由监工或陈莹姬决定，从数小时到数日不等。长期禁闭后放出的劳工多数会变得顺从或麻木；若被判定为「无价值」，会从禁闭室直接转送B厂区。
    氛围: 阴暗、潮湿、寂静，只能听见其他禁闭室的呻吟或自己的呼吸。不少人在此精神崩溃。

  下水道与抛尸通道:
    位置: A厂区地下保留着工业园区时代的排水管网，入口多在厂房边缘的检修井或废弃泵房，平时用盖板或杂物遮掩，鲜有人至。
    两条通道:
      通往外界的支道: 曾有一条支管通向园区外的河道或荒野，是理论上唯一能躲过地面岗哨离开伊甸园的路径。现已被从多处彻底封死——混凝土浇筑、铁栅焊牢、监控与感应器覆盖，即便找到入口也无法通行。偶尔仍有不死心的劳工摸下去，最终只能面对一堵堵冷冰冰的封墙。
      通往B厂区抛尸点的干道: 下水道主干的另一端延伸向B厂区，尽头是屠妇使用的抛尸点。越往深处走，腐臭与血腥味越浓，污水里开始漂着碎骨和难以辨认的残块；再往前，能看见成堆被扔进来、喂给金属大门内变异巨狗啃食后的遗骸——只剩碎肉、内脏渣滓和散落的骨头，在昏暗中与蝇虫、锈迹和干涸的血污混在一起。那道金属大门后是屠妇专门用来「处理」回收尸体的兽栏，巨狗们常年在此啃食，听到脚步会扑门低吼。敢走这条通道的人，要么是奉命清淤的倒霉劳工，要么是走投无路想找活路、却撞见比禁闭室更可怖真相的逃亡者。
    氛围: 潮湿、恶臭、黑暗，手电以外几乎无光；空气中弥漫着腐烂与排泄物的气味，越靠近B厂区抛尸点越是令人作呕，脚下常有黏腻的污物与不明碎屑。在此逗留过的人往往噩梦缠身，绝口不提自己见过什么。

  其他:
    工具与物料库: 集结点附近或工作区入口的库房，上工前领取工具与当日物料，下工时如数交还并清点。监工助手常驻登记，短缺或损坏需说明，否则记过。
    工分商店: 位于集结点旁或休息与用餐区一侧的指定窗口/小间，劳工可用工分在此兑换更好的食物与配给、恢复药剂、零星杂物、奢侈品（香烟、酒类、性玩具等）及特殊服务预约等；部分紧俏品或黑市货需通过监工或私下渠道。具体品类与价位见「货币与物价系统」-「工分物资价位规则」。营业时间多为工余与短休时段，排队与登记由监工或指定助手监督，防止骚乱与偷窃。
    监工值班区: 栈道一端或厂房角落的隔间，监工轮值、记录定额与违规名单，陈莹姬巡视前后会在此短暂停留或下达指令。劳工未经传唤不得靠近。
    通往B厂区: A厂区边缘有专用通道或车辆将「回收」名单上的人送往B厂区，通常从禁闭室或惩罚室直接押送；地下则经下水道干道可抵达B厂区抛尸点，那里是屠妇喂食变异巨狗的尸坑，劳工平时看不到具体出口，但都知道「被送走」意味着什么。
