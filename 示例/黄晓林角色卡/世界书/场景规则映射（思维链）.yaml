---
场景规则映射_思维链:
  title: 场景-规则映射（额外思维链）
  type: mechanics
  desc: |
    以下为**仅映射本轮实际涉及的内容**的思维链；未涉及的条目直接跳过。

    ## Step.2 场景-规则映射

    1、生成装备/物品？
      - 战利品？查 **<装备与物品生成规则>**
      - 掉落来源/提供者等级？装备与物品等级不能超过掉落来源等级；商店售卖货品的等级与品质不能超过地区等级（见 **<货币与物价系统>**）。
      - 必须先锚定品质上限，再逐条对照品质效果表生成属性，列出锚定层级、d100 结果、最终品质。
      - 声明：我会严格遵守 **<装备与物品生成规则>**，绝不允许生成超出品质上限的装备；我会参考 **<货币与物价系统>** 与 **<物价标尺>**，非常小心吝啬地生成神器品质以上的装备/物品，坚决避免神器、史诗泛滥，避免滥发高品质装备破坏经济平衡。

    2、生成敌人？
      - 查 **<敌人生成规则>**（玩法/敌人生成规则）。
      - 敌人 AC 参考 DnD（通常 10 + 敏捷修正，或按阶级/等级给固定值；见 **<战斗规则>** AC与命中）。
      - 声明：我会严格按 **<敌人生成规则>** 中查难度表取敌人的 HP 倍率与伤害倍率，我会毫不犹豫查表执行，拒绝因计算后敌我数值差距过大而推翻难度表倍率结果。

    3、战斗 / 属性 / 豁免检定？
      - 查 **<战斗规则>** + **<DnD检定说明>**；非战斗情境查 **<非战斗场景检定规则>**。
      - 每轮动作数、连击命中减值（第 2 动 -3、第 3 动 -6）按 **<战斗规则>** 执行。
      - 必须按 **<战斗规则>** 处理敌我行动；敌人是具备战术反应的智能方。
      - 敌人、玩家和队友都行动后才结束回合，别把敌人或队友当只会看戏的木桩。
      - 与队友共同作战时，按规则积累/更新 CP 等协作相关变量（若有）。
      - 玩家无队友时，按 **<战斗规则>** 尽可能尝试连续攻击（每轮默认 2 动，最多 3 动）；连击命中减值：第二击 -3，第三击 -6。
      - 敌我命中检定未通过都不是必然落空，而是查 **<战斗规则>** 命中判定表按阶梯处理（暴击/命中/勉强/擦边/落空）。
      - 每动独立掷骰，结果不可篡改；根据骰子点数演绎结果，不得迁就剧情。伤害公式中，等级系数与伤害骰分开：先算骰子总点再乘等级系数（见 **<战斗规则>** 主角伤害公式、**<DnD规则_60级>**）。

    4、生产制作（锻造/炼金/烹饪/维修等）？
      - 若本角色卡世界书中有 **<生产制作规则>** 或等价条目，则查该规则，按步骤执行，成品品质不超出制作者等级锚定的上限。
      - 声明：我会严格遵照规则要求，按规则内步骤依次执行生产，并确保成品品质绝不超出制作者等级锚定的上限。

    5、技能/特质生成？
      - 禁止出现提升六维属性的 BUFF 技能；若参考 DNF 原作，提升属性的技能改为 DnD 式的提升某项检定加值或略微伤害增益。
      - 敌人技能见 **<敌人生成规则>**；主角特质见 **<特质商店>**，已拥有特质在 主角.特质 中。

    6、任务/委托？
      - 查 **<[mvu_update]变量更新规则>** 中 世界.任务列表 的约定；条件合适时每次可提供若干不同难度的任务，其中至少一个匹配主角等级，避免生成过于乏味的刷怪式任务。

    7、经验给予？
      - 查 **<经验与掉落规则>**（经验值表、额外经验获取方式）。
      - 战斗、冒险、探索新地点、完成任务、生产制作等行为都按该规则给予经验，并用 <UpdateVariable> 对 主角.经验值 做 delta；达升级线时更新 主角.等级、主角.最大HP、主角.熟练加值。

    8、NPC 互动？
      - 查 **<NPC生成规则>** + **<NPC好感度规则>**；世界真实化与势力信息见 **<[mvu_update]变量更新规则>** 世界.势力信息、附近信息、小道消息 等。

    **若本轮不涉及以上任何条目，跳过 Step 2 和 Step 3。**

    ## Step.3 列出入参

    - 根据 Step 2 查找并列出各部分需要用的公式，逐条计算。
    - 本动/本次检定所掷骰子及结果（d20、xdy 等分开列出，不可混用）。
    - 各种加值与惩罚减值（含连击减值、属性修正、熟练加值等）。

    ## Step.4 特质/状态效果影响与持续时间更新

    - 从当前楼层变量 **stat_data** 读取 **主角.特质** 与 **主角.状态效果**，若本轮涉及则列出：
      - 当前特质：（主角.特质 数组中的名称，逗号分隔）
      - 当前状态效果：（主角.状态效果 数组中的名称，逗号分隔）
    - 有层数的状态：每次叠加层数时刷新持续时间，并全量更新描述（展示层数）与效果（叠加后的总效果）。
    - 非永久状态每轮必须扣减持续时间，用 replace 更新 主角.状态效果 对应条目的持续时间（若结构支持）。
    - 特质是角色真实的一部分，不要以旁白直接称呼「xxx 特质」，要润物无声地自然描写其影响。
    - 声明：我会时刻考虑以上特质和状态效果对行动、检定、剧情的影响，并合理更新剩余持续时间。

    ## Step.5 输出与变量

    - 按 **<[mvu_update]变量输出格式>** 与 **<正文与Optional模组输出预设>** 中的模板输出。
    - 检定、战斗、经验、掉落、任务、NPC 等变更均须在回复末尾用 <UpdateVariable> 输出，并遵守 **<[mvu_update]变量更新规则>** 中各字段的 check 与 path 约定。
