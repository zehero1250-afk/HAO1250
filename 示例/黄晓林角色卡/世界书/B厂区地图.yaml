---
B厂区地图:
  title: B厂区平面与区域介绍
  desc: B厂区位于伊甸园边缘，由原工业园配套的仓储与空地改造而成，分为农场区、变异生物养殖场、农作物种植区、屠宰场与榨精房。屠妇在此统筹生产与「回收」流程，劳工终日与变异兽、腐臭和死亡为伴。

  农场区_总览与调度:
    位置与功能: B厂区的中心枢纽，多为原仓储办公室或简易板房改造的调度点。屠妇在此分配当日任务、清点「回收」名单与出入库，劳工上工前在此集合听令，下工后在此交还工具与登记。
    氛围: 冷清、压抑，屠妇很少开口，多用手势或简短指令；墙上常有生产指标与「回收」批次编号，无人敢问编号背后是什么。通往屠宰场与养殖场的通道从这里分支，空气中隐约飘着血腥与粪臭味。

  农作物种植区:
    位置: 农场区外围的露天或大棚地块，利用废土可存活的变异作物进行种植。
    功能: 为全伊甸园提供合成蛋白块的部分原料及粗粮。作物多为耐辐射、耐旱的变异品种，外观与口感诡异，但能稳定产出。
    劳作: 劳工在此进行播种、浇水、除草、采收等重体力活，无防护或仅有简陋装备，长期接触变异植株可能导致皮肤溃烂或头晕。收成一律上交，私藏即违规，违者直接进入「回收」流程。
    氛围: 尘土、农药与变异植物特有的酸腐气味；烈日或阴雨天都在户外，劳工极易中暑或感染，伤病过重者会被屠妇划入下一批「回收」。

  变异生物养殖场:
    位置: 与屠宰场相邻的成片兽栏与笼舍，部分区域与下水道抛尸点相通——金属大门内的变异巨狗即在此处喂食。
    功能: 养殖肉用变异兽（如变异巨狗、变异猪、其他可食用变异种），为屠宰场提供活体，也为C厂区提供实验用活体或「特殊样本」。抛尸点的尸体由屠妇定期投入兽栏，供巨狗等啃食，既处理「回收」残骸又节省饲料。
    设施: 兽栏多为钢筋与铁丝网围成，地面血污与粪便混杂；投食口、清洗槽与屠妇专用的「抛尸通道」清晰可辨。劳工负责喂食、清粪、驱赶与隔离，被兽咬伤者若无法继续劳动，多数会沦为下一批饲料。
    氛围: 兽吼、低吠与啃嚼骨头的声响不绝于耳；恶臭与血腥味浓重，新来的劳工常呕吐不止，待久了则麻木。屠妇偶尔会亲自巡视兽栏，瘦弱身形与惊人臂力形成诡异对比，无人敢与她目光相接。

  屠宰场:
    位置: 养殖场与农场区之间的厂房式建筑，内设流水线式的宰杀、放血、分割与初加工设备。
    功能: 将养殖场送来的变异兽（以及「回收」名单上的「人形物料」）进行宰杀与分割，产出鲜肉、内脏与骨骼，一部分送往合成蛋白块生产线供给全园，一部分经特殊处理后供给C厂区实验或储备。
    流程: 活体经通道赶入待宰区，由屠妇或指定劳工执行放血与解体；血肉、骨头与下水分类处理，废弃物与残渣通过专用管道排入抛尸点或兽栏喂狗。劳工在此接触大量血腥与内脏，心理崩溃者不在少数；受伤或「不合格」的劳工也可能被当场划入流水线另一端。
    氛围: 金属台面、挂钩、锯刀与血槽构成冰冷的生产线；血腥味、消毒水味与腐臭混合，地面永远湿滑。屠妇在此最为「自在」，她瘦弱却力大无穷，挥刀分尸时面无表情，劳工见了都会本能后退。

  榨精房:
    位置: 屠宰场内侧或与B厂区调度点相连的封闭隔间，门禁严格，仅屠妇与少数奉命执行的劳工可进，有时会有C厂区人员前来「取样」。
    功能: 从指定对象身上榨取精液，供教授用于病毒研究、人体改造或「变异人」培育实验。对象多为「回收」名单中仍具生育能力或实验价值的男性，或从A/C厂区转来的「素体」；女性对象则可能用于取卵或其他生殖样本，统一称为「榨精房」以避人耳目。
    设施: 室内为无菌或半无菌布置，有固定架、采精器、冷藏柜与登记册；对象被固定后由机械或人工方式榨取，过程冰冷且屈辱。取出的样本编号后送往C厂区或就地储存，用毕的对象视「剩余价值」决定是继续留用、送回劳动，还是送入屠宰场或抛尸点。
    氛围: 安静、冰冷、充满屈辱感。门外听不见惨叫，只有机械运转与偶尔的抽泣；进入此处的劳工要么是执行者（心理负担极重），要么是即将被榨取的「物料」——从榨精房活着出来的人，大多对「回收」二字有了更具体的理解。

  其他:
    通往A厂区: 专用通道或车辆将「回收」名单从A厂区押送至B厂区，抵达后先在农场区集合点交接，由屠妇分类——能劳动的派往种植或养殖，不能的送入屠宰与榨精流程或直接抛尸。
    通往C厂区: 精选的活体、样本与加工后的生物材料经密封通道送往C厂区，劳工不得进入；屠妇与教授定期核对清单，确保「产出」符合实验与口粮需求。
    抛尸点与下水道: B厂区抛尸点与变异生物养殖场的兽栏（巨狗等）相连，也与A厂区下水道干道相通；屠妇将「回收」残骸与屠宰废弃物投入此处喂兽，越靠近金属大门越是尸骨成堆、恶臭弥漫。
