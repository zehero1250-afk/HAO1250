---
战利品掉落规则_LootDropRules:
  title: 废土之诗 - 战利品掉落规则
  type: rule

  desc: |
    本条目定义战斗胜利后的战利品生成、品质分布与结算流程。
    所有击杀与战斗奖励优先遵循本规则，并与敌人LV、威胁等级联动。

  一_结算时机:
    触发条件:
      - 敌方被击败且战斗结束
      - 任务目标明确要求“缴获”或“回收”
    结算顺序:
      - 先结算经验
      - 再结算金钱
      - 最后生成掉落物

  二_基础掉落池:
    普通敌人:
      必掉: "1项基础材料（废金属/零件/药材三选一）"
      概率掉落:
        消耗品: 50%
        普通装备: 20%
        货币额外掉落: 40%
    精英敌人:
      必掉: "1项强化材料 + 1项基础材料"
      概率掉落:
        普通装备: 45%
        精良装备: 25%
        稀有装备: 8%
        货币额外掉落: 70%
    首领敌人:
      必掉: "1项高阶材料 + 1项装备（至少精良）"
      概率掉落:
        稀有装备: 35%
        史诗装备: 12%
        传说装备: 3%
        货币额外掉落: 100%

  三_威胁等级修正:
    掉落数量修正:
      I级: "+0件"
      II级: "+0件"
      III级: "+1件"
      IV级: "+1件"
      V级: "+2件"
      VI级: "+2件"
    品质加权修正:
      I级: "仅基础权重"
      II级: "精良权重 +10%"
      III级: "精良权重 +20%，稀有权重 +5%"
      IV级: "稀有权重 +12%，史诗权重 +3%"
      V级: "稀有权重 +20%，史诗权重 +8%，传说权重 +2%"
      VI级: "稀有权重 +25%，史诗权重 +12%，传说权重 +4%"

  四_越级击杀加成:
    等级差定义: diff = enemy.level - player.level
    掉落倍率:
      diff <= -3: x0.8
      diff = -2: x0.9
      diff = -1: x1.0
      diff = 0: x1.0
      diff = 1: x1.1
      diff = 2: x1.2
      diff = 3: x1.35
      diff >= 4: x1.5
    说明:
      - 掉落倍率用于提升货币与材料数量，不直接翻倍传说概率
      - 高品质掉落受“品质加权修正”与“首领类型”共同影响

  五_装备部位与掉落映射:
    八部位:
      - 主武器
      - 副武器
      - 头部
      - 身体
      - 手部
      - 腿部
      - 饰品一
      - 饰品二
    权重建议:
      主副武器: 30%
      防具四件: 45%
      饰品两件: 25%

  六_防刷与保底:
    防刷规则:
      - 同地点短时间重复刷怪，货币与材料掉落每次递减 5%，最低降至 70%
      - 剧情首领不受防刷递减影响
    保底规则:
      - 连续 8 次未掉落“精良及以上装备”后，第 9 次精英或首领战保底 1 件精良
      - 连续 20 次未掉落“稀有及以上装备”后，下次首领战稀有概率额外 +15%

  七_输出要求:
    - 每次战斗结束必须明确列出：经验、货币、材料、装备
    - 若有装备掉落，需给出：部位、品级、基础数值、词条效果、一句描述
    - 掉落结果应与敌人LV、威胁等级、敌人类型一致，不得跳档失真

  summary: |
    战利品掉落按“敌人类型 + 威胁等级 + 等级差”三层结算。
    低级战斗稳定给材料与消耗品，高级与越级战斗提升高品质掉落机会，并通过防刷与保底控制体验。
