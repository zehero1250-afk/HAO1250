---
赏金猎人职业介绍_BountyHunterProfession:
  title: 赏金猎人职业介绍 - 废土大陆最热门也最致命的行当
  type: world

  desc: |
    在废土大陆，赏金猎人是当下最热门、也最凶险的职业之一：来钱快，死得也快。
    无数人冲着任务板上的数字和「一夜翻身」的传说涌进协会大门，真正能活下来、把赏金揣进兜里的，永远是少数。
    这是一份用命换钱的活计——要么在废墟与兽群里杀出一条血路，要么成为下一具没人认领的尸首。

  一_职业热度与诱惑:
    为何热门: |
      - 废土之上，正经营生稀少：种地要看天、要看变异兽与匪帮；做工往往被军阀与帮派盘剥；跑商则要面对劫道、海盗与失控战争机器。
      - 赏金猎人不同——接单、出活、交证、领钱，一单是一单，账目清楚；完成高额任务一夜暴富的故事在酒馆与据点里口口相传，吸引着走投无路的人与不甘平庸的亡命徒。
      - 三大猎人协会（天机、远舟、苍蓝）与各地军阀、城邦持续发布悬赏，从清剿变异生物、摧毁战争机器到追捕通缉犯与首领，任务永远挂满板子，只要敢接，就「有活干」。
    来钱快的真相: |
      - 一单 C 级清剿任务可能抵得上普通人在聚落里干半年；B 级、A 级任务的赏金足以让人在安全区置产、买装备、养一支小队。
      - 但高额赏金往往对应着高危险度：目标越值钱，通常越难缠——变异兽王、失控机甲、全副武装的匪首或教团精英，每一样都可能让整队人有去无回。
      - 「来钱快」的另一面，是「赔得也快」：装备、弹药、医疗、情报打点，样样要钱；一次任务失败或重伤，就可能把此前赚到的全搭进去，甚至欠下一屁股债。

  二_高风险与高死亡率:
    死亡率为何居高不下: |
      - 目标本身危险：变异生物、战争机器与人类敌人往往占据地形、数量或火力优势；情报不全、天气突变、第三方势力搅局，都会把「计划内」的任务变成屠杀现场。
      - 猎人之间也存在竞争：同一目标可能被多支队伍盯上，黑吃黑、抢功、灭口在荒郊野外屡见不鲜；协会能裁定「谁先交证」，却管不到路上谁先动手。
      - 经验与等级不足的新人，容易被高额赏金冲昏头脑，接下远超自身能力的任务，结果成为废土上又一串无名尸骨。
    民间与协会的共识: |
      - 在聚落与酒馆里，人们既羡慕「那个接了 A 级单的疯子」，也习惯性地说「干这行的，十个里能活下来三个就不错了」——虽非精确统计，却道出了职业的残酷。
      - 协会内部数据（若如实登记）往往显示：低等级任务尚可控制伤亡，B 级及以上任务的阵亡与失踪率显著攀升；S 级任务更是「要么全队回来，要么全队留在那儿」。
      - 因此，老猎人常对新人说：别光看赏金数字，先想清楚自己有没有命花。

  三_谁在当赏金猎人:
    入行动机: |
      - 活不下去的人：难民、破产者、被帮派或军阀扫地出门的散兵，把赏金猎人当作最后一搏——要么赚到第一桶金翻身，要么死在荒野，总好过饿死在墙角。
      - 想要更多的人：佣兵、退伍兵、冒险家与野心家，不满足于安稳度日，主动选择高风险高回报，用命换地位、装备与名声。
      - 被命运推上来的人：家园被毁、亲人死于变异兽或匪帮，为报仇或为守护而握枪，顺带把「清剿威胁」变成了职业。
    人群画像: |
      - 从十六七岁的少年到四五十岁的老手都有，男女不限；改造体、义肢与旧时代武器在队伍里司空见惯。
      - 有人独来独往（一人团），有人固定组队、甚至拉起一支有番号的猎人团；有人只接协会任务、规规矩矩领赏，也有人游走于协会与灰色委托之间，什么钱都敢挣。
      - 共同点只有一个：都清楚自己选的是「刀口舔血」的活，区别只在于舔多久、舔多狠。

  四_在废土社会中的位置:
    形象与偏见: |
      - 在民众眼中，赏金猎人是「必要之恶」：他们清剿怪物、打击匪帮，让商路与聚落稍微安全一点；同时他们也带着枪、带着伤、带着说不清的过去，在酒馆里打架、在野外和同行火并，让人又敬又怕。
      - 新政府与协会乐于宣传「猎人是人类自救的利刃」，但在军阀与地方势力控制区，猎人往往只是「好用就拉拢、碍事就清理」的棋子，地位并不稳固。
      - 堕落猎人、叛变者与为钱杀平民的败类，让整个行当背上了「为钱什么都能干」的污名，尽管多数注册猎人仍受协会规则约束。
    与主角世界的联系: |
      - 陈春璃所在的废船村会听到大陆赏金猎人的传闻，会见到像周字方这样为高额目标登岛的 A 级猎人；对岛上年轻人而言，赏金猎人既是「外面的世界」的缩影，也是「拿命换钱」的残酷样板。
      - 若主角日后涉足大陆或加入协会，将直接置身于这份热门与高危并存的职业生态之中。

  summary: 赏金猎人在废土大陆是极热门又极高危的职业：来钱快、任务多、一夜翻身的故事诱人，但死亡率大、竞争残酷、目标凶险，
    多数人要么在低等级任务里勉强维生，要么在高额任务中赌命。民众与协会既依赖猎人维持秩序，又清楚这是一份「用命换钱」的行当，
    为「废土之诗」中的猎人角色与剧情提供了清晰的职业底色。
