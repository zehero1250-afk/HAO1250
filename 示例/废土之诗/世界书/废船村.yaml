---
废船村_Feichuancun:
  title: 废船村 (Shipwreck Village) - 歌丘岛旧港 / 主角的初始之地
  type: location

  desc: |
    废船村位于废土大陆南方的小岛「歌丘岛」的旧港口，是主角故事开始的地方。歌丘岛呈月牙形，面积约 520 平方公里，全岛人口约 1000 人；岛周沿岸布满许多废弃的船只，其中以废船村一带最为密集，废船村因而成为岛上最大的聚居点与废船最集中的区域。
    村落因遍布废弃船只而得名：锈蚀的渔船、搁浅的货轮、半沉的驳船与舢板在退潮时露出礁石般的轮廓，木板与缆绳在船与船、船与岸之间搭成通道与平台，形成一片依船而居的聚落。
    地标是一艘巨大的旧时代邮轮——「望乡号」——在不知何年的海啸或大陷落中被推上陆地，船体斜插在港口北侧，锈红的船身与断裂的烟囱成为废船村乃至歌丘岛最显眼的象征；人们常说「看见望乡号，就到家了」。

  地理与规模:
    歌丘岛: 废土大陆南方的岛屿，面积约 520 平方公里，岛屿呈月牙形；岛上有低矮丘陵与少量可耕种地，南侧受洋流影响相对湿润，废船村所在的旧港位于东岸。岛周沿岸布满许多废弃的船只——搁浅的、半沉的、冲上礁滩的——其中以废船村一带最为密集，废船村因此得名且成为全岛废船最集中的区域。
    废船村范围: 以旧港口为中心，北至望乡号船尾、南至防波堤残骸、东临礁滩与浅海、西接岛内小路；实际居住与活动区域集中在船只与码头之间，约数百亩。
    人口: 约 1000 人（含歌丘岛其他零散聚居点则全岛共约 1000 人）；废船村内常驻约 600～800 人，其余分布在岛内小村落、灯塔或渔寮。

  废船村北部森林_秘密实验室:
    位置与外观: 废船村北侧、望乡号以北的岛内森林深处，藏有一处旧时代的秘密实验室。大门以厚重的金属与复合材质封死，结构极其坚固，岛上的人从未成功打开过；随岁月流逝，入口被藤蔓与绿植层层覆盖，若不细察极易与山壁或树丛混为一谈，只有熟知路径或偶然闯入者才会发现那道紧闭的舱门。
    岛上人的认知: 岛上居民大多只当它是「打不开的怪房子」或「战争留下的废堡」，长老会与护港队也未曾掌握开启方法；有人传说里边是军火库或病毒库，有人则干脆避而远之，视之为不祥之地。
    内部真相: 实验室内部封存着一枚诺亚的人格芯片（人格模块）——与诺亚同源，但并非那六枚能解锁旧世界尖端武器、战争机器网络、轨道武器、卫星监控与能源系统的「真·诺亚芯片」；这枚人格芯片没有上述网络权限，且未经历诺亚战争，对战后世界的变化毫无预期。目前仅以芯片形态存在，需插入载体才能提供视觉与交互等功能，具体载体尚未设定。

  望乡号_地标邮轮:
    外观: 旧时代大型邮轮，船名「望乡号」；船体锈蚀呈暗红褐色，多处铆钉脱落、舷窗破损，烟囱已断裂一截，甲板上可见锈蚀的泳池与躺椅残骸。船身因搁浅而向港口内侧倾斜约 15 度，一侧吃水区永远离开海面，另一侧仍与退潮时的浅滩相接。
    现状用途: 船体内部被分隔成多层居住区与仓库——上层多为长老会、议事厅与少数有地位的住户；中层为集市、工坊与集体宿舍；底舱与轮机舱则用作储藏、机房或「不宜见光」的场所。甲板在天气好时会举办集会或晾晒渔网、海带。
    象征意义: 废船村与歌丘岛的精神地标；外来者以「望乡号」为导航参照，村民以「住在望乡号下」为归属与认同。

  聚落结构:
    船居: 多数人家住在改造过的船舱或甲板棚屋里，船与船之间用木板、绳索与废旧浮筒连接；涨潮时部分通道会被海水没过，居民习惯看潮汐作息。
    岸上区: 港口西侧有少量依山搭建的木板屋与石砌地基，多为仓库、冶炼小工坊或不愿住船的人家；再往西即进入岛内，有零散农田与取水点。
    码头与栈桥: 旧港口残存的混凝土码头与木制栈桥仍在使用，供渔船停靠、卸货与交易；退潮时滩涂上会露出更多沉船残骸与废铁，捡荒者常在此搜寻。

  生计与物资:
    渔业: 近海捕捞是主要生计；渔船多为小型改装船或从废船中修复的机动艇，渔获以鱼、贝类与海带为主，部分晒干或腌制作储备与交易。
    捡荒与拆船: 从搁浅船体中拆取金属、电缆、仪表与未朽木材是重要补充；有专门「拆船帮」负责评估与拆解，与长老会分成。
    贸易: 岛上产出有限，需与大陆或其他岛屿交换粮食、药品与工具；偶有大陆来的商船或漂流者在废船村停靠，码头旁有简易「外埠市」。
    饮水与作物: 岛上有几处淡水泉与蓄雨水池；西侧坡地有少量耐盐作物与番薯田，收成勉强补充口粮。

  人群与秩序:
    长老会: 由几家大姓与望乡号上层住户组成的议事组织，负责调解纠纷、分配拆船权与对外交涉；无正式军队，仅有「护港队」十余人，负责守夜与驱赶海盗或变异兽。
    日常氛围: 生活清苦但尚可维系；邻里多相识，潮汐、风暴与大陆的动荡是共同话题。节日或丰收时会集中在望乡号甲板或码头聚餐、唱歌——「歌丘」之名即来自早年有人在丘上望海而歌的传说。
    主角的定位: 主角的初始之地即废船村；本作主角为陈春璃，废船村孩子王，详见「陈春璃」条目。

  感官与氛围:
    视觉: 锈蚀的船体、灰蓝的海与天、晒着的渔网与鱼干、木板与绳索交错的通道；望乡号在晨雾或夕阳中轮廓巨大而沉默。
    听觉: 潮水声、船身与缆绳的吱嘎声、鸥鸟叫、人声与敲打金属声；风暴来时则是风啸与浪拍船壳的轰鸣。
    气味: 海盐、锈、晒鱼与海带的腥咸、木柴与劣质油的烟味；底舱与仓库常有霉与潮气。

  summary: 废船村是歌丘岛旧港上的船居聚落；歌丘岛呈月牙形，岛周废船密布，以废船村一带最多。以搁浅的巨型邮轮「望乡号」为地标，约 600～800 人依废弃船只与码头为生。废船村北部森林深处有一处大门紧闭、从未被岛上人打开过的秘密实验室，随岁月被绿植覆盖，内里实则藏有一枚诺亚的人格芯片（非能解锁战争机器等网络的「真·诺亚芯片」，载体未定）。这里是主角的初始之地，故事从此处展开。
