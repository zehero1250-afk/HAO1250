---
赏金首领系统_BountyBossSystem:
  title: 赏金首领系统 - 首领等级与赏金规则
  type: rule

  概述: |
    赏金首领指在天机猎人协会及其分区（远舟猎人协会、苍蓝猎人协会）悬赏榜上被特别标记、危险度与影响力远超一般目标的个体或团体首脑。
    可以是人类（军阀头目、教团领袖、堕落赏金猎人）、变异生物、战争机器，甚至是机械与生物结合体。
    本系统用于统一赏金首领的等级、字段与结算规则，便于「废土之诗」中稳定描写与扩展。

  一_首领等级_BossRank:
    等级说明: |
      I 级（地方小首领）:
        - 只在局部区域有名，威胁主要集中在一城一镇或单一村落。
        - 通常由 C～B 级任务覆盖，可由 D～C 级猎人或小型队伍处理。
      II 级（区域首领）:
        - 在一个大区域内有名（如某西部废城、某南部港口），拥有稳定手下或固定巢穴。
        - 对贸易或安全有持续影响，常常长期占据区域赏金榜。
      III 级（跨区名声首领）:
        - 多个区域都听过其名，行为会改变一条商路或数个聚落的格局。
        - 常被天机猎人协会本部单独立案，由白银以上猎人队伍处理。
      IV 级（大陆级威胁）:
        - 牵动多个势力与协会，高额悬赏、长期追捕对象。
        - 如大型军阀头目、恐怖教团教主、特殊变异兽王等。
      V 级（传说级首领）:
        - 事关诺亚遗产、红狼、六枚芯片或世界格局本身。
        - 多为机密或传说中的存在，信息高度封锁，仅极少数人知其真貌。
    等级与任务对应: |
      - I～II 级: 通常对应 B 级及以下任务，可由 D / C 级猎人参与。
      - III 级: 多为 A 级任务，需 B 级以上猎人小队参与。
      - IV 级: 多为 A～S 级任务，由 A 级以上猎人队伍执行。
      - V 级: 必然标记为 S（或 EX）级机密任务，仅开放给 S / EX 级猎人，且须签署严苛保密协议。

  二_赏金首领字段模板_BossFields:
    字段说明: |
      每个赏金首领条目应至少包含以下字段：
      - 名称: 正式姓名 + 常用外号（如「绞肉侯」「浪港鲨王」等）。
      - 类型: 人类 / 变异生物 / 战争机器 / 机械与生物结合 / 混合势力。
      - 等级_level: I～V 级。
      - 悬赏金额_bounty: 数值 + 货币单位（g，代表复兴币）+ 悬赏是否累积（杀更多人/犯更多事会涨价）。
      - 悬赏来源_issuer: 天机协会本部 / 远舟 / 苍蓝 / 新政府部门 / 某军阀 / 某城邦 / 多方联合等。
      - 活动区域_region: 主要出没地、势力范围（如“西部黑石城周边废墟”“南部浪港外环海域·岛链”等）。
      - 威胁概览_threat: 一段话概括战斗力、指挥力、特殊能力、手下规模。
      - 罪状与立案理由_charges: 列出其被悬赏的核心原因（屠杀、叛乱、海盗、绑架、诺亚遗产相关、红狼同党嫌疑等）。
      - 与大局的关联_meta: 是否和红狼、诺亚芯片、新政府派系斗争有关；击杀或捕获会如何改变势力格局。
      - 特殊规则_rules: 必须生擒 / 死活不论 / 仅限情报 / 不得引发大规模冲突 / 需秘密执行等特别要求。
      - 剧情钩子_hooks: 该首领能给主角带来的事件入口：接任务方式、可能的反转（其实被冤枉/掌握真相）、潜在的结盟或背叛点。

  三_赏金结算与声望系统:
    悬赏结算: |
      - 基础报酬: 按任务书约定，由发布方支付（以 g 为单位的复兴币为主，辅以武器装备、物资等奖励）。
      - 附加奖励: 若猎人带回可利用的情报、技术、武器样本、活体俘虏，可追加情报赏金或装备赏。
      - 特殊首领: 涉及红狼、六枚芯片、诺亚遗产的 V 级目标，可能包含「荣光城永久准入权」「新政府军/协会职位」「封锁消息奖励」等特殊回报。
      - 协会管理与运营费用: 所有由正式注册猎人通过协会结算的赏金任务，在结算时须按总金额的 20% 向所属协会/新政府缴纳管理与运营费用（含情报系统维护、任务体系运转与名义上的“治安维护费”），
        猎人实际到手金额为公示赏金的约 80%；外包猎人/独立承包人承接的部分公开任务，若与委托方直接结算，则可按各地协会规定减免或不收取该费用。部分腐败严重地区可能在此基础上额外「加收」费用。
    猎人声望与通缉: |
      - 完成高等级首领任务会显著提升猎人在天机/远舟/苍蓝的声望，解锁更高等级任务与装备。
      - 若猎人在执行首领任务中违反规则（杀害平民、私吞关键芯片、放跑目标、泄露机密），可能被降级、吊销资质，甚至被反向列为「赏金首领」（猎人堕落线）。

  四_样例模板_示例:
    示例_通用模板: |
      某赏金首领_示例:
        名称: 示例名（外号）
        类型: 人类
        等级_level: II
        悬赏金额_bounty: 8000g（由某西部城邦与远舟猎人协会联合发布，金额可随罪行累积上调）
        悬赏来源_issuer: 远舟猎人协会 / 西部黑石城议会
        活动区域_region: 西部黑石城周边废墟与戈壁带
        威胁概览_threat: >
          率领约三十人的全副武装匪帮，擅长伏击商队与袭击资源车队，拥有数辆改装战车与一台勉强可用的旧时代机枪塔；
          本人枪法与近战能力均在合格猎人之上。
        罪状与立案理由_charges: >
          近三年内多次袭击黑石城至边境的商路，造成至少五十余人死亡与数十车物资损失；
          拒绝缴纳保护费并袭击远舟协会任务队伍，被列为区域首要清除目标。
        特殊规则_rules: >
          死活不论；如能带回其使用的异常武器或芯片样本，可获额外情报赏金；
          禁止在黑石城城区内动手，以免引发大规模骚乱。

  五_与现有设定的挂钩:
    挂钩说明: |
      - 天机猎人协会负责 V 级及 S 级相关首领（尤其涉及红狼、诺亚芯片）的统一立案与调度；
      - 远舟、苍蓝猎人协会则负责本区 I～III 级首领的日常悬赏与局部 IV 级目标；
      - 周字方等 A 级赏金猎人多会接触到 III～IV 级首领任务，偶尔被卷入 V 级事件；
      - 若未来将红狼本身，或与他对立的新政府高层、军阀头目写成「赏金首领」，可直接套用本规则，给出 V 级与超高赏金及特殊政治后果。

