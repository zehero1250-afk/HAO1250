---
物品价格规则_ItemPricingRules:
  title: 废土之诗 - 物品价格与装备品级规则
  type: rule

  desc: |
    本规则用于统一「废土之诗」中的物价、赏金结算、装备品级与装备词条生成逻辑。
    目标是让交易、掉落、任务奖励、装备强度保持可预期且可扩展。

  一_货币与计价单位:
    复兴币:
      - 统一货币单位为 g（复兴币）。
      - 城邦、协会据点、任务赏金以 g 结算。
      - 边缘聚落可物易物，但建议折算成 g 便于变量更新。
    物易物:
      - 弹药、净水、药品、废料、口粮可直接交换。
      - 若涉及变量更新，仍需给出折算价值。

  二_价格浮动因素:
    地区:
      - 安全区/城邦：接近参考价。
      - 边缘聚落：常见 1.2~2.0 倍。
      - 战区/重污染区：可达 2.0~4.0 倍。
    稀缺:
      - 战乱、灾后、疫情会推高药品与弹药价格。
      - 丰收季口粮略降价，严冬补给品涨价。
    身份:
      - 协会猎人常见 85%~95% 折扣。
      - 被通缉或敌对身份可被抬价或拒售。
    黑市:
      - 违禁品无上限，但风险极高。
      - 常规物资可能便宜但来源不明。

  三_常见物品参考价_单位g:
    口粮与饮水:
      日份口粮: 2~5
      合成蛋白块: 3~8
      净水1升: 1~4
      密封口粮包: 8~20
    弹药与消耗:
      手枪弹_单发: 1~3
      步枪弹_单发: 2~6
      霰弹_单发: 4~12
      手雷_单枚: 30~90
      废料_单位: 0.5~3
    药品治疗:
      消毒绷带包: 5~15
      医疗包: 20~50
      抗辐射药剂: 25~80
      止痛/兴奋药剂: 15~60
    武器防具:
      简易近战武器: 20~80
      锈蚀/土制枪械: 80~300
      制式手枪: 200~600
      制式步枪: 400~1200
      军用级装备: 1000+

  四_任务与变量衔接:
    角色gold:
      - gold 以 g 计；交易、任务报酬、赏金结算按规则增减。
    常规任务报酬:
      - D/C级：50~200 g
      - B/A级：200~800 g
      - S/EX与首领任务：按首领定价系统
    掉落变卖:
      - 通常按参考价 30%~60% 估算。
    变量更新:
      - 涉及 gold/ammo/medkit/scrap 等变化时，必须写入 `<updatevariable>`。

  五_赏金首领按等级定价系统:
    原则:
      - 先定首领等级，再定悬赏金额。
      - 金额必须落在该等级区间附近，超出需给理由。
    等级区间_单位g:
      I级_地方小首领: 1000~5000
      II级_区域首领: 5000~15000
      III级_跨区名声首领: 15000~40000
      IV级_大陆级威胁: 40000~120000
      V级_传说级首领: 120000~500000+
    推荐基准价_单位g:
      I级: 3000
      II级: 9000
      III级: 25000
      IV级: 70000
      V级: 180000
    修正系数:
      类型:
        人类首领: x1.00
        变异生物首领: x1.10
        战争机器首领: x1.20
        机械生物融合首领: x1.25
      区域风险:
        普通区域: x1.00
        边缘危险区: x1.15
        战区或重污染区: x1.30
      结算要求:
        死活不论: x1.00
        生擒优先: x1.35
        必须活捉并完整押送: x1.60
      罪行累积:
        每新增重大罪行: +5%~15%
        连续未处理且新增伤亡: 每周 +3%~8%
    计算:
      公式: 最终公示赏金 = 推荐基准价 × 类型 × 区域风险 × 结算要求 × 罪行累积
      取整: 向上取整到100g；IV/V级可取整到1000g。
    协会结算:
      默认到手: 公示赏金 × 80%（20%协会抽成）
      示例: 25000g -> 到手约20000g

  六_装备品级生成规则:
    目标:
      - 根据装备品级快速给出“基础数值、效果词条、装备描述、价格范围”。
      - 生成结果应可直接用于掉落、商店售卖、任务奖励。
    品级定义:
      普通:
        颜色: 灰白
        强度定位: 入门/过渡
        词条数量: 0~1
      精品:
        颜色: 绿色
        强度定位: 可长期使用
        词条数量: 1~2
      稀有:
        颜色: 蓝色
        强度定位: 明显优于常规
        词条数量: 2~3
      史诗:
        颜色: 紫金
        强度定位: 高强度核心装备
        词条数量: 3~4
      传说:
        颜色: 金红
        强度定位: 顶级/剧情关键装备
        词条数量: 4~5
    基础数值区间:
      武器_基础攻击:
        普通: 6~10
        精品: 9~14
        稀有: 13~19
        史诗: 18~26
        传说: 25~36
      护甲_基础防御:
        普通: 3~6
        精品: 5~9
        稀有: 8~13
        史诗: 12~18
        传说: 17~25
      饰品_基础加成总值:
        普通: +1~2
        精品: +2~4
        稀有: +4~7
        史诗: +7~11
        传说: +11~16
    效果强度规则:
      词条强度_百分比类:
        普通: 3%~6%
        精品: 6%~10%
        稀有: 10%~16%
        史诗: 16%~24%
        传说: 24%~35%
      词条强度_数值类:
        普通: +1~2
        精品: +2~4
        稀有: +4~7
        史诗: +7~11
        传说: +11~16
      词条类型建议:
        武器:
          - 伤害提升
          - 暴击率提升
          - 对某类敌人增伤
          - 命中后附加状态（流血/灼烧/减速）
        护甲:
          - 受击减伤
          - 抗辐射
          - 异常抗性（中毒/流血）
          - 体力消耗降低
        饰品:
          - 搜刮收益提升
          - 交易折扣
          - 移动速度提升
          - 技能冷却缩短
    价格映射_单位g:
      普通: 80~300
      精品: 250~900
      稀有: 800~2600
      史诗: 2400~9000
      传说: 8500~30000+
    装备描述模板:
      必填字段:
        - 名称
        - 品级
        - 装备部位
        - 基础数值（攻击/防御/加成）
        - 效果列表（名称+描述）
        - 背景描述（1~2句）
      生成格式示例: |
        名称: 裂齿短霰
        品级: 稀有
        装备部位: 武器
        基础攻击: 15-20
        效果:
          - 近距爆裂: 近距离命中时额外造成 12% 伤害
          - 装填冲刺: 换弹后 3 秒内移动速度 +8%
        描述: 由拆船帮改造的近战霰弹枪，枪口锯齿能在贴脸火拼时撕开护具。
    AI使用约束:
      - 生成装备时，品级必须与基础数值和词条数量一致。
      - 禁止“普通品级却拥有传说级词条”。
      - 传说装备应附带更强叙事背景，可关联首领掉落或任务线。

  九_装备属性落地与成长映射:
    核心原则:
      - 装备加成属于独立成长来源，必须与升级成长分开记录。
      - 玩家自身成长写入 player.baseStats。
      - 装备提供的数值写入 equipmentBonus。
      - player.maxHp / player.atk / player.def / player.speed / player.crit 为当前最终值，用于战斗与状态栏展示。
    装备加成建议:
      武器:
        - 主要提供 atk，少量提供 crit。
        - 稀有及以上武器可附带 speed 或特殊 notes。
      头部与躯干:
        - 主要提供 def 与 maxHp。
      手部与腿部:
        - 主要提供 speed、def，少量提供 atk。
      饰品:
        - 主要提供 crit、speed、maxHp 或特殊 notes。
    结算规则: |
      发生换装、获得新装备、装备损坏或装备强化时：
      1. 先更新 equipment 对应槽位。
      2. 再更新 equipmentBonus。
      3. 最后同步刷新最终属性：
         player.maxHp = player.baseStats.maxHp + equipmentBonus.maxHp
         player.atk = player.baseStats.atk + equipmentBonus.atk
         player.def = player.baseStats.def + equipmentBonus.def
         player.speed = player.baseStats.speed + equipmentBonus.speed
         player.crit = player.baseStats.crit + equipmentBonus.crit
      4. 若 player.hp 高于新的 player.maxHp，则将 player.hp 压到 player.maxHp。
    装备成长定位:
      - 升级解决基础成长。
      - 装备解决短中期强度跃升。
      - 首领掉落、任务奖励、商店购买都可成为装备成长来源。
    词条自动映射:
      - 当生成装备词条时，必须同步拆解为数值并写入对应装备详情与 equipmentBonus。
      - 规则优先级：部位基础值 > 品级修正 > 词条附加值 > 特殊 notes。
      - 每件装备的数值写入 equipmentMeta.对应槽位。
      - 全身合计后的装备收益写入 equipmentBonus。
    自动映射示例:
      - "攻击力提升 +2" -> equipmentMeta.mainWeapon.atk = 2，并累加到 equipmentBonus.atk
      - "暴击率 +1%" -> equipmentMeta.accessory1.crit = 1，并累加到 equipmentBonus.crit
      - "最大生命 +4" -> equipmentMeta.chest.maxHp = 4，并累加到 equipmentBonus.maxHp
      - "移动速度 +1" -> equipmentMeta.legs.speed = 1，并累加到 equipmentBonus.speed
      - "受击时冲击削减" -> 写入 equipmentMeta.chest.effects，同时摘要写入 equipmentBonus.notes

  summary: |
    本规则统一了废土经济与装备生成逻辑：常规物价用于交易和掉落估值，首领赏金按等级定价并支持系数修正，
    装备则按品级自动映射基础数值、词条数量、强度和描述模板，便于跑团时稳定产出可用装备数据。
