---
猎人协会通用规则_HunterGuildRules:
  title: 猎人协会通用规则 - 等级、任务与行为规范
  type: rule

  概述: |
    本规则为新政府统辖下三大猎人协会（天机猎人协会、远舟猎人协会、苍蓝猎人协会）共用的基础制度框架。
    各地协会在此基础上可因地制宜增删细则，但等级体系、任务分级与基本行为规范在名义上保持一致；
    实际执行力度与腐败程度，则取决于当地协会与军阀的管理水平。

  一_猎人类别与等级体系:
    猎人类别: |
      协会在名义上区分两类执行者：
      - 正式注册猎人（简称“协会猎人”）：拥有 E～EX 等级的正式成员，可享受协会提供的部分装备折扣、情报服务与有限医疗/抚恤等福利；
        作为交换，其通过协会结算的正式任务，需要按照赏金首领系统中约定的比例（默认 20%）缴纳协会管理与运营费用。
      - 外包猎人/独立承包人：以单次或短期合同形式与协会合作的自由人，不参与等级体系与长期福利，也不享受协会提供的优惠装备、医疗保险与安全屋等保障；
        通常只被允许接取部分公开任务，若直接与委托方结算，协会管理费可以减免或仅收取少量处理费，但相应难以接触高危机密任务。
    猎人等级体系:
    等级说明: |
      猎人等级采用 E / D / C / B / A / S / EX 七档，从低到高依次为：
      - E 级: 新手/学徒，仅能接低风险跑腿与协助任务，多为本地生计型角色。
      - D 级: 初级猎人，可独立处理零散小型变异生物、简易护送与基础清剿任务。
      - C 级: 标准职业猎人，可参与中等危险任务，是大多数任务队伍的主力。
      - B 级: 高级猎人，具备带队能力，可承担高危区域任务与区域级首领狩猎的主力。
      - A 级: 顶尖猎人，少数精英，可执行跨区任务、复杂遗迹探索与 IV 级首领狩猎。
      - S 级: 特级猎人，极少数人持有的等级，通常由天机猎人协会本部记录与调度。
      - EX 级: 传说级/特殊登记，常与诺亚遗产、红狼或极端危险目标绑定，并不一定对外公开。
    等级与任务权限: |
      - E 级: 仅可接 D 级以下、标记为低危的辅助任务（跑腿、物资搬运、侦察协助）。
      - D 级: 可接 D 级与部分 C 级任务，不得单独接 A 级及以上任务。
      - C 级: 可接 C / B 级任务，小队形式可参与部分 A 级任务。
      - B 级: 可接 B / A 级任务，小队形式可参与部分 S 级任务。
      - A 级: 可接全部 A 级任务，并可视协会审核结果接部份 S 级任务。
      - S / EX 级: 可接 S 级及 EX 级机密任务（特别是红狼、诺亚芯片、诺亚遗产相关），须签署严格保密协议。

  二_入会与晋升:
    入会条件_基础: |
      - 年龄: 一般要求年满 16 岁（部分地区在军阀/城邦特殊许可下会降低要求）。
      - 身体状况: 无严重影响战斗或执行任务的疾病与残疾（改造体与机械义肢可视为合格）。
      - 背景审核: 无被协会公开通缉或重大恶性事件记录；部分地区会接受“自首洗白”的前匪徒。
    晋升机制_概述: |
      - 依据完成任务数量、难度、队友与委托方评价、违规记录进行综合评估。
      - 低等级（E→D→C）往往只需累计完成一定数量任务并通过基础考核。
      - 中高等级（C→B→A）需通过协会组织的专门考核（模拟任务、实战比试），并由至少两名高一级别猎人或协会官员推荐。
      - S / EX 级通常为邀请制，由天机猎人协会本部或地方协会领袖、军阀等以「特别许可」方式授予，多伴随政治与情报考量。

  三_任务规则_通用:
    任务接取: |
      - 猎人须通过所属协会的任务板、终端或专门接待处接取任务，不得私下接受未备案的「协会任务」名义委托。
      - 对于跨区域或高危任务，需经协会工作人员确认组队人数、装备情况是否达标。
      - 协会默认鼓励以「小队/团体」形式执行任务，一般推荐 3 人及以上成团；但只要等级与任务难度相符，亦允许登记「一人团」单兵行动。
      - 小队/团体可自行申报队名，名称经协会登记后可用于任务榜、公示与内部记录，如「废船突击队」「南湾清道夫」等。
    任务执行: |
      - 猎人需尽力达成任务目标，尊重任务书中的「限制条件」（如禁止大规模附带破坏、不得牵连平民、禁止越界进入某些势力核心领地）。
      - 在任务执行中发现超出原委托范围的重大威胁（如未登记首领、未知遗迹入口等），应记录并在事后向协会报告。
    任务汇报与结算: |
      - 完成任务后需在限定时间内回到协会提交证据（目标遗骸、影像记录、证词、物品），由协会进行核验。
      - 经确认无误后，按任务书约定以 g 为单位发放复兴币，附带约定好的装备或物资。
      - 对于争议任务（多支队伍同时声称完成），由协会根据证据权重、时间先后与现场记录进行裁定。

  四_行为规范与禁令:
    基本行为规范: |
      - 不得在无正当理由的情况下杀害平民或与任务无关的非敌对目标。
      - 不得在协会场所内动武（除非协会允许的比试或演练），违者视情节严重程度处以罚款、停权或除名。
      - 有义务在合理范围内协助其他猎人或平民进行紧急救援（如遇大型怪物袭击聚落）。
    严重禁令: |
      - 禁止私吞与任务目标直接相关的关键物品（如诺亚芯片、核心武器、重要情报载体）。
      - 禁止伪造任务记录、冒领他人战果或故意隐瞒重大威胁信息。
      - 禁止在未获授权的前提下，对天机猎人协会、远舟/苍蓝协会的高级官员或重要设施发动袭击。
      - 禁止擅自传播与红狼或诺亚芯片真相相悖的消息（此条因新政府政治因素而存在，实际执行力度因地区而异）。

  五_违纪处理_通用:
    处罚级别: |
      - 轻度: 口头警告、书面警告、少量罚款或暂时冻结部分任务权限。
      - 中度: 降级处理（如 B→C）、暂停接取任务、列入观察名单。
      - 重度: 吊销协会猎人资格、列入黑名单，并通报其他地区协会。
      - 极重: 由协会或新政府发布通缉令，将其列为「人类敌人」或「赏金首领」，悬赏追捕。
    地区差异: |
      - 天机猎人协会本部在北部执行处罚相对标准且程序化；
      - 远舟与苍蓝猎人协会在军阀与地方势力影响下，处罚往往带有强烈的政治与利益色彩，同一违规行为在不同地区可能得到截然不同的处理。

  六_地方执行差异与管理程度:
    管理程度高的协会: |
      - 会较严格执行本规则，对猎人行为进行持续监督与评估，确保赏金制度在一定程度上维持秩序而非制造混乱；
      - 腐败与黑箱操作较少，猎人更倾向于信任协会的裁决与结算。
    管理程度低的协会: |
      - 规则流于形式，处罚随意甚至可用金钱或关系摆平；
      - 猎人之间更依赖私下「江湖规矩」或军阀命令行事，协会仅作为任务信息发布与结算的松散平台；
      - 这类地区更适合作为「自由世界」的冒险舞台，规则可以被挑战、扭曲甚至改写。

  summary: 猎人协会通用规则确立了 E～EX 七档猎人等级、任务权限与基础行为规范，
    由天机猎人协会制定并推广至远舟与苍蓝等地区协会，各地在此框架下因地制宜增删细则。
    名义上所有猎人都受此约束，实际执行力度则取决于地方协会与军阀的管理水平，为「废土之诗」提供了既有秩序又能被打破的规则基础。

