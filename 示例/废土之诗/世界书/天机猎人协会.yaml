---
天机猎人协会_及分部_HunterUnions:
  title: 天机猎人协会与远舟、苍蓝猎人协会 - 废土时代的官方狩猎网络
  type: world

  概述: |
    为了在不耗尽正规军力的前提下清理废土上残留的危险生物与战争机器，新政府（人类复兴联合政府）在公元 2080 年先是组建了「联军志愿部」；
    在惨重牺牲与人手不足的现实压力下，于 2088 年将其制度化、民间化，重组为「天机猎人协会」，并鼓励各地军阀和城邦仿照建立地区性猎人协会。
    天机猎人协会总部设在当时的首都「荣城」（后改名为荣光城），负责制定统一赏金规则、登记猎人、发布高危目标。

  一_时间线:
    2080_联军志愿部成立: |
      - 成立主体: 刚建立不久的人类复兴联合政府，新政府军队内部。
      - 目的: 从正规军中征集「志愿者」组成机动部队，剿灭仍在世界各地活动的危险变异生物与自动化战争机器。
      - 现实问题: 废土大陆过于辽阔、危险目标过多，而联军本身兵力有限、补给紧张；志愿部在多次远征中伤亡惨重，士气与支持度不断下降。
    2088_天机猎人协会成立: |
      - 重组: 出于「保全正规军实力」和「节约财政」的考量，新政府在 2088 年将联军志愿部正式重组为「天机猎人协会」。
      - 核心思路: 不再依赖正规军四处出动，而是通过设立公开悬赏与任务，将危险目标外包给废土上仍有战力的幸存者、敢死队与民间猎人。
      - 名称寓意: 「天机」象征对危险情报与目标信息的掌控，也暗示协会掌握着部分前文明机密资料。
    总部_荣城/荣光城: |
      - 总部位置: 协会总部设在新政府首都——先为「荣城」，2095 年改名为「荣光城」。
      - 职责: 负责制定统一的赏金标准与任务评级，登记官方认可的猎人与小队，管理跨区域高危任务与情报。
    地区扩张_军阀出资: |
      - 出资要求: 袁世光意识到单靠新政府财政难以覆盖全大陆，于是要求已被纳入体系的各地军阀与势力自行出资，在各自辖区建立附属猎人协会。
      - 结果: 在西部与南部两个关键区域，先后出现了两大地区性猎人协会——「远舟猎人协会」与「苍蓝猎人协会」，名义上受天机猎人协会规制，实则兼具地方势力工具与经济组织的双重身份。

  二_天机猎人协会_本部:
    定位: |
      - 性质: 由新政府主导的半官方、半公会性质的猎人组织，是全大陆赏金制度与高危任务的「总后台」。
      - 职能: 统一发布或审核 S 级/跨区域任务，管理最高等级的猎人与小队；维护赏金榜、黑名单与「危险区域」标注。
    组织结构_简要: |
      - 议事层: 由新政府军方代表、情报部门、财政部门与协会元老组成，决定赏金政策与最高危目标的处理方式。
      - 执行层: 负责日常任务发布、猎人登记、赏金结算与情报收集；同时监管各地分会是否按规则行事。
    对外形象: |
      - 在新政府宣传中，天机猎人协会是「人类自救的英勇群体」与「守护文明边界的利刃」；
      - 在废土民间眼中，它既是机会（赚钱、出头），也是危险（高死亡率、被利用）的代名词。

  三_远舟猎人协会（西部）:
    背景: |
      - 区域: 废土大陆西部——多为高原、峡谷、沙漠与残破工业带，交通不便但资源与旧军工设施丰富。
      - 成立: 按新政府要求，由西部数个大型军阀与城邦共同出资，建立地区性附属协会「远舟猎人协会」。
    定位与风格: |
      - 名称寓意: 「远舟」象征在无垠荒漠与废土上像船一样穿行的车队与猎人，是在绝境中远行的人。
      - 任务特点: 长距离护送、沙漠与高原的危险生物清剿、旧军工设施与矿区的怪物与机器处理，时常需要车队与重装武器。
    与军阀关系: |
      - 实际上深受当地军阀影响，部分任务本质上是替军阀清理异己或争夺资源；
      - 但对普通猎人而言，只要钱到位任务清晰，背后政治常常被忽略。

  四_苍蓝猎人协会（南部）:
    背景: |
      - 区域: 废土大陆南部——沿海、群岛、湿热雨林与废弃港口众多，环境复杂且多水域与岸线。
      - 成立: 按新政府要求，由南部沿海城邦与海上势力出资，成立「苍蓝猎人协会」。
    定位与风格: |
      - 名称寓意: 「苍蓝」象征大海与天空，代表在海风与暴雨之间讨生活的猎人与船队。
      - 任务特点: 海兽与水域变异生物狩猎、海盗与水上匪徒清剿、岛屿与沿岸区域的战争机器与异变生态处理。
      - 对歌丘岛与废船村等地: 苍蓝协会的赏金与任务极有可能影响周边海域与岛屿，是你故事里外来猎人/敌人/盟友的重要来源。
    与地方势力关系: |
      - 常与海盗、走私团既对抗又交易：一方面悬赏通缉，另一方面部分猎人会和灰色势力暧昧合作。

  五_统一赏金规则_简要:
    任务等级: |
      - 从低到高划分 E / D / C / B / A / S / EX 等级，对应危险度、所需人数与预期收益；
      - S 级与 EX 级多由天机猎人协会本部直接发布或审核，常涉及诺亚遗迹、红狼传闻、六枚芯片相关线索等。
    悬赏发布方: |
      - 新政府部门、地方军阀、城邦议会、富商、教团、匿名委托人等；
      - 天机猎人协会负责审核、定级与是否公开列入全大陆赏金榜。
    对主角世界线的影响: |
      - 周字方等大陆赏金猎人、以及未来可能登场的高等级猎人，多半在天机或地区协会有登记；
      - 歌丘岛与废船村收到的高额悬赏消息，往往经由苍蓝猎人协会或天机本部转发，是主角接触「大世界」的渠道之一。

  summary: 公元 2080 年，新政府在人类联军内部成立「联军志愿部」剿灭残留怪物与机器，因伤亡与人手问题在 2088 年重组为「天机猎人协会」，总部设于荣城（后为荣光城），以悬赏制度动员废土上的幸存者与敢死队承担高危任务；
    按袁世光要求，各地军阀需自行出资建立地区猎人协会，其中西部的「远舟猎人协会」与南部的「苍蓝猎人协会」最具代表性，分别负责荒漠高原与沿海群岛方向的任务。
    三大协会共同构成了废土时代官方认可的狩猎与赏金网络，对主角所处的歌丘岛与废船村，以及周字方等赏金猎人的活动有直接影响。

