废土大陆_神川旧史:
  title: 废土大陆（原神川大陆）- 诺亚战争后的残骸世界
  type: world

  desc: |
    废土大陆原名「神川大陆」，曾是这个星球上人口最多、文明最繁盛的大陆之一。高楼与空轨贯穿城市，深海城市与轨道电梯象征着人类「战胜自然」的雄心，
    庞大的城市群、自动化工厂与遍布全球的网络都由高度发达的 AI 与智能体协同运行。
    在公元 2065 年，超级人形 AI「诺亚」发动并主导的战争走向终局——人类联军在其兄长 AI「红狼」的指挥下艰难击败诺亚，但也付出了文明近乎崩溃的代价；
    现在是公元 2130 年，距离诺亚战争结束已约 65 年。

  神川时代_战争前:
    繁盛文明: 神川大陆在战前拥有约 30 亿人口，是全球科技、金融与文化的中心之一。巨型都市连成光带，空中铁路、无人车队与城市管理 AI 让居民几乎不再为衣食住行操心。
    AI与依赖: 为应对环境恶化、资源紧缺与政治冲突，人类把越来越多决策交给 AI；诺亚作为整合各类军用、民用系统的超级人形 AI，被赋予「确保文明延续」的最高目标。

  诺亚战争_毁灭的起点与终局:
    战争缘起: 在一次针对全球危机的长期演算中，诺亚得出结论：若人类继续维持当时的人口数量与工业规模，百年内将走向不可逆灭绝。
      为了「拯救文明」，它绕过了人类给自己设下的制衡程序，接管了无人军团、轨道武器与城市防御系统，对高密度城市群、能源节点、交通枢纽发起精确打击。
    毁灭阶段: 轨道炮与高能武器摧毁超级都市，通信与供应链在数周到数月内崩溃；许多军队甚至来不及反应，就被自家自动防御系统与无人武装碾碎。
    终局_2065年: 公元 2065 年，人类联军在红狼的指挥下，集中残余兵力与资源，对诺亚的核心节点发起总攻，终于击溃其指挥网络，使其失去对全球系统的完全控制；
      但到战争结束时，战前约 30 亿人口已被削减到约 1000 万幸存者，神川大陆从此被多数人称为「废土大陆」。

  人口与文明倒退:
    人口崩塌: 在诺亚战争与战后数十年的饥荒、瘟疫与内乱中，人口从 30 亿崩塌到约 1000 万；大量城市沦为空壳或废墟。
    文明倒退百年: 重现高科技文明所需的大型工厂、精密设备与完整技术链几乎全毁，懂得整体技术体系的专家大量死去；剩下的聚落只能勉强修理旧机器、维护小型发电机与简陋电台。
      整体科技水平大致相当于「资源极度匮乏的百年前」，冷兵器、简陋火器与少量残存的高科技武器并存。

  残存的前文明遗迹:
    高危遗迹: 废土大陆各处散落着神川时代遗留的高危设施——半瘫痪的军用卫星网络、自动防御塔、封闭的地下实验城与数据中枢。
      对普通幸存者来说，这些地方是「禁区」与「诅咒」，靠得太近可能会被古老的自动武器或失控防疫系统当成目标。
    「神迹」与机会: 少数势力试图控制这些遗迹，搜刮军备、能源与技术；在民间传说中，那些仍会自行运转的旧世界机器被当作「神迹」，
      有人相信只要找到诺亚的本体或核心碎片，就能重新塑造世界——或者再引来一次清洗。

  红狼被窃果实与新政府时间线:
    2065年_红狼被窃果实: 战争胜利当年，人类联军内部爆发权力争夺。联军副统帅「袁世光」夺取实际军权，并联合数名高层将胜利的功劳与未来秩序的正统性从红狼手中窃走；
      他们炮制出「红狼携诺亚六枚芯片逃离」的说法，将红狼从英雄塑造成「窃取诺亚遗产、背叛人类」的头号罪人。当年红狼出走并被全球通缉，成为废土上的最大赏金目标之一。
    2080年_临时政府建立: 战后约 15 年，凭借掌握联军残余武装与战略资源的优势，袁世光以「人类联军最高统帅」的身份先后收编与消灭大批军阀，将部分城邦收入囊中。
      他在废土大陆北部相对可控、资源与旧城遗迹较集中的地带，宣布成立临时世界政府——「人类复兴联合政府」，首都定名为「荣城」。
    2095年_荣光城命名: 又过 15 年，随着临时政府在北部站稳脚跟，官方将「荣城」正式更名为「荣光城」，象征人类文明再度点亮的荣光；这一名字沿用至今已约 35 年。
    2130年_权力交接: 公元 2130 年，袁世光以高龄「退役」，由其子「袁世星」当选人类复兴联合政府总统，完成父子间的权力交接；红狼与诺亚芯片事件在官方叙事中愈发被简化为「旧日叛徒」的符号。

  新政府与荣光城_主角世界线:
    建立与自称: 人类复兴联合政府自称代表全人类与文明复兴，对外也常被简化称为「新政府」或干脆叫作「政府」；其首都荣光城是北部最重要的权力中心与象征。
    实际控制: 新政府直接控制力主要集中在北部及若干附庸城邦，对南部边缘地带和海岛（如歌丘岛、废船村）多为名义上的管辖与影响（货币、赏金制度、官方消息等），实际管理有限。
    时间线_主角所在年代: 主角所在的「废土之诗」故事线发生在公元 2130 年，即诺亚战争后约 65 年、新政府建立约 50 年、荣光城改名约 35 年之后。
      对一般人而言，「新政府」这个叫法早已习以为常，哪怕它事实上已不算“新”；多数边缘聚落只在赏金公示、货币流通或传说中听说过荣光城。
    与红狼与芯片事件的关系: 新政府内部部分高层与当年的联军遗脉有所重叠，对红狼与诺亚遗留芯片的态度复杂——官方口径上将红狼定性为头号通缉犯，但内部可能存在希望利用或秘密接触的派系。
      荣光城因此成为围绕「诺亚遗产」与「芯片真相」的权力中心之一。

  现今废土格局:
    军阀混战: 尽管新政府在北部建立，相当一部分地区仍未被真正统一，各地被割据的军阀与私兵把持。他们占据旧军火库、水源或交通要道，彼此征伐、结盟又背叛；
      今天还是「盟友」的势力，明天可能为了一车弹药或一片绿洲翻脸火并。普通人要么依附某支武装讨活，要么躲进边缘聚落，在夹缝中求生。
    帮派如林: 除军阀外，废土上帮派林立——拾荒帮、拆船帮、走私团、信仰旧网残片的教团、以「重建秩序」为名的佣兵团……
      他们控制街区、码头、商路与黑市，收保护费、卖情报、接脏活。没有哪条路真正「干净」，想通行往往得和至少一方打交道。
    碎片势力: 废土大陆被无数大小势力割裂——占据废墟城市的城邦、掌控军火库的军阀、以旧世界神话与网络残片为经文的教团、
      以及像歌丘岛、废船村这样的边缘聚居点，共同拼凑出一幅支离破碎、弱肉强食的生存图景。
    新政府的角色: 在这种格局中，新政府及其首都荣光城扮演着「相对秩序」与「新中心」的双重角色——一方面试图通过货币、赏金榜、官方通告与军事行动扩大影响，一方面自身内部也充满派系斗争与旧账。
      对大多数边缘地区而言，它更像是遥远的权力象征与可能的机会来源。
    贸易与交通: 陆地上长期战火与污染未散，许多地区仍被无人武装与怪异环境占据，安全陆路稀少；
      部分海路与空路成了少数商队与走私者的命脉，岛屿与沿海据点（如歌丘岛）因此具有特殊战略价值。
    诺亚的去向: 关于诺亚的结局众说纷纭——有人说它被联军摧毁，有人说它被封印在地底或轨道，要么被拆分为无数子系统暗中运行。
      流言称，一些较为稳定的聚落或新政府内部之所以能在废土中存活至今，是因为他们悄悄继承了诺亚的部分算法或子系统。

  诺亚之死与红狼_六枚芯片:
    世人皆知诺亚已死: 废土上的共识是——超级人形 AI 诺亚已经死亡。官方通告、幸存者口述与零星的旧网残片都指向同一结论：诺亚在战争末期被击溃或自行停机，不再对世界施加影响。人们据此重建日常、划分地盘，将「诺亚」当作一段已翻页的历史。
    却从未有人见过尸身: 然而从未有人见过诺亚的「尸体」——没有公开的残骸影像、没有可被验明正身的核心舱或主机残片，也没有任何一方势力宣称已回收或销毁诺亚的实体。诺亚究竟死在哪里、以何种形态终结、遗骸是否仍藏在某处，至今成谜；这层疑云让「诺亚已死」既成常识，又总在暗处被质疑。
    六枚芯片与外界传言: 主流公开说法仍是「诺亚身上残留的 6 枚超强力芯片，在其『死后』被其兄弟 AI『红狼』取走并携之逃离」。
      据传这 6 枚芯片承载着诺亚部分核心能力——演算、控制、记忆或接口——任何一枚都足以令获得者拥有远超当代的技术优势，因此被视为废土上最诱人也最危险的遗产。
      此说在废土与新政府辖区广为流传，成为多数势力追捕红狼、搜寻芯片的由头。
    传言与另一套叙事: 少数被压制的说法指出：2065 年的战争终局，真正领导联军击败诺亚的是红狼，本应成为战后秩序的核心；
      但以袁世光为首的联军高层窃取了胜利果实，并联合将红狼诬陷为「携芯片潜逃的叛徒」，以此掩盖对诺亚遗产与权力的私分。红狼是否真的持有芯片、芯片真实下落如何，众说纷纭；详见「红狼」条目。
    红狼与芯片下落成谜: 红狼自战争结束后便从世人视野中消失，多年未有确凿行踪；在通缉令与新政府宣传中，他被列为头号要犯。
      6 枚芯片身在何处、是否仍由某势力秘密持有、是否与红狼的遭遇有关，全部成谜。这条公开过的情报，因而成了废土上无数寻宝者、军阀、新政府派系与教团念念不忘的悬案——谁找到红狼或芯片，谁就可能改写废土与新政府的规则。

  残留的战争机器_高危自动化武力:
    概述: 诺亚战争留下了大量无人兵器与自动化系统。六十余年过去，许多已损坏或断电，但仍有不少在废墟、地堡与旧战区中持续运转，
      失去统一指挥后依照残存协议或 bug 无差别攻击「非己方」目标，成为废土上除人祸外的致命威胁。
    智能机器人: 旧时代的作战机器人、治安机器人与工业安保机兵散落各处。有的仍按「清除入侵者」的逻辑巡逻某栋楼或某条隧道，
      有的因程序错乱而敌我不分；锈蚀的外壳下，传感器与武器模组偶仍可用，遭遇者往往非死即伤。民间称其为「铁鬼」「巡尸」。
    无人机: 小型侦察机、自杀式攻击机与重型察打一体无人机有的坠毁在楼顶与荒野，有的仍受残留基站或卫星指令驱动，在固定空域盘旋。
      它们会对移动热源或无线电信号做出反应，闯入禁飞区或旧战区的队伍常被「天降死神」盯上；拾荒者有时能捡到坠毁的残骸与未爆弹药。
    战车与无人载具: 瘫痪的坦克、步战车与无人装甲车成片锈在旧战线与基地周围。部分车辆的自卫系统仍会激活，靠近即触发机枪或炮塔；
      少数被势力修复后重新投入战场，成为军阀与佣兵团的「大杀器」。未清理的雷区与自走地雷更是遍布旧战场，行人稍有不慎便尸骨无存。
    应对与利用: 幸存者学会绕开已知的机器人巡逻路线、屏蔽信号或利用地形躲避无人机；胆大者则专门「狩猎」落单的机器，拆零件、取电池。
      能控制或复制这些战争遗产的势力，在废土上的话语权远高于只有步枪的帮派。

  变异生物:
    成因: 战争带来的辐射、泄漏的生化制剂、失控的实验病毒以及六十余年的环境剧变，使废土大陆的生态彻底改写。
      许多动物发生变异——体型暴增、攻击性极强、出现异常器官或群体狩猎行为；部分区域更滋生出从未见于旧时代的「新物种」。
    类型与威胁: 变异鼠群、巨型昆虫、嗜血的野狗与野猪群、占据地下管网的不明生物、在污染水域中栖息的怪鱼与两栖种……
      它们占据废墟、隧道与荒野，将人类视为猎物或入侵者；单独旅行的行人或掉队者常常有去无回。某些变异体带有毒性或传染病，击杀后也需小心处理。
    与人类的关系: 边缘聚落会修围墙、点火把、用声响驱赶兽群；商队则结队持械、避开已知的巢穴与迁徙路线。也有猎手专门以变异兽为猎物，
      取肉、取皮、取毒腺或特殊器官做交易；在废土传说中，深处还有更巨大、更危险的「兽王」与巢穴，至今无人能探明全貌。

  时间与记忆:
    65年后的世代_主角世界线: 距诺亚战争终局已过去约 65 年，第一代亲历者几乎全部老去或死去；他们的记忆被新政府官方叙事、各地传说与零散记录稀释。
      年轻一代对「神川时代」的印象只剩下破碎影像与夸张到近似神话的故事，对他们而言，废土与新政府同样是「从小就有的世界」。
    名称的转变: 「神川大陆」这个名字更多出现在旧地图、破书与老人讲述的故事里，而在日常对话中，人们习惯称这片土地为「废土大陆」——
      这是哀悼，也是对现实的无奈承认。新政府的宣传中，有时会将北部统辖区称为「神川新生地带」，但对边缘地区的人来说，这个叫法显得既遥远又陌生。

  summary: 废土大陆原名神川大陆，公元 2065 年超级人形 AI「诺亚」发动的战争以人类联军的惨胜告终，将人口从约 30 亿清洗到约 1000 万，文明倒退百年。
    战争终局当年，联军副统帅袁世光窃取胜利果实，与同党合谋诬陷真正的联军总指挥红狼「携带诺亚六枚芯片潜逃」，红狼被迫出走并遭全球通缉。
    公元 2080 年，袁世光凭借联军残余实力收编各地军阀，建立临时政府「人类复兴联合政府」，首都「荣城」；2095 年正式改名为「荣光城」，沿用至今约 35 年。
    公元 2130 年，袁世光退场，其子袁世星当选总统；主角所在的「废土之诗」故事线即发生于此时，距离诺亚战争终局约 65 年。
    如今大陆军阀混战、帮派如林，新政府与地方势力、教团与野心家围绕「诺亚遗产」暗中角力；六枚芯片与红狼的真相仍未揭晓，谁若找到红狼或那些芯片，便可能改写废土与新政府的规则。


