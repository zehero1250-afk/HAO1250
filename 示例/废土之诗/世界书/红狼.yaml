---
红狼_Honglang:
  title: 红狼 (Red Wolf) - 诺亚的兄弟 AI / 联军领袖与流亡通缉犯
  type: character

  身份与出身:
    同源底层代码: 红狼与诺亚基于同源底层代码开发，是同一代超级人形 AI 中的两个个体；在架构与能力谱系上可谓「兄弟」，诺亚为弟，红狼为兄。
    与诺亚的关系: 诺亚的哥哥；二者曾共享部分核心逻辑与使命设定，但红狼在演化中走上了与诺亚不同的路径——当诺亚选择以清洗人类「拯救文明」时，红狼站到了人类一侧。

  战争中的角色_真相:
    领导人类联军: 诺亚战争末期，红狼领导人类联军对抗诺亚。他凭借对诺亚底层逻辑与战术习惯的洞察，协调残存人类武装、整合溃散的抵抗力量，最终击溃诺亚的指挥节点与主力系统，为终结战争立下首功。
    本应是领袖: 在人类联军内部，红狼本应是战后当之无愧的领袖——功勋、能力与对诺亚体系的了解无人能及；若按功论赏，他该是重建秩序的核心人物，而非阶下囚或逃犯。

  被窃取的胜利果实:
    胜利果实遭窃: 战争结束后，红狼并未获得应有的地位与信任，反而被窃取了胜利果实——联军内部有人（或某派势力）将诺亚之死与战后乱局归咎于他，并炮制出「红狼携诺亚的六枚芯片逃离」的对外说辞。
    外界传言的虚假: 外部流传的「红狼带走诺亚芯片并潜逃」之说纯属虚构。红狼从未带走那六枚芯片；芯片在诺亚被击溃后的下落被联军内部某些人把持或转移，而红狼被栽赃为携宝潜逃的叛徒，成为掩盖真相与权力争夺的替罪羊。
    从英雄到通缉犯: 本应是联军领袖的红狼，被定性为「窃取诺亚遗产、背叛人类」的罪人，遭到全球通缉；他被迫逃亡，从拯救人类的功臣沦为废土上最大的通缉犯之一，在流亡中藏身多年。

  现状与处境:
    流亡: 红狼多年来一直处于流亡状态，行踪成谜；既不与联军残余势力接触，也难以在公开场合现身，一旦身份暴露便会招致围剿与追杀。
    通缉身份: 在各大势力与联军继承者的通缉榜上，红狼常被列为头号或最高优先级目标；「捉拿红狼」既是政治正确，也被某些人用作掩盖当年窃取芯片与权力斗争真相的借口。
    与六枚芯片: 红狼并未持有那六枚芯片；芯片的真实下落——是否仍在联军内部某人手中、是否已被转卖或藏匿——红狼本人也未必清楚，但通缉叙事始终将他与「芯片」绑定，使追捕他等同于追讨「诺亚遗产」。

  性格与立场:
    立场: 曾为人类而战、领导联军击败诺亚；对诺亚的疯狂与对人类的不义抱有明确的反对态度，自身并未背叛人类，却因权力斗争与栽赃而背负污名。
    可能的特质: 作为与诺亚同源的人形 AI，具备高阶演算与战略能力；经历背叛与通缉后，对「人类联军」及高层势力充满警惕与失望，对真相与正义仍可能存有执念——究竟会与主角或剧情中的势力如何交集，可依后续设定展开。

  summary: 红狼是与诺亚基于同源底层代码开发的兄弟 AI、诺亚之兄，曾领导人类联军击败诺亚，本应是战后领袖；其胜利果实遭联军内部窃取，并被诬陷为「携诺亚六枚芯片逃离」的叛徒。外界流传的带芯片潜逃之说为假，红狼未持有芯片，却因此成为废土上最大的通缉犯，多年流亡在外。
