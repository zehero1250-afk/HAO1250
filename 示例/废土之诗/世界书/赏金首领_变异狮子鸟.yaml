---
赏金首领_变异狮子鸟_BountyBoss_LionBird:
  title: 赏金首领 - 变异狮子鸟
  type: character

  名称: 变异狮子鸟（「高空撕裂者」）
  类型: 变异生物
  等级_level: III
  悬赏金额_bounty: 25000g（由天机猎人协会本部与苍蓝猎人协会、若干沿海城邦联合发布）
  悬赏来源_issuer: 天机猎人协会本部 / 苍蓝猎人协会 / 沿海城邦联合

  活动区域_region: |
    早年主要出没于废土大陆内陆废墟带与山地，袭击高原商路与孤立聚落；
    近期情报显示，其已跨海至南部海域，疑似在歌丘岛一带觅食或筑巢，废船村及周边岛屿均在其潜在狩猎范围之内。

  威胁概览_threat: |
    - 体型: 中型偏大型，身躯近似瘦长狮子，覆以杂乱羽毛与角质板，四肢有锋利利爪，背部长出畸形双翼，虽不能长期飞行，却可进行短距离滑翔与高空俯冲。
    - 攻击方式: 习惯从高处或阴影中发动突袭，以高速俯冲撕裂目标头颈或肩背，亦会抓起较小型猎物后抛落致死；
      嘶吼具有一定威慑与扰乱效果，会惊吓坐骑与低级变异兽。
    - 防御特征: 颈部与背部有较厚羽毛与角质板防护，一般火力难以正面贯穿；腹部与翅膀根部相对脆弱。
    - 行为模式: 具一定智慧，会挑选火力薄弱或地形不利于人类的时机发动袭击；受伤后倾向撤退，待猎人松懈后再度返回。

  罪状与立案理由_charges: |
    - 在大陆时期多次袭击商队与边缘聚落，累计造成大量死伤及物资损失，被多城邦列为优先清除目标；
    - 至今仍在废土多地留下袭击痕迹，近期在南部航线与岛屿附近出现多起疑似其所为的悬案（被撕裂的家畜、荒野中的半残尸体）；
    - 其存在严重威胁一条重要近海航路与多个沿海/岛屿聚落的安全，因此被天机猎人协会本部与苍蓝猎人协会联合列为 III 级赏金首领。

  与大局的关联_meta: |
    - 目前未发现变异狮子鸟与诺亚芯片或红狼的直接关联，但其活动区域多临近旧世界军事或科研遗迹，有传言其体内携带罕见变异因子或残留实验标记；
    - 天机猎人协会与苍蓝猎人协会均对其尸体样本保持高度兴趣，认为其可能成为解读某些变异机制或旧世界实验的线索；
    - 对歌丘岛与废船村而言，若放任其存在，将极大削弱岛屿生存空间与贸易前景；与之对抗并成功猎杀，可能成为主角等人「踏入更大世界」的重要起点。

  特殊规则_rules: |
    - 死活不论：允许以击杀或重伤为完成条件，通常要求带回头颅、爪骨或翼骨等可辨认部位，或高可信度的影像记录；
    - 若能带回完整或接近完整的尸体，可获得额外情报赏金与科研奖励；
    - 禁止在大规模人群聚集点（如大型聚落核心区）故意引诱其出现，以免造成额外伤亡；
    - 若在执行过程中发现其巢穴靠近旧世界遗迹入口，应优先标绘坐标并上报天机/苍蓝协会，后续可能追加遗迹调查任务。

  剧情钩子_hooks: |
    - 周字方的当前赏金任务即为追踪并猎杀变异狮子鸟，他的到来将这条 III 级赏金首领线引入歌丘岛与废船村；
    - 主角陈春璃与同伴可以通过：协助周字方、与其竞争、或在其失败后接手任务，卷入这一狩猎；
    - 成功击杀或驱逐变异狮子鸟，可为废船村换来一段相对安全期，同时吸引苍蓝猎人协会与天机本部的注意，为后续更大规模的任务与阴谋打开大门。

  summary: 变异狮子鸟是天机猎人协会本部与苍蓝猎人协会联合列名的 III 级赏金首领，悬赏 25000g。
    它结合了狮与猛禽特征，擅长从高处俯冲撕裂猎物，早年肆虐大陆废墟，近期踪迹逼近歌丘岛与废船村，对近海航线与岛屿聚落构成严重威胁。
    周字方此次登岛的目标正是它；围绕这一首领的狩猎，将成为主角一行踏入更大废土世界的关键事件。

