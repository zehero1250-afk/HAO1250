---
G科技与NOYA科技公司_WastelandTechGiants:
  title: G 科技与 NOYA 科技公司 - 废土大陆两大科技巨头
  type: world

  desc: |
    诺亚战争摧毁了神川时代的全球供应链与人才网络，但并未让所有技术血脉彻底断绝。
    废土大陆上至今仍有两家被公认为「科技巨头」的企业：NOYA 科技公司——诺亚的创造者，战后被人类复兴联合政府接管，主攻军工；
    G 科技公司——战后 2077 年由原 NOYA 高层出走创立，侧重生活化产品与战后重建。两家皆握有残存的高端能力与话语权，
    却因供应链断裂、技术流失与秩序不稳，再也无法恢复旧世界的辉煌，只能在废墟之上做「有限的重建」与「可控的军工」。

  一_战后科技的现实约束:
    核心科技无法再制造: |
      - 诺亚战争及其后的混乱，毁掉了精密芯片、高纯度材料与大型生产线的制造能力；许多关键工艺的「最后一代人」已死去，图纸与数据散佚或毁于战火。
      - 即便两家公司仍保留部分实验室与生产线，也缺乏稳定的原料来源、标准化的零部件供应与足够的熟练工人；所谓「量产」往往只是小批量、高成本的复刻或修旧利旧。
    供应链与秩序问题: |
      - 旧世界依赖的全球物流与分工体系已不存在：稀土、特种合金、高精度机床与合格电力供应在废土上极度稀缺，且常被军阀、匪帮与变异生物阻断。
      - 秩序不稳定导致投资与长期研发难以持续——今天建好的车间，明天可能被征用或炸毁；技术骨干可能被挖走、绑架或死于火并，公司只能把资源集中在「能快速变现」或「政权明确需要」的领域。
    技术流失与断层: |
      - 大量核心专利、源代码与工艺参数随人员死亡、服务器损毁与档案散失而无法复原；两家公司所掌握的，多是「还能用的那一部分」与「靠老师傅口传手教保下来的经验」，而非完整技术体系。
      - 在此前提下，两家公司更多是在「维持存量」与「有限迭代」——能修、能改、能小规模生产，却难以再现神川时代那种跨越式创新与全产业链覆盖；民间与上层都清楚：它们是废土上最好的，却再也不是旧世界的那个「最好」。

  二_NOYA科技公司:
    战前身份_诺亚的创造者: |
      - 战前 NOYA 科技公司是神川大陆乃至全球顶尖的 AI 与综合科技企业，承担军用与民用重大项目；超级人形 AI「诺亚」即由其研发并交付，后成为战争主导者。
      - 战争期间，NOYA 的设施、数据与人员遭受联军与诺亚控制势力的双重打击，大量核心团队死亡或失踪，品牌与资产在战后一度濒临瓦解。
    战后归属_新政府接管: |
      - 人类复兴联合政府成立后，将 NOYA 残存的研发机构、生产线与知识产权收归国有或「代管」，名义上为「防止诺亚遗产再次危害人类」与「集中资源服务复兴」。
      - 现 NOYA 科技公司由新政府实际控制，总部与主要研发、生产基地均设在首都荣光城，高层任免与战略方向均需符合荣光城与军方的意志；对外仍保留「NOYA」品牌，以维持其在军工与高端技术领域的权威感。
    当前主业_军工科技: |
      - 主要业务集中在军工与防务：为联军、协会与附庸势力提供武器系统、装甲载具、通讯设备与部分自动化防御模块；也参与对诺亚遗留系统、红狼相关情报与「六枚芯片」的逆向研究与技术评估。
      - 产品以「可靠、可维护、能在废土环境下运转」为优先，而非追求战前级别的性能飞跃；许多型号实为旧设计的简化版或拼凑版，但在当下已是稀缺资源。
    形象与争议: |
      - 在官方叙事中，NOYA 是「将功补过、为人类复兴服务」的技术支柱；在民间与部分势力眼中，它仍是「造出诺亚的那家公司」，既有敬畏也有忌惮与怨恨。
      - 其研发内容中与诺亚、红狼、六枚芯片相关的部分高度保密，新政府内部对「是否继续深挖诺亚技术」存在派系分歧，NOYA 因此始终处于政治与技术的风口浪尖。

  三_G科技公司:
    成立背景_2077年: |
      - 公元 2077 年，即诺亚战争结束约 12 年后、新政府尚未正式成立前，一批原 NOYA 科技公司的高层与核心工程师脱离原体系，在废土大陆上成立「G 科技公司」。
      - 创立动机混杂：有人不愿再与「诺亚」品牌绑定、有人与新政府接管路线不合、有人判断民用与重建市场将长期存在而军工终将受制于政治。
      - 「G」的寓意在官方宣传中多被解释为「新生」「重建」或「绿洲」的象征，与「诺亚」刻意保持距离，强调「为人服务、为战后生活服务」。
    总部与背后势力: |
      - 总部及主要生产基地位于南方省会海陵城的工业区；海陵城为南方军阀势力范围内的核心城市，G 科技自创立或迁址起即获得南方军阀在资金、用地、治安与原料通道上的支持。
      - 背后有南方军阀撑腰，使 G 科技在南方与苍蓝猎人协会辖区拥有稳定订单与话语权，也令其与新政府、荣光城的关系始终带有「北方正统与南方割据」的张力；新政府既需其民用与地方武装供给，又对其「南方色彩」保持警惕。
    主要业务_生活化与重建: |
      - 家电与日用品：简易净水器、便携电源、照明与取暖设备、耐用通讯器与小型制冷装置等，面向聚落、城邦与商队，主打「在缺电少料的环境下仍能用」。
      - 车辆与运输：改装与生产适用于废土路况的越野车、运输卡车与轻型装甲车；既有民用版也有可加装武器的「治安版」「猎人版」，与协会及地方势力合作密切。
      - 军工与武器：并非主业，但为维持现金流与政治平衡，G 科技也承接部分轻武器、弹药与防护装备订单，规模与敏感度均低于 NOYA，多面向猎人协会、城邦卫队与非政府嫡系武装。
    与NOYA及新政府的关系: |
      - 与 NOYA 存在人才渊源与部分技术同源，但产权与品牌完全独立；双方在供应链与人才上有竞争也有 tacit 合作（如共用部分旧时代标准与零配件体系）。
      - 与新政府关系复杂：新政府既依赖 G 科技填补民用与地方武装需求、稳定就业与舆论，又对其「非嫡系」身份与潜在技术外流保持警惕；G 科技则通过供货与纳税换取在荣光城及附庸区的合法地位与订单。

  四_两家公司的共同处境:
    无法恢复旧世界辉煌: |
      - 无论 NOYA 还是 G 科技，都只能在「残存能力」与「废土现实」之间做折中：没有完整供应链，就没有大规模、低成本、高一致性的产品；没有稳定秩序与长期投入，就没有真正的技术突破。
      - 民间常把两家公司的产品称为「废土顶配」——已是当下能买到或分配到的「最好」，但与老人口中、旧书里描述的神川时代科技相比，仍只是「能用的残次复兴」。
    在身份层级中的位置: |
      - 两家公司的老板或实际控制人，因掌握稀缺技术与供给能力，被列为废土大陆身份层级中的「上层」；与新政府、军阀、协会及世界银行、大型商会均有利益交织，在废土秩序中拥有不可替代的话语权。
      - 详见「废土大陆当前身份层级」条目。

  summary: G 科技公司于 2077 年由原 NOYA 高层创立，总部设在南方省会海陵城工业区，背后有南方军阀支持，主营生活化产品（家电、车辆）及部分军工；NOYA 科技公司为诺亚的创造者，战后被人类复兴联合政府控制，总部设在荣光城，主攻军工科技。两家均因供应链断裂与技术流失无法恢复旧世界辉煌，仍是废土大陆公认的两大科技巨头。
