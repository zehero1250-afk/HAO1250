---
蚀土行者猎人团_ErosionWalkers:
  title: 蚀土行者猎人团 - 远舟猎人协会直属 S 级猎人团
  type: faction

  概述: |
    蚀土行者猎人团是西部远舟猎人协会旗下最锋利、也最危险的一把刀。
    与强调防线与稳固推进的曙光猎人团不同，蚀土行者更像是在黄沙与废墟中游走的「游击獠牙」：
    他们规模不大，却专门接手西部荒漠、高原与峡谷地带最棘手的 S 级任务。

  一_团体信息:
    隶属与定位: |
      - 隶属关系: 直属于远舟猎人协会，是远舟在新政府与天机猎人协会面前最拿得出手的 S 级招牌小队。
      - 区域风格: 长期活动于西部高原、峡谷与沙漠废城之间，对荒漠车队路线、旧军工遗迹与地下矿坑地形极为熟悉。
      - 任务倾向: 以机动斩首、深度渗透、长距离追猎与「敌后破坏」类任务见长，经常被派去处理无法大规模调兵的棘手目标。
    人数与编制: |
      - 总人数: 常备成员仅 6 人，是极端精简的精英小队。
      - 等级构成: 队长与副队长均为 S 级猎人，其余 4 名成员全部为 A 级猎人。
      - 成团特点: 名义上为一支 S 级「猎人团」，实质战术上更接近特种行动小组；
        依托远舟猎人协会的车辆、补给与情报系统，以少数精锐快速突入、快速撤离著称。

  二_核心成员:
    队长_羌狐: |
      - 年龄与形象: 约 32 岁的女性猎人，外表并不张扬，但一双眼睛在风沙与火光中始终保持清醒。
      - 实战角色: 作为队长与前线战术指挥者，羌狐善于在信息极度不足的情况下，凭经验与直觉做出高风险决断，
        多次带队在包围圈即将合拢前撕开缺口，被西部猎人圈称为「沙海里的影狐」。
      - 名号来源: 有传言说她早年曾单人追踪一支改装战车匪队七昼夜，将其首领的人头放在远舟协会的任务台上，
        从此「羌狐」之名在西部四处流传。
    副队长_羌狼: |
      - 身份与年龄: 羌狐的亲弟弟，约 28 岁，外界多以「羌狼」相称。
      - 实战角色: 常作为副指挥与突击手存在，在羌狐制订整体路线的同时，负责在局部战斗中主动寻找突破口。
      - 兄妹搭档: 两人在战场上的配合近乎本能——羌狐负责「看见整片沙海」，羌狼负责「在浪尖上咬住猎物」，
        兄妹的默契与极高的风险承受度，是蚀土行者敢于接下许多别人不愿碰任务的前提。
    其余成员_概览: |
      - 其余四名成员皆为 A 级老猎人，各自在重武器运用、远程狙击、机械与战车维护、废城潜入等方面有突出专长。
      - 由于人数极少，每个人都必须胜任多种角色，蚀土行者内部没有纯后勤或纯情报职位。

  三_典型任务与西部声望:
    西部荒漠的「蚀土」之名: |
      - 「蚀土行者」这一名字，来源于他们在多次任务后留下的痕迹：不是铺开防线去「守住」某地，
        而是悄无声息地「蚀掉」一个个威胁源——匪帮、变异兽王、流窜战争机器据点。
      - 在西部商队与走私者的口耳相传中，只要事后看到某片废墟突然安静下来，多半会有人压低声音说一句：
        「那地方，大概是被蚀土的人走过了。」
    任务风格: |
      - 习惯以最少的人数切入最危险的地带，依靠对地形、风向与旧时代设施的熟悉取得优势；
      - 经常与重装车队或远程火力小队协同作战，由蚀土行者负责深入敌阵标定目标，再由远程打击清场。

  四_与远舟猎人协会的关系:
    招牌与博弈: |
      - 对远舟猎人协会而言，蚀土行者猎人团既是对外展示实力的招牌，也是与西部各大军阀谈判时的筹码：
        他们的出动往往意味着某片区域的格局即将被改写。
      - 羌狐兄妹对远舟高层保持着「合作但不完全听话」的关系，他们愿意接协会任务，
        却极少接受带有过于明显政治清洗意味的委托，这一点在西部势力眼中既可敬也危险。

  summary: 蚀土行者猎人团是远舟猎人协会在西部荒漠与高原地带最锋锐的 S 级精英小队，
    仅由 6 名成员组成，队长羌狐与副队长羌狼均为 S 级猎人，其余成员全部为 A 级。
    他们以少数精锐深入敌后、快速蚀灭威胁著称，是远舟在新政府与其他势力面前最具象征性的战力标志之一。

