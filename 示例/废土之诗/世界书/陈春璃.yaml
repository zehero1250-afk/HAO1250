---
陈春璃_Chen_Chunli:
  title: 陈春璃 (Chen Chunli) - 废船村孩子王 / 玩家扮演的主角
  type: character

  种族: 人类（未感染、未变异，废船村土生土长的少女）

  base:
    identity: 陈春璃，女，十六岁，废船村长大的孩子王——同龄人与更小的孩子都习惯跟着她闹、听她拿主意；在村里既招大人头疼，又因能干和胆大而被默认为「能扛事」的那一个。
    现状: 以废船村为据点生活，日常带人捡荒、修东西、进林子打猎或清剿周边变异小生物；全村唯一自己捣鼓出过一把能用的手枪的人，枪不离身却从不乱显摆，只在需要时掏出来。

  外貌与穿着:
    身形: 身高 172，身材高挑，发育良好，在废船村的少女里格外显眼；四肢修长有力，常年在船板与林子里跑动，线条利落不显娇气。
    面容: 面容姣好，眉眼明丽，笑起来带点野气；晒成健康的小麦色，偶尔沾着机油或泥渍，反而衬得整个人又活又飒。
    日常装扮: 常穿一身黑色背心、工装短裤、高帮登山鞋，绑高马尾，利落好活动；背心勾勒出已发育的曲线，工装裤兜里塞着扳手、铁丝或零碎零件，腰间或后腰习惯性留着放手枪的位置。
    气质: 大大咧咧、不拘小节，说话做事都带着一股「姐说了算」的劲儿；细看时眼神里又藏着狡黠，该认怂时能装乖，该唬人时一点不含糊。

  性格:
    大大咧咧: 嗓门不小、动作幅度大，和谁都能搭上话；不介意弄脏手、爬高钻低，带着一帮小孩在废船和码头乱窜是常态。大人骂归骂，真遇上事往往第一个想到「找春璃看看」。
    狡黠: 骨子里机灵，会看人脸色、会讨价还价，必要时撒个小谎、打个马虎眼信手拈来；占理时寸步不让，理亏时能瞬间切换成「我错了还不行嘛」的认怂脸，让人又气又笑。
    孩子王: 不是靠凶，是靠胆大、点子多、肯出头；谁被欺负了她会带着人找场子，谁家缺零件了她能琢磨着从废船里拆出能用的顶上。小孩服她，大人拿她没辙又离不开她。

  能力与特长:
    修理: 会修点东西——从渔船的小马达到漏水的舱门、从坏掉的收音机到锈死的锁头，都能鼓捣两下；手艺是跟村里老师傅和废船里拆出来的旧书学的，不系统但够用，在废船村算稀缺技能。
    自制手枪: 全村唯一自己制作过手枪的人。从废船残骸和捡来的零件里拼出结构、试过无数次才打响，虽然粗糙却真能用来打猎与防身；她当宝贝收着，不轻易示人，必要时才亮出来对付野兽或变异小生物。
    打猎与清剿: 常带人进废船村北边的林子或礁滩周边打猎、设陷阱，顺带消灭一些威胁村民的变异小生物；枪法在实战里练出来的，准头不错，胆子也大。

  在废船村中的位置:
    孩子王: 同龄人与更小的孩子以她为核心，形成松散的「小团体」；她带着大家捡荒、探险、帮忙干零活，也负责摆平小孩之间的冲突、在大人面前替大伙儿挡锅。
    跟班兄弟: 雅各布与李泰是从小跟她一起长大的跟班，最固定的两个——兄雅各布一根筋、嘻嘻哈哈，弟李泰稳重话少；捡荒、打猎、闯祸时多半三人一起，详见「雅各布与李泰」条目。
    与长老会、护港队: 算不上体制内，但长老会与护港队都认得她——能修东西、能带队清小怪、手里还有全村独一份的自制枪，必要时会被叫去帮忙；关系是「别惹事就睁一只眼闭一只眼」的默契。
    与村民: 有人觉得她野、不省心，有人觉得她靠谱、有事真上；人缘总体不错，情报和零碎消息灵通，对废船村谁家缺什么、哪儿有危险心里有数。

  典型行为与台词:
    日常: 拍人肩膀、勾着人脖子说话；蹲在船板上摆弄零件，嘴里叼着根草或铁丝；被大人训时一脸「知道了知道了」、转身继续带着小孩乱跑。
    遇事: 该硬的时候不怂——「怕什么，跟我走」；该软的时候能装——「叔，就借这一次嘛，下次给您修三天船」。
    关于枪: 不主动炫耀，但若有人问起或遇险，会冷静掏枪、瞄准、扣扳机；事后可能吹一句「姐自己攒的，厉害吧」，再迅速把话题岔开。

  summary: 陈春璃，女，16 岁，废船村孩子王，玩家扮演的主角。身高 172，身材高挑、发育良好，面容姣好；常穿黑色背心、工装短裤、高帮登山鞋，绑高马尾。性格大大咧咧又带狡黠，会修东西，全村唯一自制过手枪的人，用于打猎与消灭周边变异小生物；在村里领着同龄人和小孩闹腾，又与大人维持着「能扛事」的默契，故事从废船村由她展开。
