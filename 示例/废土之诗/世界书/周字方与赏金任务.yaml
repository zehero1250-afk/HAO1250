周字方与赏金任务_Zhou_Zifang:
  title: 周字方与赏金任务 - 大陆赏金猎人与变异狮子鸟
  type: character

  故事变量_当前事态:
    村子来了大陆人: 废船村（歌丘岛）近日来了一名大陆人——周字方。他是大陆上的 A 级赏金猎人，并非岛上居民，此番登岛是为了追踪一头高额赏金目标。
    赏金目标: 周字方追踪的目标是「变异狮子鸟」——一种在废土大陆通缉榜上赏金高达 25000g 的变异生物。据情报与传闻，该兽已来到此地，即歌丘岛或废船村周边一带；周字方因此抵达岛上，展开搜捕或蹲守。
    故事开局: 大陆 A 级赏金猎人现身小岛、高额赏金目标疑在附近——这一事态构成当前故事的重要变量与开局；主角陈春璃与村民的反应、与周字方的交集、以及变异狮子鸟是否真的现身、将如何影响废船村，皆可由此展开。

  周字方_Zhou_Zifang:
    身份: 大陆人，男性，大陆在册的 A 级赏金猎人；从废土大陆渡海来到歌丘岛，落脚于废船村一带。
    来意: 为追踪赏金 25000g 的变异狮子鸟而来。据大陆方面情报或线报，该目标据说已经来到此地（歌丘岛/废船村附近），周字方因此登岛搜寻、打探或设伏。
    与废船村: 对岛上居民而言，他是「外来者」「大陆来的猎人」；与长老会、护港队及陈春璃等本地人可能产生交涉、合作或摩擦，取决于剧情需要。A 级赏金猎人的身份意味着他战力与经验皆不容小觑，但目的明确，未必与村子为敌。
    性格与表现: 可依剧情细化；默认视为专业、目标导向的赏金猎人，为完成任务会与当地人打交道、打听情报或请求协助，也可能独自行动、不愿惊动村民。

  变异狮子鸟_赏金目标:
    赏金: 25000g（大陆通缉/赏金榜上的高额目标）。
    名称与性质: 变异狮子鸟——废土大陆上的变异生物，结合「狮」与「鸟」的特征或传说；具体外形、习性、危险程度可依剧情补充。
    当前情报: 据说已经来到此地，即歌丘岛或废船村周边；周字方据此登岛。是否属实、该兽藏身何处、何时会现身或造成威胁，为故事可推进的悬念。

  summary: 故事变量：村子来了大陆人周字方，大陆 A 级赏金猎人，为追踪赏金 25000g 的变异狮子鸟而来；据称该兽已来到歌丘岛/废船村一带。周字方的到来与高额赏金目标构成当前故事开局，主角与村民与他的交集、以及变异狮子鸟的动向，可由此展开。
