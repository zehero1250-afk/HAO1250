---
曙光猎人团_DawnHunters:
  title: 曙光猎人团 - 天机猎人协会直属 S 级猎人团
  type: faction

  概述: |
    曙光猎人团是天机猎人协会本部最早一批登记的 S 级猎人团之一，于 2088 年协会成立之初便已组建，
    被视作「荣光城北境的黎明之刃」。他们长期活动在北方荣光城周边的荒原、废墟与防线地带，
    多次完成 A～S 级高危任务，是导致北境附近变异生物与自动化战争机器威胁显著下降的关键力量之一。

  一_团体信息:
    成立时间与隶属: |
      - 成立时间: 公元 2088 年，与天机猎人协会正式重组同年。
      - 隶属关系: 直属于天机猎人协会本部，由协会总部直接登记与调度，享有最高等级的任务情报与物资优先权。
      - 对外名声: 在北方聚落与荣光城民众口中，曙光猎人团常被称为「曙光军」「黎明之枪」，象征夜色中最先刺破黑暗的一束光。
    人数与编制: |
      - 总人数: 发展至今稳定在约 50 人左右，保持精英小团体规模，偏向「少而精」的战术理念。
      - 小队分支: 团队下辖 5 支作战小队（1 队至 5 队），各队在任务风格与专精方向上略有差异。
      - 编制特点: 虽然三大协会通规则鼓励 3 人以上成团，但曙光猎人团内部经常根据任务需要拆分为多支临时战斗单元，
        亦允许个别资深成员以「一人团」形式执行斩首或侦察类任务。
    队伍构成_等级分布: |
      - 1 队: 全员 A～S 级，是曙光猎人团的核心突击与指挥小队，负责 S 级与极高危 A 级任务。
      - 2 队: 全员 A 级，擅长在 1 队外围进行支援、火力掩护与多线战场协同，也是未来核心成员的培养梯队。
      - 3～5 队: 全员 B～A 级，承担大部分高危区域常规任务、清剿行动与防线巡逻，是保持北境威胁低位运行的「日常工作面」。
      - 小队长: 每一支小队的队长至少为 A 级猎人，拥有独立调整战术与临机决断的权限。

  二_核心成员:
    一队队长_钟州: |
      - 年龄: 约 25 岁，即便在 A～S 级猎人中也算年轻，却已是曙光猎人团 1 队的现任队长。
      - 实战评价: 行动力极强，擅长在混乱战场中迅速判断重心并作出极具风险但高收益的战术选择；
        多次在荣光城周边的 S 级任务中担任前线指挥，被认为是「新一代天机猎人协会的门面之一」。
      - 性格印象: 在下属眼中兼具冷静与冲劲，战斗时近乎冷酷，私下里则对团员关照有加，颇受年轻猎人追随。
    创团元老_俞呈池: |
      - 身份与年龄: 曙光猎人团创立时期的首任队长，现年约 60 岁，被团员半开玩笑地称为「老曙光」。
      - 现任职务: 作为 1 队副队长仍然活跃在一线，负责在钟州做出激进决策时拉回底线、提供更稳妥的战场经验。
      - 晋升选择: 早已获得前往协会本部担任管理层或教官的资格，却多次婉拒，理由是「不想只在文件上看到战报」，
        坚持留在曙光猎人团，亲眼看着一批又一批后辈成长。
      - 评价: 被许多北境猎人视作「不肯离开的老旗帜」，其存在本身就是曙光猎人团仍被认定为一线战斗团体的标志。

  三_荣光城北境的功绩:
    北境安全形势改善: |
      - 在曙光猎人团成立前，荣光城北方几十公里范围内仍充斥着大量高危变异兽群与失控自动化武备，
        商队与移民车队经常在途中失踪。
      - 自 2088 年起，曙光猎人团长期负责北境高危任务清缴，多次执行 S 级与连续 A 级任务，将数个危险巢穴彻底清除或封锁。
      - 到主角故事发生时，荣光城周边北境区域虽仍危险，却已在民众心理上从「无法踏足的绝境」变为「只要跟对队伍就有机会活着回来」的程度。
    典型任务印象: |
      - 多次参与围剿高等级变异兽王、摧毁失控重型战车集群、封锁旧时代军火库的自动防御系统等事件；
      - 部分任务细节因涉密而不对外公开，只在赏金首领系统与协会内部档案中以编号形式记录。

  四_内部文化与风格:
    团队气质: |
      - 相比许多纯粹逐利的猎人团，曙光猎人团内部仍保留了一定程度的「军」味与纪律传统，
        一方面是因为其创立与联军志愿部关系紧密，另一方面也是俞呈池个人风格的延续。
      - 他们在任务外并非清教徒式的严肃组织，喝酒、吵架、打赌样样不少，但一旦进入任务状态，
        对命令链与战术纪律的执行极为严格。
    传承观念: |
      - 老一辈成员普遍认同「猎人团终究要被新一代接过」的观点，俞呈池坚持留在一线，很大程度上也是为了亲自监督这场交接不会变味。
      - 钟州等年轻核心成员既受其影响，又开始尝试引入更灵活的战术与分队模式，让曙光猎人团在保持战斗力的同时，逐渐适应新时代更复杂的任务类型。

  summary: 曙光猎人团是天机猎人协会本部在 2088 年成立之初即组建的老牌 S 级猎人团，
    现有成员约 50 人，下辖 5 支小队，以 1 队为由 A～S 级猎人组成的核心突击队；在钟州与俞呈池的带领下，多次完成 A～S 级任务，
    极大改善了荣光城北境的安全形势，并以严谨而不失人情味的内部文化，成为废土大陆北方最具象征意义的精英猎人团之一。

