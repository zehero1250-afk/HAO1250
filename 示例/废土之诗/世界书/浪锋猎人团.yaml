---
浪锋猎人团_WaveEdgeHunters:
  title: 浪锋猎人团 - 苍蓝猎人协会代表性 S 级猎人团
  type: faction

  概述: |
    浪锋猎人团是南部苍蓝猎人协会最具代表性的 S 级猎人团之一，
    以在暴雨、浪涌与海雾中执行高危任务而闻名。与北方偏重防线、与西部偏重荒漠斩首的精英团不同，
    浪锋更像是「贴着浪尖奔跑的刀锋」：专门处理沿海港口、岛链与近海航道上最棘手的变异海兽、
    海盗势力与水域战争机器威胁。

  一_团体信息:
    隶属与活动区域: |
      - 隶属关系: 直属于苍蓝猎人协会，由协会南部总部直接调度，是苍蓝对外展示战力与信誉的看板猎人团。
      - 主要活动: 南部沿海港口、岛链群岛、近海海域与部分内海水道，经常出现在风暴多发与海兽高密度分布的危险水域。
      - 任务类型: 以海兽与水域变异生物狩猎、海盗/水上匪徒清剿、港口安全维护与水上战争机器封锁为主，
        偶尔负责护送重要人物或关键物资穿越危险海域。
    人数与编制: |
      - 总人数: 常备成员约 15 人，分为两支核心作战小队（1 队与 2 队），另有少量后勤/情报支持按任务临时编入。
      - 等级构成: 两支小队的队长均为 S 级猎人，其余队员全部为 A 级猎人，是苍蓝协会内部标准意义上的「双核 S 级团」。
      - 小队划分:
        - 1 队: 由 S 级队长黄松宇率领，队员均为 A 级，以近中距离火力、水上机动与强登船突击为长。
        - 2 队: 由 S 级队长周贞率领，队员均为 A 级，更偏向远程火力、侦察与复杂海况下的航路规划与支援。

  二_核心成员:
    一队队长_黄松宇: |
      - 年龄与等级: 约 27 岁的 S 级猎人，是浪锋猎人团 1 队的现任队长。
      - 战斗风格: 以果断的贴身推进与强行登船战术著称，擅长在风浪与甲板混战中迅速锁定关键目标；
        在苍蓝内部被称为「浪尖一脚」，意为她总是第一个踩上敌人的船。
      - 个人形象: 在港口与协会酒馆的传闻中，她既是让海盗闻风丧胆的名字，也是许多年轻猎人心目中「想追上的背影」。
    二队队长_周贞: |
      - 年龄与等级: 约 28 岁的 S 级猎人，浪锋猎人团 2 队队长。
      - 战斗风格: 相比黄松宇更偏向冷静与布局，擅长利用地形、潮汐与海雾进行远程狙击与火力布设，
        常在远处为 1 队提供火力与航路上的「安全窗口」。
      - 与黄松宇的搭档关系: 两人性格与战术风格迥异，却在多次 S 级任务中形成默契：黄松宇负责「切入」，
        周贞负责「让她有路可回」，被苍蓝内部戏称为「前浪与后浪」。
    队员构成_概览: |
      - 其余十余名成员全部为 A 级猎人，按个人特长分布在驾驶、航海、重武器、水下潜行、医疗与机械维护等岗位。
      - 在浪锋内部，几乎每名成员都接受过在风暴与夜间海况下的多种岗位训练，以确保在意外折损的情况下仍能维持船队运转。

  三_典型任务与南部声望:
    南部海域的「浪锋」之名: |
      - 「浪锋」这一名称，来自他们多次在风暴边缘强行突破封锁、护送船队脱离危险海域的记录，
        被幸存的商船与渔船口耳相传，逐渐成为南部海域的某种「护符」般的存在。
      - 在一些沿海聚落的祈祷辞里，甚至会出现「愿今天有浪锋路过」之类的说法，足见其在民间的象征意义。
    任务风格: |
      - 善于利用苍蓝协会的情报与船队优势，以双队协同方式在复杂海况中寻找突破口；
      - 经常承担需要高速决断与连续战斗的长线任务，一次出海可能连续处理数个海兽巢穴或海盗据点。

  四_与苍蓝猎人协会的关系:
    代表性与牵制: |
      - 对苍蓝猎人协会而言，浪锋猎人团既是南部海域秩序的象征，也是与沿海城邦与海上势力谈判时的重要筹码。
      - 协会高层倾向于将最棘手、最具观感的任务交给浪锋执行，以换取对自身权威与赏金制度的认可。
    内部评价: |
      - 黄松宇与周贞在苍蓝内部被视作「下一代南部海域的定盘星」，许多 A 级年轻猎人以能加入浪锋为目标；
      - 同时，由于任务强度与风险极高，也有传言称「浪锋的每一个位置，都是用死人空出来的」——
        这句话在内部多被默默认可，却极少在新人面前说出口。

  summary: 浪锋猎人团是苍蓝猎人协会在南部沿海与近海区域最具代表性的 S 级猎人团，
    由约 15 名成员组成，分为由 S 级队长黄松宇与周贞率领的两支小队，其余成员全部为 A 级猎人。
    他们以在风暴与海兽之间「贴着浪尖奔跑」的任务风格著称，是南部海域秩序与苍蓝猎人协会声望的关键象征之一。

