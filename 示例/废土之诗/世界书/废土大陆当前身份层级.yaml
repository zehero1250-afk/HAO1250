---
废土大陆当前身份层级_WastelandSocialHierarchy:
  title: 废土大陆当前身份层级 - 权力、地位与生存境遇
  type: world

  desc: |
    废土大陆没有统一的法律或户口，所谓「身份」往往由谁掌权、谁有枪、谁被谁承认来决定。
    不同地区、不同势力范围内，同一类人在实际境遇上可能天差地别；下面层级是民间与协会、城邦之间逐渐形成的「大致共识」，
    便于理解谁在食物链上端、谁在夹缝里、谁几乎不被当人看。层级越高，通常越有安全、资源与话语权；层级越低，越依赖他人施舍或自身豁出命去挣。

  一_顶层_权力与秩序的名义核心:
    新政府与荣光城核心: |
      - 人类复兴联合政府总统、高层官员、军方要员与天机猎人协会本部决策层。
      - 掌握北部直接控制区与荣光城的秩序、货币发行、赏金制度与部分机密情报；对外代表「正统」与「文明复兴」。
      - 在荣光城及附庸城邦内享有最高法律与资源优先权；在边缘地区更多是「名义上的顶层」，实际影响力取决于当地势力是否买账。
    军阀与割据势力首脑: |
      - 控制一方土地、武装与资源的军阀头目、教团领袖、大城邦议会核心与海上/陆上「王」。
      - 在其势力范围内说一不二，可征税、征兵、立法、处决；与其它势力之间靠实力与利益谈判，与新政府的关系从名义归附到公开对抗不一。
      - 身份地位接近「土皇帝」，普通人触怒他们往往没有申诉渠道，只能逃亡或依附另一支势力。

  二_上层_权力与资源掌控者:
    猎人协会负责人: |
      - 天机、远舟、苍蓝三大猎人协会在各地的分会负责人与本部要员。
      - 掌握任务发布、赏金结算、猎人登记与黑名单，能决定谁接什么活、谁被列入黑名单、哪条路在协会体系内「能走」。
      - 在民间被视为「能办事的人」，巴结与忌惮并存；与顶层新政府或地方军阀有千丝万缕的利益或从属关系，但未必事事听从。
    军阀将领: |
      - 各地军阀麾下的核心将领，掌握实际武装调度与战区指挥权。
      - 在势力范围内一人之下、万人之上，能左右战局与地盘划分；与新政府、协会及其它军阀的博弈中常作为谈判与执行代表。
    大型商会与世界银行: |
      - 跨区域经营的大型商会话事人、以及废土上承担汇兑、信贷与复兴币流通枢纽职能的「世界银行」老总。
      - 掌握商路、物资与金融命脉，与军阀、新政府及协会均有深度合作；其态度与贷款往往能左右一地战事与重建节奏。
    两大科技公司: |
      - 废土大陆公认的两大科技巨头——「G 科技公司」与「NOYA 科技公司」的老板或实际控制人。
      - 掌握残存的高端技术、军工与民用研发能力，为各方提供装备、通讯与关键零部件；与新政府、军阀及协会关系密切，在废土秩序中拥有不可替代的话语权。

  三_中上层_顶尖战力与地方实权:
    S级顶尖猎人: |
      - S 级猎人团（如曙光、蚀土行者、浪锋）及其队长、副队长，以及单兵 S 级、A 级顶尖猎人。
      - 有能力执行最高危任务、接触机密情报与诺亚/红狼相关委托；协会与军阀都会拉拢或忌惮，一般不会轻易得罪。
      - 在猎人圈与民间享有名声与尊重，收入与风险皆高；在部分区域其名号本身就能当「通行证」或「威慑」，但身份上仍从属于协会与委托方，故列于中上层。
    城邦实权议员与地方实权者: |
      - 城邦实权议员、区域黑市话事人、以及未达「大型」规模但在一地有影响力的商队与势力头目。
      - 在各自地盘内掌握秩序与资源分配，与上层军阀、协会或商会存在从属或合作关系，实际地位低于上层权力与资源掌控者。

  四_中层_有证可依与有地可依:
    注册猎人_中高等级: |
      - B 级、A 级协会在册猎人，以及 C 级中经验丰富、有固定队伍或番号的猎人。
      - 可接中高危任务、享受协会福利与情报支持，在聚落与城邦中通常被当作「能打、有用」的群体，酒馆与据点会卖面子。
      - 身份清晰、有档案可查，惹出纠纷时协会与地方势力会按规矩处理，不至于被随意当成流寇处置。
    城邦市民与稳定聚落居民: |
      - 在受军阀或城邦有效控制的城镇、港口、岛屿聚落内登记在册、有固定居所与生计的居民（如废船村村民、荣光城平民、各城邦市民）。
      - 受当地规则与势力保护，可从事正经营生、纳税或上贡以换取安全；流动性低，一旦离开辖区则身份认同往往失效。
      - 在「自己人」眼中是正常社会成员；在外部势力眼中则是可被征用、征税或劫掠的对象，取决于实力对比与地缘关系。
    商队、佣兵与有组织的自由职业者: |
      - 拥有固定雇主或路线的商队成员、受雇于势力或协会的佣兵、在多地有关系的走私者与情报贩子。
      - 身份介于「有组织」与「流动」之间，靠契约、信誉与武力维持地位；在友好势力范围内受保护，在敌对或无序地带可能随时沦为肥羊或炮灰。

  五_中下层_夹缝求生:
    低等级注册猎人与外包猎人: |
      - E 级、D 级及部分 C 级协会猎人，以及不挂靠协会、单次接活的外包猎人/独立承包人。
      - 可接任务有限，收入与保障都不稳定，在协会与委托方面前话语权弱；常被视作「跑腿的」或「耗材」，伤亡率偏高。
      - 努力晋升或攒够本钱可升入中层；一旦重伤、违规或得罪人，容易滑向流民甚至通缉。
    难民、流民与无籍者: |
      - 家园被毁、逃离战乱或压迫、从未被任何势力正式接纳的人；没有固定居所、没有势力背书、没有「身份文件」。
      - 在多数地区不被视为完整公民，只能打零工、拾荒、偷渡或依附临时雇主；遇盘查、征兵或清洗时最先被牺牲。
      - 若能找到聚落接纳、加入协会或投靠某支势力，可上升至中层；否则长期处于「谁都可以踩一脚」的境地。

  六_底层_被剥夺与被猎杀:
    奴隶、被贩卖者与「货物」: |
      - 被奴隶贩子、人贩与部分军阀当作财产买卖与奴役的人；多为战俘、绑票、债务奴或从底层聚落强征而来。
      - 在法律与道德上不被多数势力承认为「人」，只是可交易、可处置的资产；逃脱极难，一旦被标记往往终身难洗。
      - 在废土伦理中处于最底层；部分城邦与协会名义上禁止奴隶制，但在军阀与黑市控制区仍大量存在。
    通缉犯、叛徒与「人类敌人」: |
      - 被新政府、协会或地方势力公开悬赏、列入黑名单或定为「人类敌人」的人（如红狼、堕落猎人、屠村匪首）。
      - 一旦身份暴露，人人可诛、人人可领赏；没有势力会公开庇护，只能躲藏、逃亡或改头换面，社会性死亡甚至肉体消灭是常态。
      - 在身份层级上被置于「人」之下，成为猎杀与清算的对象；其名字与赏金数字共同构成废土秩序的反面教材。

  七_层级流动与地区差异:
    流动性: |
      - 身份并非世袭固化：猎人晋级、难民入籍、市民破产流亡、佣兵落草为寇、通缉犯洗白（或反过来）在废土上时有发生。
      - 一次任务、一场战争、一次站队错误，都可能让人在层级间骤升或骤降；「昨天还是猎人，今天已是悬赏榜上的人头」并不罕见。
    地区差异: |
      - 荣光城及新政府直接控制区：层级相对清晰，协会与政府档案有效，身份与待遇挂钩明显。
      - 军阀与教团控制区：谁掌权谁就是顶层，身份往往由该势力重新定义，可能与「大陆共识」不一致甚至相反。
      - 边缘聚落与无主地带：没有统一权威，身份更多取决于本地习惯、谁拳头大以及外来者是否被接纳；废船村等岛屿聚落即属此类，既有长老与护港队维持秩序，又对大陆的「身份」概念较为疏离。

  summary: 废土大陆当前身份层级从顶层的新政府与军阀核心，到上层的猎人协会负责人、军阀将领、大型商会与世界银行老总、G 科技与 NOYA 科技公司老板，中上层的 S 级顶尖猎人与城邦及地方实权者，
    中层的注册猎人、城邦市民与商队佣兵，中下层的低等级猎人、难民与流民，直至底层的奴隶与被通缉者；层级决定安全、资源与话语权，但地区差异大、流动性高，
    边缘聚落与无主地带往往自成一套「谁被谁承认」的规则，与大陆共识并存。
