---
变异生物与战争机器怪物表_Bestiary:
  title: 废土之诗 - 变异生物与战争机器怪物表（图鉴/分类表）
  type: world

  desc: |
    本表以游戏图鉴形式整理废土大陆上的「变异生物」「战争机器」「机械与生物结合」与「人类敌人」四大威胁类别，便于剧情与判定时查阅。变异生物源于生态剧变，战争机器源于诺亚战争遗留，机械与生物结合体多出自旧时代实验或失控融合，人类敌人则涵盖军阀、帮派、匪徒、佣兵与教团等——均为幸存者可能遭遇的敌对或危险单位。

  使用说明_分类与威胁等级:
    变异生物_分类维度:
      体型: 小型 / 中型 / 大型 / 巨型（影响遭遇数量、火力需求与战术）
      生态类型: 兽型 / 虫型 / 水生·两栖 / 不明·传说（影响栖息地、习性、掉落与剧情）
    战争机器_分类维度:
      类型: 人形机兵 / 无人机 / 载具与炮塔 / 固定防御 / 地雷与自走雷（影响应对方式、是否可规避或拆解）
    机械与生物结合_分类维度:
      融合类型: 兽体+机械 / 人体+机械（改造体）/ 机体内嵌生物 / 共生·寄生（影响弱点、掉落与剧情来源）
    人类敌人_分类维度:
      身份类型: 军阀·私兵 / 帮派 / 匪徒·流寇 / 佣兵 / 教团 / 赏金猎人（敌对时）/ 奴隶贩·人贩（影响动机、可否交涉、掉落与剧情）
      规模: 散兵 / 小队 / 团体 / 势力（影响人数与后续报复或结仇）
    威胁等级: I 低 / II 中 / III 高 / IV 极高（与人数、装备、地形共同决定遭遇难度；剧情中可弹性调整）
    威胁等级换算_按敌人LV:
      I级威胁: 1~10
      II级威胁: 11~20
      III级威胁: 21~30
      IV级威胁: 31~40
      V级威胁: 41~50
      VI级威胁: 51~60
    备注: 怪物条目中的“威胁”可保留区间写法（如 II～III），最终以敌人LV落点映射到 I~VI 作为结算等级。

  一_变异生物怪物表:
    表头: "名称 | 体型 | 生态类型 | 威胁 | 栖息地/出没地 | 特性与备注"

    小型_兽型:
      变异鼠群: "体型: 小型 | 生态: 兽型 | 威胁: I～II | 栖息: 废墟、船舱、地下管线、垃圾堆 | 群聚、数量多、携带病菌或毒；落单可对付，成团需火或烟驱散；可剥皮取肉，注意消毒。"
      嗜血野鼠_头目: "体型: 小型 | 生态: 兽型 | 威胁: II | 栖息: 同上，多为鼠群核心 | 体型略大、攻击性更强，击杀可暂时驱散鼠群。"
    小型_虫型:
      变异蟑螂_蜈蚣_蝎群: "体型: 小型 | 生态: 虫型 | 威胁: I～II | 栖息: 潮湿舱底、废墟缝隙、旧管道 | 部分带毒或腐蚀液；成群出现，怕火与杀虫剂；壳与毒腺可回收。"
      巨型蚊_蝇: "体型: 小型 | 生态: 虫型 | 威胁: I | 栖息: 沼泽、积水区、尸体附近 | 骚扰与传染病；清除水源或烟熏可减威胁。"
    中型_兽型:
      嗜血野狗: "体型: 中型 | 生态: 兽型 | 威胁: II | 栖息: 荒野、废墟边缘、村落外围 | 成群狩猎、速度快；可设陷阱或枪械对付；皮与肉可用。"
      变异野猪: "体型: 中型 | 生态: 兽型 | 威胁: II～III | 栖息: 森林、丘陵、农田废墟 | 冲撞力强、皮厚；适合打猎取肉，注意不要被正面冲撞。"
      变异狐狸_獾: "体型: 中型 | 生态: 兽型 | 威胁: II | 栖息: 林地、礁滩、废船周边 | 狡猾、会偷食与偷袭落单者；皮有用，肉少。"
    中型_特殊_赏金目标:
      变异狮子鸟: "体型: 中型～大型 | 生态: 兽型（混合鸟·兽特征）| 威胁: III～V | 栖息: 大陆通缉目标，据报已至歌丘岛/废船村一带 | 赏金 25000g；结合狮与鸟特征的变异体，战力与稀有度皆高；详见「周字方与赏金任务」。"
    大型_兽型:
      变异狼_熊: "体型: 大型 | 生态: 兽型 | 威胁: III | 栖息: 深山、旧战区森林、人迹罕至区 | 单头即可威胁小队；需重火力或陷阱配合；皮与骨价值高。"
      变异野牛_巨鹿: "体型: 大型 | 生态: 兽型 | 威胁: III | 栖息: 平原废墟、荒废牧场 | 冲撞与践踏危险；猎杀可获大量肉与皮。"
    水生与两栖:
      污染水域怪鱼: "体型: 小型～中型 | 生态: 水生 | 威胁: I～II | 栖息: 污染河流、港口死水、地下积水 | 具攻击性、部分带毒或畸变；可钓或网，食用需谨慎。"
      变异两栖种_蛙_蝾螈: "体型: 小型～中型 | 生态: 两栖 | 威胁: I～II | 栖息: 沼泽、湿地、排水系统 | 毒腺与黏液；皮与毒腺可交易。"
    不明与传说:
      地下管网不明生物: "体型: 不明（传闻中型～大型）| 生态: 不明 | 威胁: II～V | 栖息: 地下管网、废弃地铁、船舱底层 | 少见全貌、多为声响与拖拽痕迹；建议组队、带光源与重火力再入。"
      兽王_传说: "体型: 巨型 | 生态: 不明·传说 | 威胁: IV～VI | 栖息: 废土深处、传闻中的巢穴 | 传说级；至今无人探明全貌，可作为高难 Boss 或剧情终点。"
    变异生物_通用备注: "成因多为辐射、生化泄漏、失控病毒与六十年生态剧变。部分带毒或传染病，击杀后需小心处理；肉、皮、毒腺与特殊器官可作交易。聚落常以围墙、火把与声响驱赶兽群。"

  二_战争机器怪物表:
    表头: "名称/类型 | 分类 | 威胁 | 行为与触发 | 俗称/备注"

    人形机兵:
      作战机器人: "类型: 人形机兵 | 威胁: II～III | 行为: 按「清除入侵者」逻辑巡逻建筑或隧道，发现非己方即开火 | 民间称「铁鬼」；锈蚀仍可射击与近战，可绕行或拆零件。"
      治安_安保机兵: "类型: 人形机兵 | 威胁: II | 行为: 守卫某区域、对未授权者警告后攻击 | 俗称「巡尸」；数量多时危险，落单可尝试破坏传感器或电源。"
      工业_维修机兵: "类型: 人形机兵 | 威胁: I～II | 行为: 原为维护用，程序错乱后可能无差别攻击 | 武器较弱，但会呼叫或引来其他单位。"
    无人机:
      小型侦察机: "类型: 无人机 | 威胁: I～II | 行为: 对热源与无线电有反应，发现后呼叫或引导火力 | 可屏蔽信号、躲掩体或击落；坠毁可捡残骸。"
      自杀式攻击机: "类型: 无人机 | 威胁: III | 行为: 锁定目标后俯冲自爆 | 「天降死神」；发现即尽快规避或击落。"
      察打一体重型无人机: "类型: 无人机 | 威胁: III～V | 行为: 固定空域盘旋，对地面目标开火 | 需重火力或地形掩护；坠毁后有高价值残骸与未爆弹。"
    载具与炮塔:
      瘫痪坦克_步战车: "类型: 载具与炮塔 | 威胁: II～V | 行为: 自卫系统仍可能激活，靠近触发机枪或炮塔 | 可绕行；若被势力修复则成「大杀器」。"
      无人装甲车: "类型: 载具与炮塔 | 威胁: II～III | 行为: 巡逻或定点守卫，车载武器对人员威胁大 | 同左。"
    固定防御:
      自动防御塔_岗哨机枪: "类型: 固定防御 | 威胁: II～III | 行为: 侦测到移动或热源即开火 | 已知位置可规避或破坏供电；常见于旧基地与大门。"
      半瘫痪卫星_轨道武器: "类型: 固定防御 | 威胁: V～VI | 行为: 极少数仍能接收指令对地打击 | 传说级；通常不直接登场，可作为剧情背景。"
    地雷与自走雷:
      感应地雷_自走雷: "类型: 地雷与自走雷 | 威胁: II～III | 行为: 触压或感应接近即爆；自走雷会主动靠近目标 | 旧战场遍布；探雷与绕行或排爆，行人慎入。"
    战争机器_通用备注: "均为诺亚战争遗留；失去统一指挥后按残存协议或 bug 无差别攻击。幸存者常绕开已知巡逻路线、屏蔽信号或「狩猎」落单机器拆零件；能控制或复制此类遗产的势力话语权高。"

  三_机械与生物结合怪物表:
    表头: "名称/类型 | 融合类型 | 威胁 | 出没地/来源 | 特性与备注"
    说明: "兽体+机械：变异兽被植入或挂载了机械部件；人体+机械：人类被改造或与机械共生；机体内嵌生物：机器以生物组织为能源或传感器；共生·寄生：生物与机械相互依赖或一方控制另一方。"
    兽体_机械:
      半机械兽_义肢型: "融合: 兽体+机械 | 威胁: II～III | 出没: 旧战区、实验设施周边、遭改造兽逃逸区 | 变异兽身上装有义肢、装甲板或武器接口；兼具野兽本能与机械火力，弱点多在机械连接处或电源。"
      装甲兽_外骨骼型: "融合: 兽体+机械 | 威胁: III | 出没: 同上 | 大型变异兽披挂旧时代外骨骼或护甲，冲撞与撕咬之外还有机枪或电击；破甲或断能源可削弱。"
      机械寄生兽: "融合: 兽体+机械（寄生）| 威胁: II～III | 出没: 地下管网、废弃实验室、锈蚀机械密集区 | 体内被植入控制芯片或能源包的变异兽，行为受残存信号影响；破坏植入体可令其失控或瘫痪。"
    人体_机械_改造体:
      改造人_佣兵型: "融合: 人体+机械 | 威胁: II～III | 出没: 军阀麾下、佣兵团、黑市改造据点 | 人类经义体或武器植入强化；可为敌对 NPC，战术与人类相近但火力与耐性更高。"
      失控改造体: "融合: 人体+机械 | 威胁: II～V | 出没: 废弃实验区、旧军医院、隔离设施 | 改造失败或程序错乱的前人类，敌我不分；可能保留部分人性记忆，剧情可深挖。"
      生化机兵_有机外壳: "融合: 人体+机械（机为主）| 威胁: III | 出没: 诺亚时代实验遗迹、地下堡垒 | 机兵骨架外覆培养的肌肉与神经组织，兼具机器续航与生物恢复；俗称「肉机兵」。"
    机体内嵌生物:
      生物电池_驱动型: "融合: 机体内嵌生物 | 威胁: II～III | 出没: 旧实验室、大型载具残骸、地堡动力舱 | 以变异生物或培养组织为能源的机器，外观诡异；击杀生物核心可停机，但可能泄漏毒或病原。"
      神经接驳无人机: "融合: 机体内嵌生物 | 威胁: II | 出没: 同上 | 无人机或小型机兵以生物神经替代部分电路，行为更不可预测；可击落或破坏「生物脑」模块。"
    共生_寄生:
      共生体_兽机: "融合: 共生 | 威胁: III～V | 出没: 极少数实验区、传闻中的「融合巢穴」 | 兽与机长期共生，共享感知与部分行动；弱其一可重创，但二者会互相掩护。"
      寄生机_触须型: "融合: 寄生（机械寄生生物）| 威胁: II～III | 出没: 锈蚀机械与变异藤蔓、菌类混杂区 | 机械残骸被变异植物或菌丝侵入，形成会动的「触须机」；怕火与切割，核心多在原机舱。"
    机械与生物结合_通用备注: "多源于旧时代人体/兽体改造实验、诺亚战争中的生化机兵项目或战后失控融合。弱点常为机械与生物接合处、能源或控制核心；掉落可能同时有零件与生物组织，需谨慎处理。遇改造体时注意其是否仍具人性、可否交涉。"

  四_人类敌人图鉴表:
    表头: "名称/类型 | 身份类型 | 威胁 | 出没地/动机 | 特性与备注"
    说明: "人类敌人以身份类型与规模区分；多数可交涉、可收买或可避战，但一旦敌对则会有报复、结仇或势力追杀等后续。掉落为装备、物资与情报。"
    军阀_私兵:
      军阀私兵_巡逻队: "身份: 军阀·私兵 | 威胁: II～III | 出没: 军阀控制区、要道关卡、军火库与水源周边 | 听命于割据头目，装备较统一（步枪、护甲）；可盘查、收过路费或直接开火，视头目政策而定。击杀会惹怒该势力。"
      军阀精锐_亲卫: "身份: 军阀·私兵 | 威胁: III～V | 出没: 头目身边、核心据点、重要任务队 | 装备与训练更好，可能带重武器或载具；多为死忠，难策反。"
    帮派:
      拾荒帮众: "身份: 帮派 | 威胁: I～II | 出没: 废墟、码头、拆船现场、黑市周边 | 控制地盘与捡荒权，收保护费或强买强卖；装备参差，人多势众。可谈判、交钱过关或冲突。"
      拆船帮打手: "身份: 帮派 | 威胁: II | 出没: 废船、拆解场、与长老会或护港队有摩擦的街区 | 争拆船权与金属分配，械斗常见；带扳手、砍刀与土制枪。"
      走私团成员: "身份: 帮派 | 威胁: II～III | 出没: 商路、海岸、秘密码头、跨境线 | 押运违禁品，遇拦检或黑吃黑会动手；装备较好，有情报价值。"
    匪徒_流寇:
      流寇_土匪: "身份: 匪徒·流寇 | 威胁: I～III | 出没: 荒野、废弃公路、商队必经之路 | 无固定归属，抢劫过路人与落单者；装备杂乱，可能成团。可击退、交买路财或反杀。"
      海盗: "身份: 匪徒·流寇 | 威胁: II～III | 出没: 沿海、岛屿外围、劫船与登岸点 | 劫船与沿岸聚落；有船与水上火力。岛屿聚落（如废船村）需防登岸劫掠。"
    佣兵:
      雇佣兵_小队: "身份: 佣兵 | 威胁: II～V | 出没: 雇主指定区域、护送队、攻打目标 | 拿钱办事，可能为军阀、城邦或私人雇来清场、护镖或追杀；战术与装备专业，有首领。可交涉（价码）或敌对。"
      赏金猎人_敌对时: "身份: 赏金猎人（敌对时）| 威胁: II～V | 出没: 追踪目标所到之处、酒馆与据点打听 | 为赏金抓人或清怪；若主角或同伴被悬赏，会成敌对。A 级猎人战力高，见「周字方与赏金任务」；敌对时难缠但可谈判（赎金、交换情报）。"
    教团:
      教团狂热者: "身份: 教团 | 威胁: II～III | 出没: 教团据点、朝圣路线、与「异端」冲突区 | 信仰旧网残片、诺亚神话或自创教义；视外人为异端或祭品，可能自爆或人海战术。难理性交涉。"
      教团审判者_精英: "身份: 教团 | 威胁: III～V | 出没: 同上，多为头目或护教队 | 装备与洗脑更深，执行清除异己；可作 Boss 或剧情关键人。"
    奴隶贩_人贩:
      人贩_捕奴队: "身份: 奴隶贩·人贩 | 威胁: II～V | 出没: 边缘聚落外围、商路拐卖点、与势力勾结的据点 | 抓人卖奴；装备与人数视规模而定，有载具关人。击杀可救俘虏，但可能得罪背后势力。"
    散兵_逃兵:
      逃兵_散勇: "身份: 散兵（原军阀/联军溃散）| 威胁: I～II | 出没: 荒野、废墟、不敢回老家的溃兵藏身处 | 无组织、求生为主；可能抢劫落单者或求收留。可击退、收编或交换情报。"
    人类敌人_通用备注: "人类敌人有动机、可交涉或可避战，但一旦结仇会有报复与势力关系变化。掉落为武器、护甲、物资与情报；击杀重要头目可能引发势力报复或任务线。与变异体、机器不同，人类会谈判、欺骗与记仇。"

  summary: 废土之诗怪物表分「变异生物」「战争机器」「机械与生物结合」与「人类敌人」四大类。变异生物按体型与生态类型分类；战争机器按类型分人形机兵、无人机、载具与炮塔、固定防御、地雷与自走雷；机械与生物结合按融合类型分兽体+机械、人体+机械、机体内嵌生物、共生·寄生；人类敌人按身份类型分军阀·私兵、帮派（拾荒帮、拆船帮、走私团）、匪徒·流寇（流寇、海盗）、佣兵、教团（狂热者、审判者）、赏金猎人（敌对时）、奴隶贩·人贩、散兵·逃兵。人类敌人可交涉、可结仇且有报复与势力关系；威胁等级 I～IV，与出没地、动机及掉落一并列出，便于剧情与判定查阅。
