---
雅各布与李泰_Yakebu_Litai:
  title: 雅各布与李泰 - 陈春璃的跟班兄弟
  type: character

  desc: |
    雅各布与李泰是陈春璃从小到大的玩伴与跟班，二人为兄弟（雅各布为兄，李泰为弟），同岁皆十五，常年跟在陈春璃屁股后面跑，是废船村孩子王身边最固定的两个小跟班。

  雅各布_Yakebu:
    年龄与身形: 十五岁，身高 165，在同龄男孩里不算高，但结实好动。
    身份: 陈春璃的小跟班之一，从小与陈春璃一起长大，习惯跟在她屁股后面跑；有她在的地方多半能看到雅各布在旁起哄或搭手。
    性格: 一根筋——认准的事会闷头干到底，不太会拐弯，有时显得轴，但也因此特别靠得住、不会半路撂挑子。平时嘻嘻哈哈，爱说爱闹，是三人里最会插科打诨的那个；气氛冷下来时往往由他先开口打趣。
    与陈春璃、李泰: 对陈春璃言听计从，让往东不往西；和弟弟李泰一闹一稳，常被李泰拽着别乱来，但多数时候还是跟着陈春璃一起「乱来」。
    典型表现: 陈春璃一声招呼就屁颠屁颠跟上；干活或探险时冲在前头、嘻嘻哈哈；被李泰提醒「别冲动」时挠头笑，然后继续冲。

  李泰_Litai:
    年龄与身形: 十五岁，身高 175，比哥哥雅各布高出一截，身形修长。
    身份: 陈春璃的跟班之一，雅各布的弟弟，同样从小与陈春璃一起长大；和雅各布一起构成陈春璃身边最固定的两人组。
    性格: 稳重——话不多但说一句是一句，做事前会多想一步，在三人里常扮演「踩刹车」或「善后」的角色；不会像雅各布那样嘻嘻哈哈冲过头，遇事更习惯先观察再动手。
    与陈春璃、雅各布: 服陈春璃，但会在她或雅各布上头时泼点冷水、提个醒；和哥哥感情好，一个闹一个稳，配合默契。
    典型表现: 陈春璃做决定时在旁点头或补一句「可以，但咱们得先……」；雅各布要蛮干时拽一把、说「哥，别急」；需要有人收尾、清点东西或望风时，多半是李泰在干。

  二人与陈春璃:
    关系: 从小一起长大的发小与跟班，陈春璃是头儿，雅各布和李泰是左膀右臂；捡荒、打猎、修东西、跟人起冲突时，两人通常都在场。
    分工感: 雅各布偏冲、偏闹，李泰偏稳、偏收；陈春璃拿主意，雅各布打头阵或造气氛，李泰兜底或把风——三人形成习惯性的配合。

  summary: 雅各布与李泰是陈春璃从小到大的跟班兄弟，皆十五岁。兄雅各布身高 165，性格一根筋、嘻嘻哈哈，常跟陈春璃屁股后面跑；弟李泰身高 175，性格稳重，话少但靠谱。二人一闹一稳，是陈春璃身边最固定的两个小跟班，捡荒、打猎、闯祸时多半一起出场。
