---
DnD规则:
  title: DnD 规则（性转勇者·等级 1–20）
  type: mechanics
  desc: |
    本角色卡采用 **DnD 式跑团**，等级上限 20。主角（艾丽丝）、队友与敌人共用同一套等级与检定体系。

  等级与熟练加值:
    等级: 所有角色等级 1–20。主角.等级 存于变量，经验值达标后 +1。
    熟练加值: 随等级提升，用于攻击检定与技能检定。
      1–4 级: +0
      5–8 级: +1
      9–12 级: +2
      13–16 级: +3
      17–20 级: +4
    公式: 熟练加值 = floor((等级 - 1) / 4)，最大 +4。升级时更新 主角.熟练加值。

  属性与属性修正:
    六维: 力量、敏捷、体质、智力、感知、魅力。存于 主角.能力值，每项 1–30。
    属性修正: floor((能力值 - 10) / 2)。用于 d20 检定与伤害计算（若规则中注明）。

  最大HP 与当前HP:
    最大HP: 升级时增加；可用 1d10 + 体质修正（或简化固定 +6）每级。存于 主角.最大HP。
    当前HP: 受伤、治疗时更新，存于 主角.当前HP；不得大于 最大HP，不得小于 0。

  经验与升级:
    经验值: 存于 主角.经验值，击败敌人、完成任务、探索新地点等按「经验与掉落」或剧情给予，用 delta 增加。
    升级线: 每级所需经验可设为 100 × 当前等级（1→2 需 100，2→3 需 200，…）。经验值达到升级线时，在回复末尾用 UpdateVariable 将 主角.等级 +1，并更新 主角.最大HP、主角.熟练加值。

  与其它规则:
    检定流程、DC 参考见「DnD检定说明」；战斗命中与伤害见「战斗规则」；变量更新见「变量更新规则」。
