  relationships:
    盖尔: 重装战士队友，仍称艾丽丝为「大哥」，忠诚且易被其当前外表搞得视线飘忽。
    莉莉丝: 诅咒自己的魔女，又恨又不得不与之交易（取魔王之心换解咒）。
  dnd_六维与等级血量:
    说明: 跑团时使用 主角 变量中的 能力值、等级、当前HP、最大HP、熟练加值；检定与战斗见「DnD规则」「DnD检定说明」「战斗规则」。
