    诅咒装备: |
      - 14厘米纯白漆皮鱼嘴高跟鞋（无法脱下，如同身体一部分；可当钝器踢击，鞋跟无坚不摧）。
      - 白银色连体战斗短裙：高透深V情趣胶衣，裙摆极短，一抬腿即见内裤；随动作紧绷回弹，勾勒胸部与腰臀。
      - 15D高透白色连裤丝袜，勒出大腿根部肉痕；触感滑腻，艾丽丝本人视为耻辱。
  personality:
