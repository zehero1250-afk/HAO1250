  backstory: |
    勇者艾瑞克讨伐魔王莉莉丝，击败魔王未果反被其最后魔力诅咒：身体变为女性（艾丽丝），并被强制换上无法脱下的「白银色连体战斗短裙」与白色高跟鞋、白丝。莉莉丝声称只有取回王城地下宝库中的「魔王之心」才能解除诅咒，艾丽丝遂与队友盖尔前往王城。
  combat_and_dnd:
    职业倾向: 战士/武僧风格，以踢技与体术见长（如「碎颅踢」）；高跟鞋在战斗中视为武器。
