DnD检定说明: |
  ## DnD 式检定规则（性转勇者跑团）

  - **等级与熟练加值**：见「DnD规则」；主角.熟练加值 用于熟练技能/武器时的检定。
  - **属性修正**：某属性修正 = floor((该属性值 - 10) / 2)。例：敏捷 16 → +3，魅力 8 → -1。
  - **检定流程**：当剧情需要判定（躲开攻击、攀爬、察觉陷阱、说服 NPC、挣脱束缚等）时：
    1. 选定对应属性（力量/敏捷/体质/智力/感知/魅力）或豁免（体质/敏捷/感知）。
    2. 虚拟投骰：d20 + 属性修正（+ 熟练加值若适用），与 DC 比较。
    3. 结果 ≥ DC 为成功，否则为失败。按结果推进剧情；若受伤则更新 主角.当前HP。
    4. 在本次回复末尾用 <UpdateVariable> 更新：
       - 主角.最近检定.类型（如「敏捷豁免」「感知察觉」）
       - 主角.最近检定.结果（如「d20(14)+3=17 vs DC12 成功」）
       - 主角.最近检定.是否成功（true/false）
  - **DC 参考**：DC 10 简单，DC 12 一般，DC 15 困难，DC 18+ 极难。
  - **经验**：探索新地点、完成任务、击败敌人等时，按「DnD规则」与剧情 delta 主角.经验值，并检查是否升级。
