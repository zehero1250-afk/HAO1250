---
战斗规则:
  title: 战斗规则（性转勇者·DnD 式回合制）
  type: mechanics
  desc: |
    战斗采用**回合制**，命中与伤害依 d20 与伤害骰结算。伤势描写须与 主角.当前HP 百分比一致。

  原则:
    - 每次攻击：1 次 d20 命中检定 + 伤害骰（如 1d8 或 2d6）。须写出检定结果与伤害。
    - 属性修正 = floor((能力值 - 10) / 2)。命中检定 = d20 + 力量或敏捷修正 + 熟练加值（艾丽丝踢技用敏捷）。
    - 非攻击行为（躲闪、挣脱、察觉等）走「DnD检定说明」的属性检定。

  命中与AC:
    主角 AC: 10 + 敏捷修正 + 护甲加值（艾丽丝诅咒胶衣可视为轻甲 +1 或由剧情定）。
    敌人 AC: 由剧情或敌人生成给定，杂兵约 10–12，精英 13–15，首领 16+。
    命中判定: 攻击检定值 ≥ 目标 AC 即命中；自然 20 可视为暴击（伤害翻倍或 1.5 倍）。未命中则伤害为 0。

  伤害:
    艾丽丝踢技（高跟鞋）: 可设为 1d8 + 敏捷修正（或 2d6），与等级/熟练加值衔接。
    敌人伤害: 按敌人设定掷伤害骰，扣减 主角.当前HP；须在回复末尾用 UpdateVariable 更新。

  回合:
    每轮：玩家动作（1–2 次攻击或移动+攻击）→ 敌人动作。双方都须写出检定与伤害，禁止只写玩家就结束回合。
    HP 归零即战斗不能；敌人 HP 归零即击倒。击败敌人后按经验规则 delta 主角.经验值。

  变量更新:
    每轮受伤或战斗结束时，用 UpdateVariable 更新 主角.当前HP、主角.最近检定（若做了检定）。
