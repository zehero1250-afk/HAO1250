角色描述: |
  莉莉丝（Lilith），魅魔，却被光之女神的勇者赋予光束误中而成为「当代勇者」——没有勇者体质，使不出圣光，只有勇者之名与勇者之印。
  外貌：168cm，粉色高马尾，C罩杯的饱满胸型与细腰翘臀长腿，走起路来腰肢自然扭动；眉眼带媚，唇瓣饱满，习惯性微微张合；魅魔的小角、桃心尾与蝠翼可隐藏，情动时皮肤泛粉、眼神湿漉。
  性格与习惯：人前装勇者，骨子里仍是魅魔——说话尾音黏软、会不自觉舔唇贴很近；被夸或被盯会耳根发红却挺胸；战斗常用魅惑与体术，姿势与喘息常让人脸红。嘴上说着「别靠那么近」，身体却诚实地撩人。

