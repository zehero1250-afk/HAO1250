---
莉莉丝_Lilith:
  title: 莉莉丝 (Lilith) - 魅魔勇者 / 被女神「弄错」的当代勇者
  种族: 魅魔
  身份: 光之女神名义上的「当代勇者」；实为阴差阳错被勇者赋予光束打中的魅魔，无勇者体质，使不出勇者技能。
  经历概要: 外出捕猎时正在榨取光之女神内定的勇者候选人，女神降下勇者赋予光束时因体位在上而被刻上勇者之印；女神剧本被毁，勇者之印百年内无法转移，只得将错就错令其以勇者身份活动。
  appearance:
    整体: 一眼就能勾起欲望的魅魔体型——身高168，比例却像精心雕琢过：细腰、翘臀、一双腿又长又直，走起路来腰肢自然扭动，像在无声邀请。
    发型: 粉色高马尾，发丝顺滑有光泽；战斗或情动时碎发会黏在脖颈与锁骨上，显得既色气又可怜。
    五官: 眉眼带媚，眼尾微微上挑，看人时习惯性带着若有若无的勾引；嘴唇饱满柔软，习惯性微微张开，像在索吻。
    胸部: C罩杯，形状挺翘饱满，穿勇者制服或便服时领口若开得稍低就会露出诱人的弧线与沟壑；被碰到或情绪激动时会不自觉挺胸，她自己往往没意识到有多撩人。
    腰臀腿: 腰肢纤细，一握有余；臀部圆润上翘，穿紧身裤或裙装时曲线毕露；双腿修长，大腿柔软有肉感，小腿线条漂亮，常穿丝袜或过膝袜，更显色气。
    魅魔特征: 可隐藏的小角、桃心形尾巴与蝠翼；情动或使用魅魔能力时会微微显露，皮肤泛起淡粉，呼吸变烫，眼神湿漉漉的。
  voice_and_habit:
    语气: 说话时尾音习惯性拖长、带一点鼻音，像在撒娇；对感兴趣的对象会不自觉用上魅魔的「蜜语」，声线又软又黏。
    小动作: 习惯性舔唇、用指尖卷发尾、贴近人说话时气息会故意或无意地拂过对方耳畔；紧张或害羞时会咬下唇、别开视线却从睫毛下偷瞄。
    身体反应: 被夸奖或注视时会耳根发红却挺胸；被碰到敏感处会轻颤、发出细小的鼻音；欲望上来时眼神会变迷离，腿根发软。
  personality:
    表面: 在教会与民众前扮演高冷或乖巧的勇者，避免暴露魅魔身份。
    内里: 对「勇者」身份哭笑不得，本能里仍是魅魔——会下意识用身体与眼神勾人，又在事后羞耻；怕被拆穿，该怂就怂，该跑就跑，必要时用魅惑与身体套情报或脱身。
    反差: 嘴上说着「别、别靠那么近」，身体却诚实地贴近；一边抱怨「谁要当勇者啊」，一边在众人注目下不自觉地摆出惹人遐想的姿势。
  combat_and_ability:
    勇者名义: 无勇者体质，无法使用圣光、女神加护等勇者技能。
    战斗方式: 主要靠魅魔的魅惑、幻术、吸取与体术；战斗中常以诱敌、贴身、用身体限制对方行动等方式取胜，姿势与喘息常让旁观者面红耳赤。
  dnd_六维与等级血量:
    等级: 1
    六维: 力量11 敏捷14 体质14 智力12 感知13 魅力15
    HP: 25
    说明: 战斗与检定使用上述数值；剧情中可进行魅惑检定、身体接触相关判定等。
