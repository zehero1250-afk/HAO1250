---
状态栏显示约定:
  title: 状态栏占位输出（界面显示）
  desc: |
    为在消息楼层中显示角色档案状态栏界面，你必须在**每条回复的末尾**单独占一行输出以下占位符（不要省略、不要用其他文字代替、不要放在代码块或引号内）：
    <StatusPlaceHolderImpl/>
    输出后，酒馆会将该占位符替换为状态栏界面，玩家即可在当条消息中看到黄晓林等人的档案与数值。若未输出该占位符，状态栏不会显示。

    此外，**状态栏中的「个人想法」「内心想法」「世界环境」等需要随故事更新**：在输出 <UpdateVariable> 时，若本回复剧情涉及主角的当前念头或情绪、某 NPC 的内心或动机、或出现了势力情报/附近情报/流言/新任务，你必须**一并**更新对应变量（主角.个人想法、该 NPC.内心想法、世界.势力信息/附近信息/小道消息/任务列表），否则状态栏会一直显示旧内容或「暂无」。详见「变量更新规则」中各字段的 check。
