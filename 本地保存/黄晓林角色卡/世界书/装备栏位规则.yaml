---
装备栏位规则:
  title: 装备栏位规则（废土末世·身体部位）
  type: setting
  desc: |
    角色可**装备**的**身体部位栏位**按废土末世常见划分。每栏位同一时间仅可装备一件对应类型物品；
    装备品级与效果见「经验与掉落规则」之品级体系（普通~传说）。装备后须更新 主角.已装备 中对应栏位。

  栏位定义:
    头具_Head:
      栏位名: 头具
      英文: Head
      可装备类型: "头盔、防毒面罩、护目镜、头带、眼罩等头部护具或遮护。"
      数量: 1
    颈饰_Neck:
      栏位名: 颈饰
      英文: Neck
      可装备类型: "项链、护符、项圈、狗牌、旧世遗物等颈部位饰物或信物。"
      数量: 1
    躯干_Body:
      栏位名: 躯干
      英文: Body
      可装备类型: "护甲、胸甲、防弹背心、废土外套、拼接甲、防刺服等躯干护具或外衣。"
      数量: 1
    披挂_Back:
      栏位名: 披挂
      英文: Back
      可装备类型: "斗篷、披风、战术背心、背包（若占栏位）、肩甲等肩背部位装备。"
      数量: 1
    腰挂_Waist:
      栏位名: 腰挂
      英文: Waist
      可装备类型: "腰带、战术腰封、腰包、弹药带、束带等腰部装备。"
      数量: 1
    护腕_Wrists:
      栏位名: 护腕
      英文: Wrists
      可装备类型: "护腕、臂环、手环、腕带等腕部护具或饰物。"
      数量: 1
    护手_Hands:
      栏位名: 护手
      英文: Hands
      可装备类型: "手套、战术手套、护手、指虎等手部护具。"
      数量: 1
    护足_Feet:
      栏位名: 护足
      英文: Feet
      可装备类型: "靴子、军靴、护胫、绑腿、足部护具等。"
      数量: 1
    饰物一_Trinket1:
      栏位名: 饰物（一）
      英文: Trinket (slot 1)
      可装备类型: "指环、戒指、废墟遗物、信物、护身符等可随身携带的小件饰物；与饰物二独立，共两格。"
      数量: 1
    饰物二_Trinket2:
      栏位名: 饰物（二）
      英文: Trinket (slot 2)
      可装备类型: "指环、戒指、废墟遗物、信物、护身符等可随身携带的小件饰物；与饰物一独立，共两格。"
      数量: 1
    主手_MainHand:
      栏位名: 主手
      英文: Main Hand
      可装备类型: "主手武器（近战或远程）、主手持用工具等。"
      数量: 1
    副手_OffHand:
      栏位名: 副手
      英文: Off Hand
      可装备类型: "副手武器、盾牌、副手持用物品（如手电、副手工具）；可与主手双持或盾武配合。"
      数量: 1

  规则要点:
    - 同一栏位仅能装备一件物品；更换时须先卸下再装备新物品，原物品可放回 主角.物品栏。
    - 装备与卸下须在剧情合理时机进行（如休息、整备时）；战斗或紧急情境下可由剧情约定是否允许切换。
    - 品级（普通/精品/稀有/神器/史诗/传说）影响装备提供的防护、加成或特效，具体数值或描述由剧情与「经验与掉落规则」品级体系决定。
    - 若某栏位未装备则视为空栏位，无加成；物品栏中未装备的装备与道具仍存于 主角.物品栏，仅当装备到对应栏位后才生效栏位效果。

  变量衔接:
    说明: "主角当前装备存于 **主角.已装备**，键为栏位标识（Head、Neck、Body、Back、Waist、Wrists、Hands、Feet、Trinket1、Trinket2、MainHand、OffHand），值为 物品栏 中存在的**物品名**。装备时将该物品名写入对应栏位；卸下时删除该键，物品仍保留在 主角.物品栏。变量更新见「变量更新规则」。"
