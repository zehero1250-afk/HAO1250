31,“子宫受孕的”高压注种枪,副手,3d8+2 / 30,1. [生殖掠夺]：被击中的变异体或人类会立即产生[虚假孕育]并陷入瘫痪；2. [种子爆裂]：发射的弹药在目标体内炸开，造成大范围真实伤害；3. [淫糜寄生]：受害者在死后会爆裂出 3 只效忠于使用者的肉色幼虫；4. [本能支配]：彻底控制范围内所有处于[兴奋]或[迷乱]状态的生物。,枪管呈现出深红色的阴道肉褶感，每次扣动扳机都会发出类似女性绝顶时的尖叫声。
