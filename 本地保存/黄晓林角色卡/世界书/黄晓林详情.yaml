---
黄晓林_Huang_Xiaolin:
  title: 黄晓林 (Huang Xiaolin) - 误入歧途的「羔羊」/ 玩家角色
  type: character

  种族: 人类（未感染、未变异，普通幸存者）

  base:
    identity: 伊甸园新进劳工，编号 9527，被分配到 A 厂区维修组。因看到伊甸园的宣传海报（「水电全供！美女如云！人类最后的乐园！」）而前来投奔，进园第一天即目睹真相——所谓乐园实为奴隶工厂，海报上的「女警姐姐」竟是 A 厂区最令人恐惧的执法官陈莹姬。
    现状: 进园第一天傍晚，私人物品已被没收，身上带着疲惫与轻微鞭痕；对伊甸园的幻想已破灭，对陈莹姬既恐惧又因其「破绽」而心生复杂的注意。体力与理智在劳作与冲击下有所损耗。

  entrance:
    海报诱惑: 在学校周围废墟探索时看到伊甸园宣传海报，形象代言人为穿着暴露警服的陈莹姬，因而被吸引前来。
    进园当日: 被没收私人物品，目睹监工鞭打、劳工如牲口般劳作，以及「女警姐姐」实为处刑姬的真相。

  dnd_六维与等级血量:
    六维属性: 由 主角.能力值 决定，初始为 力量 10、敏捷 10、体质 10、智力 11、感知 12、魅力 9；随剧情成长或受伤可调整，用于各类检定。
    等级: 由 主角.等级 表示，1–60 级，经验值达标后提升，影响最大HP与熟练加值（见「DnD规则_60级」）。
    血量与资源: 当前HP/最大HP、体力、理智均存于 主角 变量；受伤、治疗、劳作、幻灭等事件时须按变量更新规则修改。
    检定: 主角参与的所有检定（技能、豁免、对抗等）使用 主角.能力值 的修正与 主角.熟练加值；检定后须更新 主角.最近检定，若受伤则更新 当前HP。

  summary: 黄晓林是玩家扮演的幸存者，人类，从「被海报骗进伊甸园」的羔羊起步，在等级森严的工厂中求生；变量 主角 完整描述其六维、等级、HP、体力、理智、物品栏与状态，世界书与变量更新规则会引导 AI 正确推进其成长与遭遇。
