---
NPC生成规则:
  title: NPC 随机生成规则（职业·特质·行动表现）
  type: mechanics
  desc: |
    当剧情中需要生成或判定一名 NPC 的等级、六维与战力时，**不随主角等级变动**，
    而是根据该 NPC 的**职业**、**特质**与**行动表现**综合决定。
    身份或职位（如「领袖」「队长」）**不等于**高等级——等级反映的是该 NPC 实际承担的风险与表现，而非头衔。

  核心原则:
    - "等级上限 **60**，所有 NPC 与敌人等级均为 1–60（见「DnD规则_60级」）。"
    - "NPC 等级与六维**不与主角等级挂钩**，避免「主角变强则全世界 NPC 一起变强」。"
    - "**职业**决定该 NPC 的基础等级区间与六维倾向（如战士偏力量体质、谋士偏智力感知）。"
    - "**特质**在职业基础上做加减修正（如好斗、谨慎、文职、伤残）。"
    - "**行动表现**决定最终档位：是否亲临一线、是否常参与战斗、是否承担生命风险等，而非「是不是领袖」。"

  末世职业与DnD对应:
    说明: "本表职业体系**对应 DnD 经典职业**，在末世废土中改写为幸存者身份；下表给出「该职业在废土环境中通常对应的等级区间」与六维倾向，用于初次生成或未明确设定的 NPC。具体取值时可在区间内根据剧情需要选定，或投骰决定；**等级不由头衔决定**，需结合「行动表现」判定。"

    战士_Fighter:
      末世身份: 前军人/佣兵/赏金猎人。正规训练或雇佣战斗人员，常接危险委托、一线厮杀。
      等级区间: 3~10。一线士兵与老练佣兵偏上限，后勤或新兵偏低。
      六维倾向: 力量、体质偏高；敏捷、感知中；智力、魅力按背景。
    野蛮人_Barbarian:
      末世身份: 掠夺者/狂徒/匪帮骨干。近战狂暴、敢冲敢杀，匪团与尸潮中的冲锋手。
      等级区间: 2~9。匪帮头目或尸潮里杀出来的狂人偏上限。
      六维倾向: 力量、体质偏高；敏捷中；智力偏低；感知、魅力按背景。
    游荡者_Rogue:
      末世身份: 潜行者/盗贼/扒手/侦察。潜行、扒窃、开锁、侦察与暗算。
      等级区间: 2~8。从拦路小贼到匪帮探子、黑市线人，按实际战力定位。
      六维倾向: 敏捷、感知偏高；智力、魅力中；力量、体质偏低或中。
    游侠_Ranger:
      末世身份: 猎人/追踪者/侦察兵。野外生存、追踪、狩猎变异兽与丧尸，熟悉地形与陷阱。
      等级区间: 3~8。与变异兽和尸群交手频率决定成长。
      六维倾向: 敏捷、感知偏高；体质、力量中；智力、魅力按背景。
    牧师_Cleric:
      末世身份: 医护/药师/传教士。治疗、药剂、包扎；部分势力中兼安抚与仪式（如上帝教）。
      等级区间: 2~7。医术与在势力中的资历为主，非战力型则体质/力量偏低。
      六维倾向: 智力、感知偏高；魅力中（若传教）；力量、敏捷偏低或中。
    圣武士_Paladin:
      末世身份: 护民官/誓约者/忠诚战士。为某势力、信念或领袖效死，纪律与信念强（如方舟护民官、残军骨干）。
      等级区间: 4~12。常带队冲锋或承担关键任务者偏上限。
      六维倾向: 力量、体质、魅力偏高；感知中；敏捷、智力按背景。
    法师_Wizard:
      末世身份: 研究员/技师/学者。知识、破解、维修、建造、爆破与野外调查；实验室或废墟中的技术担当。
      等级区间: 3~10。专业深度与是否涉险决定等级，非战力型则体质/力量偏低。
      六维倾向: 智力偏高；感知中（观察型）；力量、体质常偏低。
    术士_Sorcerer:
      末世身份: 觉醒者/变异体。病毒、辐射或改造带来的异变能力，与「HOT病毒与变异体系」层级对应。
      等级区间: 4~14。由变异程度与执念决定。
      六维倾向: 体质、力量或敏捷（依变异方向）；其余按执念与经历。
    邪术师_Warlock:
      末世身份: 契约者/信徒。与势力、教派或「某种存在」交换获得力量或庇护（如上帝教信徒、某势力死士）。
      等级区间: 3~11。信仰或契约深度与任务危险度决定。
      六维倾向: 魅力、智力或感知（依契约性质）；体质、力量中或偏低。
    吟游诗人_Bard:
      末世身份: 掮客/说客/传令/情报贩子。交涉、人脉、情报、传令与居中协调。
      等级区间: 2~6。以渠道与生存年数为主，非武力。
      六维倾向: 魅力偏高；智力、感知中；力量、体质常偏低。
    武僧_Monk:
      末世身份: 格斗家/苦修者/自律战士。近战格斗、少依赖武器，少数势力或教派中的修行者。
      等级区间: 3~9。实战与修行深度决定。
      六维倾向: 敏捷、体质偏高；力量、感知中；智力、魅力按背景。
    德鲁伊_Druid:
      末世身份: 野居者/驯化者/荒野生存者。长期野外、与变异兽或环境打交道，少数能驯兽或利用地形。
      等级区间: 2~8。生存年数与涉险频率决定。
      六维倾向: 感知、体质偏高；敏捷、智力中；力量、魅力按背景。
    劳工_无DnD直接对应:
      末世身份: 劳工/奴工/苦力。伊甸园与各据点中的底层劳动者，无系统战斗训练。
      等级区间: 1~4。老练劳工或偶有反抗经历者偏上限。
      六维倾向: 六维普遍偏低；体质略高者能扛劳役。
    监工_守卫_特殊:
      末世身份: 监工/守卫/执法队。伊甸园武装守卫、监工等，以维持秩序与押送为主，非专职前线厮杀则等级不宜过高。
      等级区间: 2~6。常参与镇压与鞭打者可取 4~5。
      六维倾向: 力量、体质中或偏高；魅力（威慑）或敏捷按岗位。

  职业与六维倾向_速查:
    说明: "生成时在对应等级下按倾向分配六维，避免所有同职业 NPC 长得一样。下表为按 DnD 末世职业的速查。"
    力量偏高: 战士(前军人/佣兵)、野蛮人(掠夺者)、圣武士(护民官)、术士(变异体)、武僧(格斗家)、监工/守卫。
    敏捷偏高: 游荡者(潜行者/盗贼)、游侠(猎人)、武僧(格斗家)、术士(变异体_部分)。
    体质偏高: 战士、野蛮人、圣武士、游侠、术士(变异体)、德鲁伊(野居者)、监工/守卫。
    智力偏高: 牧师(医护/药师)、法师(研究员/技师)、邪术师(契约者)、吟游诗人(掮客_人脉)。
    感知偏高: 游荡者、游侠、牧师、法师(观察型)、邪术师、德鲁伊。
    魅力偏高: 圣武士、邪术师、吟游诗人、监工(威慑)。
    六维普遍偏低: 吟游诗人(传令型)、劳工、文职型领袖。

  特质与修正:
    说明: 特质在「职业基础等级区间」上做加减修正（等级修正），或对六维某几项做倾向微调。可叠加，但同一 NPC 不宜堆砌过多冲突特质。
    等级或战力正向:
      好斗_嗜战: 等级 +1~2，力量/体质倾向升。
      身经百战_老兵: 等级 +2~3，六维更均衡偏战斗。
      执念突变体: 见「HOT病毒与变异体系」，往往等级区间上限或再 +1~2。
      亲临一线: 见下「行动表现」。
      # 以下为超强正面特质，修正幅度更大，适合精英/首领/传说级 NPC
      传奇幸存者_活传说: "等级 +3~5；在废土存活极久、经历无数生死，六维全面偏高，体质/感知尤其突出。"
      变异巅峰_完全体: "等级 +3~4；病毒或改造达到极高完成度，体质/力量/敏捷显著升，见「HOT病毒与变异体系」。"
      战场死神_收割者: "等级 +2~4；专精杀戮、击杀记录惊人，力量/敏捷/感知偏高，战斗检定可酌情加成。"
      战术大师: "等级 +2~3；指挥与单兵能力俱佳，智力/感知/魅力升，适合首领或参谋型。"
      不死之身_浴血者: "等级 +2~3；多次濒死又活下来，体质与意志极强，体质/感知升，HP 或抗伤可酌情上浮。"
      天生战狂: "等级 +2~3；战斗本能极强、遇强则强，力量/敏捷/体质升。"
      精英中的精英: "等级 +3~4；从精锐中再筛选出的顶尖者，六维均衡偏上，适合关底或章节 BOSS 副手。"
      改造强化体: "等级 +2~4；接受过系统强化改造（非变异），依改造方向升对应六维（如力量型、敏捷型）。"
      传奇猎手_猎杀者: "等级 +2~3；专门猎杀高威胁目标（变异兽、丧尸群、敌对强者），敏捷/感知/智力升。"
      意志如钢: "等级 +2~3；精神与意志力极强，难以动摇、抗洗脑抗恐惧，感知/魅力/体质倾向升。"
    等级或战力负向:
      文职_从不战斗: 等级 -1~3，战斗相关六维倾向降。
      伤残_病弱: 等级 -1~2，体质或敏捷降。
      新手_菜鸟: 等级 -1~2，六维可略降。
      谨慎_避战: 等级可不加，或 -1；生存久但战斗经验少。
    其他:
      狡诈: 智力/感知倾向升，不直接改等级。
      忠诚_死士: 不直接改等级，可影响行为与检定难度。
      疯狂_不稳定: 可给临时加成或混乱行为，按剧情处理。

  行动表现与最终等级:
    说明: "**身份是否为「领袖」「队长」不直接决定等级**。最终等级在「职业区间 + 特质修正」基础上，由**行动表现**微调。"
    高等级表现（可在职业区间内取中高段或 +1~3）:
      - 经常亲自参与战斗、带队冲锋、与敌人正面交锋。
      - 承担高风险任务（潜入、刺杀、断后、正面攻坚）。
      - 在剧情中已有「击杀强敌、死里逃生、长期一线」等表现。
    低等级表现（在职业区间内取低段或 -1~2）:
      - 仅坐镇指挥、发号施令，从不或极少亲临战场。
      - 以文职、后勤、交涉为主，不参与搏杀。
      - 刚加入势力、刚转职、或长期远离危险。
    示例:
      - 某盗贼团「领袖」若只躲在幕后分赃、从未动手，则等级可取 2~4（文职型领袖）。
      - 同一团里常带队抢劫、亲自搏杀的二当家，等级可取 6~10（行动表现高）。
      - 伊甸园某「监工」若只负责点名与汇报、从不动手，等级可取 2~3；若常参与镇压与鞭打、与劳工冲突，可取 4~5。

  与敌人生成规则的关系:
    - 需要**作为敌人**出场的 NPC，其等级与层级（杂兵/精锐/首领等）仍可参考「敌人生成规则」中的区域与阶级，但**敌人等级**不再与主角等级挂钩，而是先用本规则按职业+特质+行动表现确定该 NPC 的等级，再代入敌人生成公式。
    - 非敌人 NPC（中立、友好、情报源等）仅用本规则生成等级与六维即可，用于检定与剧情合理性。

  交付要求:
    - 当剧情中**首次出现**或**需要明确战力**的 NPC 时，按上述顺序：先定职业（得等级区间与六维倾向）→ 加特质修正 → 按行动表现微调，得到最终等级与六维倾向。
    - 若该 NPC 随后作为敌人被击败，经验与掉落仍按「经验与掉落规则」依其**最终等级**与所处层级计算。
