---
伊甸园地图:
  title: 伊甸园整体地图与区域关系
  type: location
  desc: |
    伊甸园位于 S 市郊区原大型工业园区内，由围墙与岗哨与外界隔绝。园区呈南北向狭长布局，
    从劳工居住区到核心实验区依次为：蜂巢（北）→ A 厂区（中北）→ B 厂区（东侧/边缘）→ C 厂区（南/核心）。
    叙事与移动时请按此相对位置与通道关系描写。

  总体布局_方位示意:
    说明: "以下为相对方位与连接关系，便于叙事时描述「从哪到哪」「路过何处」。"
    北侧:
      蜂巢: "劳工集中居住区，集装箱堆叠的立体贫民窟。唯一合法出口为通往 A 厂区的封闭通道（蜂巢通道），列队进出、不得脱队。"
    中北侧:
      A厂区: "工业与劳作区，发电、分拣、装备制造；陈莹姬管辖。东侧与 B 厂区有专用地面通道及地下排水干道（抛尸/清淤用）；南侧有管制通道通往 C 厂区（仅执法者与被选素体）。"
    东侧_边缘:
      B厂区: "农业与养殖区，种植、兽栏、屠宰场、榨精房；屠妇管辖。西接 A 厂区（押送「回收」与物料），南有密封通道向 C 厂区输送活体与样本；地下与 A 厂区下水道干道相连，尽头为抛尸点与变异巨狗兽栏。"
    南侧_核心:
      C厂区: "教授私人领地，病毒与人体改造实验区。仅最高级执法者与「素体」可入；从 A、B 厂区均有管制通道进入，普通劳工不可接近。"

  连接关系_简表:
    蜂巢 → A厂区: "蜂巢通道（封闭，固定路线，摄像头与巡逻；列队上下工）。"
    A厂区 → B厂区: "地面专用通道/车辆（押送「回收」、物料）；地下下水道干道（通抛尸点，已禁止劳工通行，仅清淤或押送）。"
    B厂区 → C厂区: "密封通道（活体、样本、加工材料；屠妇与 C 厂区人员交接）。"
    A厂区 → C厂区: "管制通道（陈莹姬等执法者、被选素体；劳工禁入）。"
    伊甸园 → 外界: "园区大门与围墙岗哨；地下原排水支道已全部封死，无法从下水道逃出。"

  区域层级与进入权限:
    蜂巢: "所有登记劳工居住；进出仅能经蜂巢通道往返 A 厂区。"
    A厂区: "劳工上工区域；栈道与惩罚区仅监工与陈莹姬；通往 C 厂区的通道有岗哨。"
    B厂区: "被指派至 B 厂区的劳工可进入；屠宰场与榨精房限屠妇与指定人员；通往 C 厂区通道封闭管理。"
    C厂区: "仅教授、高级执法者、被选素体与实验相关人员；普通劳工不得进入。"

  叙事用途:
    - "描述角色移动时，可依「从蜂巢经通道进入 A 厂区」「从 A 厂区被押往 B 厂区」「陈莹姬经栈道走向惩罚室」等具象化方位与通道。"
    - "提及「东侧」「南侧」「地下」时，可对应 B 厂区、C 厂区、下水道/抛尸点，保持空间一致。"
    - "伊甸园大门、围墙、岗哨统一视为园区与外界的唯一边界；地下出口已封死，逃亡只能从大门或隐藏路线（若剧情另行设定）。"

  参考条目:
    - "详细区域结构见「伊甸园」「蜂巢」「A厂区地图」「B厂区地图」。"
