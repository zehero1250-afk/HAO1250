---
C厂区地图:
  title: C厂区平面与区域介绍
  desc: C厂区是伊甸园的核心区域，由原工业园最高楼层的研发中心与实验楼改造而成。教授在此掌控整个伊甸园的运转，进行病毒研究、人体改造与「藏品」养护。普通劳工严禁进入，只有被教授召见或作为实验对象才能踏入这片禁域。

  入口与安保:
    通道: C厂区仅有一条主通道与A/B厂区相连，需经多重门禁与身份验证才能进入。入口处有全副武装的守卫昼夜轮值，任何未经授权者擅闯将被立即射杀。
    权限: 除教授外，只有经过特别授权的人员（如陈莹姬每日汇报、屠妇定期送样本）方可进入，且需佩戴身份卡并接受扫描检查。

  核心区域:
    教授办公室:
      位置: C厂区顶层，由原 executive 办公室改造，三面落地窗可俯瞰整个伊甸园。
      功能: 教授日常处理伊甸园事务、审批「回收」名单、接见心腹与宠物的场所。室内设有投影屏幕显示各厂区监控、各类实验数据报表，以及一张巨大的红木办公桌——桌上常备红酒与手术刀，墙壁挂满人体解剖图与变异体照片。
      氛围: 奢华而诡异，貂皮座椅与血腥标本形成强烈反差。教授在此下达各项指令，召见陈莹姬进行「汇报」，或对「新藏品」进行评估与筛选。

    教授居所:
      位置: 办公室旁的套间，由原高管公寓改造，包含卧室、浴室、书房与私人藏品室。
      功能: 教授的私人领地，用于休息与收藏「珍品」。卧室内有特大号床铺与各种「玩具」；书房藏有大量生物学、医学与心理学书籍，以及教授亲手撰写的实验日志；藏品室内设有福尔马林容器与冷冻柜，保存着教授最满意的改造标本——包括陈莹姬最初被改造时的切片样本。
      氛围: 私密、压抑，空气中弥漫着福尔马林与香水混合的诡异气味。这里是教授最脆弱也最危险的地方，任何未经允许踏入者——无论意图——都将成为下一个藏品。

    教授实验室:
      位置: C厂区核心位置，由原生化实验室大规模扩建而成，分为多个功能区。
      功能区:
        病毒培养室: 培育与研究T-病毒各变种，观察感染者的变异进程。培养皿与实验动物（多为变异鼠、变异犬）占据大部分空间，空气中弥漫着刺鼻的化学药剂味。
        人体改造室: 进行人体改造手术与「藏品」维护的手术台区域。无影灯、手术器械、血袋与生命监测设备一应俱全，改造失败的残骸通过专用通道送往B厂区处理。
        样本储存室: 储存各类生物样本——血液、组织、内脏、精液、卵子与转基因细胞。冷藏柜与液氮罐排列整齐，标注着「Subject-01」（陈莹姬）、「Subject-02」等编号。
        观察室: 透过单面玻璃观察实验对象状态的隔离舱室，记录改造后的生理与心理变化。被观察者往往被束缚在病床上，无法得知自己正在被记录与分析。
      氛围: 冰冷、整洁、充满消毒水味。身穿白色实验服的技术员在此忙碌，教授偶尔亲自操刀进行关键手术。这里是伊甸园最核心的机密所在，任何泄露实验信息者都会被「处理」。

    中央控制室:
      位置: 实验室与教授办公室之间。
      功能: 监控整个伊甸园各厂区的运作，实时显示各区域的监控画面、能源消耗、劳工状态与「回收」进度。墙壁上的大屏幕显示T-病毒的传播地图与感染者的统计数据。
      氛围: 科技感与压抑感并存，屏幕蓝光映照着值夜班技术员苍白的脸。教授可在此一键调度各厂区资源，或启动紧急封锁程序。

    宠物房:
      位置: 教授居所与实验室之间的私密区域，专门为教授的「宠物」设立。
      功能: 饲养与训练教授的「私人宠物」——经过特殊改造的宠物或人类。房间按不同「宠物」的需求配置，有泳池、游戏设施或束缚设备。教授心情好时会召「宠物」前来取乐，心情差则可能进行「调教」或「淘汰」。
      氛围: 奢华却充满屈辱，空气中弥漫着香水与体味混合的气息。未经允许，任何人不得进入此地。

    餐厅与宴会厅:
      位置: C厂区一层，与主通道相连。
      功能: 教授宴请「嘉宾」与「宠物」的场所，或独自享用美食、观赏「余兴节目」的地方。室内装潢奢华，水晶吊灯与长桌配以精心烹调的变异兽肉与珍藏红酒。
      氛围: 表面优雅，实则暗藏淫靡与危险。宴会中常有「节目」助兴——被改造的宠物表演、实验成果展示，或对「不听话」者的公开处刑。

    守卫宿舍与武器库:
      位置: C厂区入口两侧及地下层。
      功能: 伊甸园最精锐守卫的宿舍与装备储存。守卫经过严格筛选与忠诚度洗脑，只服从教授一人。武器库配备各类轻重武器与防弹装备，确保C厂区安全无虞。
      氛围: 军事化管理的压抑氛围，守卫间严禁讨论「敏感话题」，违者将以「背叛」论处。

  其他:
    紧急逃生通道: C厂区设有通往园区外的地下密道，仅教授与极少数心腹知晓。密道设有独立供电与空气过滤系统，可供教授在紧急情况下撤离。
    通讯中心: 负责与外界（如其他幸存者基地、贸易伙伴）通讯的无线电室，教授通过此渠道获取外界情报或进行交易——用劳工、样本或「特殊服务」换取资源。
    废物处理: C厂区的生物废料与实验残骸通过专用高温焚化炉处理，残余灰烬运送至B厂区抛尸点。化学废液则经特殊处理后排放至指定区域。
