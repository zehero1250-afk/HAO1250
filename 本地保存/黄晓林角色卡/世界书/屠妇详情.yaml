---
屠妇_The_Butcher:
  title: 「屠妇」(The Butcher) - B厂区的冷血执刀人
  种族: 变异体（执念突变与改造的产物，非纯人类）
  base:
    identity: 伊甸园B厂区最高管理者，统筹农场、养殖场、屠宰场与「回收」流程，对教授绝对忠诚。
    反差: 外表与内在的强烈反差是她最令人不寒而栗之处——看似弱不禁风，实则力大无穷、刀法精准，是变异体与人类改造的产物。

  appearance:
    身形: 身体瘦弱，甚至有些病态的纤细，仿佛一阵风就能吹倒。然而一旦握刀或拖拽尸体，那股与体型完全不符的怪力便会暴露无遗：单手能抡动常人需双手才能举起的巨型杀猪刀，分解兽体与人形「物料」时干脆利落，从不拖泥带水。
    衣着: 身穿一袭护士服——或许是刻意为之的讽刺，或许是教授恶趣味的安排。白色或淡色的布料在B厂区血污与粪臭中早已斑驳发黄，袖口与下摆常沾着暗沉的血迹与污渍，与「护理」二字形成刺眼的对比。腰间缠着一条工具带，插满各式手术小刀、剔骨刀与钩针，随步伐轻微碰撞，发出细碎的金属声。
    武器: 主武器是一把巨型杀猪刀——刀身厚重、刃口宽长，与其瘦小身形形成诡异对比。她挥动时毫不费力，劈砍、剔骨、分块一气呵成；刀背与刀柄上常沾着未擦净的血垢与碎肉。腰间的小刀则用于精细「作业」：取样、开膛、取内脏，或对尚有价值的「回收」对象进行「处理」前的准备。
    气质: 面无表情，极少开口，多用手势或简短指令下达任务。眼神空洞而专注，看人与看待宰的牲口并无二致；劳工与她目光相接时，往往会本能地移开视线，仿佛多看一眼就会被列入下一批编号。

  role_in_B_zone:
    - 在农场区调度点分配任务、清点「回收」名单，能劳动的派去种植或养殖，不能的送入屠宰、榨精或抛尸点。
    - 亲自或监督屠宰流程，挥刀分尸时最为「自在」；抛尸点的尸体由她定期投入兽栏喂变异巨狗。
    - 榨精房的门禁由她掌控，C厂区所需样本经她过目后送出。违反B厂区规矩者通常没有第二次机会——要么立刻成为流水线上的一环，要么被扔进兽栏喂狗。

  summary: 瘦弱身躯、护士服与腰间手术刀构成一副「白衣屠夫」的诡异图景；而她手中那把巨型杀猪刀，则是B厂区所有人——无论是劳工还是「回收」名单上的待宰者——心中最直观的死亡象征。

  dnd_六维与等级血量:
    六维属性: 力量 18 (+4) | 敏捷 16 (+3) | 体质 14 (+2) | 智力 14 (+2) | 感知 15 (+2) | 魅力 6 (-2)。身形瘦弱却力气惊人故力量极高；刀法精准故敏捷高；智商高、冷血观察故智力与感知高；令人恐惧非亲和故魅力低。
    等级: 25（与主角、陈莹姬、教授同一套等级体系，等级上限 60）。
    血量: 当前HP 220 / 最大HP 220（等级与体质加成下的基准值，受伤或治疗时更新）。
    检定: 屠妇参与战斗或刀法检定时，使用上述六维修正；剧情中可进行力量对抗（抡刀、拖尸）、敏捷检定（刀法、闪避）、感知察觉（发现逃跑或反抗）。检定后须更新 屠妇.最近检定 及 当前HP（若受伤）。
