62,粗制抗生素胶囊,医疗,移除[轻度感染]状态。,[免疫增强]：24 小时内对病毒类攻击的抗性提升 10%。,黑市作坊私自填充的药物，虽然成分可疑，但确实有效。
63,浸油的粗麻绷带,医疗,缓慢恢复 20 点生命值。,[抗感染]：使用时有 50% 概率移除皮肤表面的毒素。,这种绷带由特殊的植物油浸泡，能防止伤口与衣物粘连。
64,“野猪”牌能量饮料,饮品,恢复 20% 耐力。,[心跳加速]：暴击率提升 5%，持续 1 场战斗。,旧时代的廉价饮料，含有大量的咖啡因和牛磺酸。
65,高浓度工业酒精,消毒,恢复 5 点生命，受到 2 点灼烧伤害。,[深度杀菌]：彻底移除[重度感染]状态。,虽然非常痛苦，但在没有抗生素的废土，这是保命的唯一手段。
66,脱水蔬菜干包,食物,恢复 10% 生命值。,[纤维补充]：最大生命值临时增加 5 点，持续 2 小时。,方舟温室培育的珍稀脱水蔬菜，提供了宝贵的维生素。
67,简易骨折固定支架,医疗,移除[断肢/骨折]状态。,[结构支撑]：移动速度不再受腿部伤残影响。,用轻质合金和皮带组装的辅助支架，穿戴后可立即恢复行动。
68,嗅盐吸入剂,唤醒,瞬间从[昏迷]或[瘫痪]中苏醒。,[感官超载]：下一次攻击必定先手执行。,散发着刺鼻氨气的小管子，能瞬间击碎大脑的迟钝。
69,蜂蜜风味蛋白棒,食物,恢复 10 点生命值。,[温和修复]：在休息状态下使用，恢复效果翻倍。,渡口商盟的高级干粮，口感甜美，深受女性拾荒者欢迎。
70,纳米止痛喷雾,医疗,恢复 20 点生命值。,[神经麻痹]：忽视所有伤残带来的减损效果，持续 3 轮。,旧文明医疗舱的备用消耗品，喷洒在皮肤上会形成一层保护膜。
精品级消耗品
71,浑浊的止痛药水,医疗,恢复 10 点生命值。,这种药水被装在回收的小玻璃瓶里，喝下去后嘴里满是苦涩的金属味。
72,自制酒精棉球,消毒,移除[轻微感染]状态。,用高度烈酒浸泡过的廉价棉花，按在伤口上能让你疼得跳起来。
73,过期的感冒胶囊,药品,移除[鼻塞/打喷嚏]负面状态。,虽然药效已经流失了大半，但对于体质虚弱的幸存者来说依然是奢侈品。
74,生理盐水补充液,补充,恢复 5% 的体力。,只是最基础的水和盐分，能防止你在长途搜刮中因脱水而虚脱。
75,褐色止咳糖浆,药品,停止持续 1 分钟的[咳嗽]状态。,咳嗽在潜行时是致命的，这种糖浆能强行压制气管的痉挛。
76,稀释后的双氧水,消毒,恢复 5 点生命值。,倒在伤口上会冒出大量的白色泡沫，那是废土上为数不多的“干净”感。
77,薄荷脑油剂,提神,恢复 10% 的体力。,涂抹在太阳穴上，辛辣的凉意能让你在战斗中强行打起精神。
78,简易催吐剂,医疗,移除[食物中毒]状态。,味道极其恶心，喝下去后能让你迅速清空胃里那些变质的罐头。
79,黄色的皮肤软膏,医疗,缓慢恢复 8 点生命值。,用于涂抹擦伤和烫伤，虽然粘稠且油腻，但能隔绝空气中的灰尘。
80,未命名的蓝色针剂,战斗,攻击力固定 +2，持续 2 轮。,拾荒者从实验室废墟翻出来的无标签试剂，颜色诡异，效果短暂。
普通消耗品
81,半瓶过期的矿泉水,饮品,恢复 2 点生命，移除[口渴]。,水质浑浊，漂浮着不明沉淀物，喝下去需要一点勇气。
82,受潮的散装香烟,精神,恢复 10 点体力。,烟草已经发霉，抽起来有股烂叶子的味道，但能缓解压力。
83,生虫的压缩饼干屑,食物,恢复 3 点生命。,包装袋已经破损，剩下的碎渣干硬无比，难以下咽。
84,脏兮兮的擦汗毛巾,医疗,恢复 1 点生命。,勉强能擦掉伤口周围的血迹，但也可能带来新的感染。
85,快干透的清凉油,提神,恢复 2 点耐力。,铁盒已经生锈，挖出一块涂在人中上，辣得眼睛流泪。
86,半块嚼过的口香糖,糖果,恢复 1 点耐力。,早就没了甜味，但在废土上，咀嚼动作能分散饥饿感。
87,发酸的午餐肉残渣,食物,恢复 5 点生命，50% 概率[腹泻]。,从罐头缝里抠出来的肉沫，味道极其可疑。
88,旧报纸包裹的草药,医疗,恢复 4 点生命。,也就是随处可见的野草根，嚼碎了糊在伤口上有心理安慰。
89,劣质的塑料打火机,奇物,仅能点火 3 次。,里面的燃料只剩个底，大风一吹就灭，是拾荒者的希望之光。
90,开封很久的创可贴,医疗,恢复 1 点生命。,粘性几乎消失，边缘发黑，只能勉强贴住细小的划痕。
91,半截发黑的蜡烛,照明,恢复 5 点体力。,摇曳的火光在废墟黑夜里是唯一的慰藉，虽然它很快就会熄灭。
92,“天极”废弃包装纸,饰物,恢复 3 点生命。,曾经包裹着昂贵点心，现在你只能舔舐上面残留的一点甜味粉末。
93,生锈的鱼钩,工具,恢复 3 点耐力。,别想着用它钓鱼，但在没有针的时候，它是缝补伤口的最后选择。
94,空掉的肾上腺素针管,奇物,恢复 1 点生命。,里面还残留着一两滴药液，反复推挤也许能让你多吸入一点。
95,受潮的火柴盒,工具,恢复 2 点耐力。,划十次大概能着一次，每一次亮起都是对命运的赌博。
96,变质的维生素片,药品,恢复 4 点生命。,药片已经粉末化了，吃起来有一股浓重的化学霉味。
97,“老金的”廉价烟头,精神,恢复 3 点体力。,从渡口酒吧门口捡来的，还能再猛吸最后一口。
98,脏兮兮的半个馒头,食物,恢复 5 点生命。,硬得像石头，嚼的时候得小心别把牙硌掉。
99,破损的塑料吸管,工具,恢复 3 点体力。,在寻找墙缝里的积水时，它比你的舌头好使。
100,粘满毛发的胶带头,医疗,恢复 2 点生命。,粘性极差，但如果你把它在火上烤烤，还是能勉强贴住伤口。
