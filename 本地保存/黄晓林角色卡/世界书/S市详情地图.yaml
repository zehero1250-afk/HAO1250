---
S市详情地图:
  title: S市详情地图（方位与据点一览）
  type: location
  desc: |
    S 市（Scaled City）为病毒爆发前南方港口与制造业中心，规模约缩小版广东的一核多区格局。
    主城沿大河入海口分布，病毒爆发后大半沦陷为废墟与尸潮区；本条目提供整体方位、各区据点与关键路线，便于叙事时统一空间感。势力详情见「S市与外部势力」。

  总体格局:
    大河: "自北向南穿城入海，将主城分为东岸与西岸；河上大桥多已断裂或封锁，渡河需走南郊渡口或绕行北郊。"
    主城: "沿大河两岸分布的城区核心；东岸原新区与 CBD，西岸老城与居民区，多数已为废墟与尸潮区。"
    北侧: "工业带与物流园；伊甸园位于北郊东侧大型工业园区内，扼守通往东岸与主城要道。"
    南侧: "滨海区与码头；渡口商盟控制主码头与船运。"
    东侧: "东郊新区外延；铁腕残军据点在旧军营或加固厂区，扼守东岸进出要道。"
    西侧: "西郊农田与零散村落、拾荒者路线；再往西为废土与公路通往 R 市（上帝教本部）。"

  区域与据点一览:
    北郊:
      北郊东侧: "伊甸园（大型工业园区内，教授统治；蜂巢→A厂区→B厂区→C厂区）。"
      北郊西侧: "零散农田与废墟；断链游击队活动区，无固定据点，多藏身北郊与东郊交界要道附近。"
    主城东岸:
      方舟: "原 CBD 核心区 reclaimed 区，数栋高层与地下综合体；与伊甸园势均力敌的大型势力，控制东岸大桥北侧桥头堡及沿岸码头之一。"
      东岸废墟与地铁: "尸潮与废墟；部分地铁站、地下设施被小型团体占据（地铁避难所，各站数十人规模）。"
    主城西岸:
      西岸老城: "街巷狭窄，物资点与陷阱多；黑市（地下停车场、防空洞、废弃商场地下室，接头点流动）、末世古惑仔（某几条相连街巷与地下车库、游戏厅）、拾荒者路线。"
    东郊:
      铁腕残军据点: "原武警/驻军营地或加固厂区；扼守东岸进出主城要道，与方舟、渡口商盟有通道可联络。"
    西郊:
      拾荒者聚落: "棚户、主城废墟边缘、地铁入口等，流动性大；多股小帮无统一领袖。"
      圣烛聚落: "某旧教堂或学校，约 30～50 人，小型宗教聚落。"
      上帝教S市据点: "西郊边缘或西岸废墟中的隐蔽据点（旧教堂、学校、地下掩体），传教使带领，规模小。"
    南郊:
      渡口商盟主码头: "滨海主码头及相邻仓库区；控制河海转运与对岸贸易，与方舟、铁腕均有贸易或联络。"
      滨海路: "沿海公路，连接码头与东西岸。"
    市外:
      R市: "S 市西侧邻市，废土与公路可达；上帝教本部（大型势力），上帝之子统领；在 S 市西郊与西岸设传教小据点。"

  关键路线与渡河:
    渡河: "大河为东西岸天然分隔；南郊渡口商盟控制主渡口与船运，可搭船过河；东岸方舟控制桥头堡之一；其余大桥多断裂或封锁，渡河需绕北郊或经渡口。"
    北郊→主城: "伊甸园所在北郊东侧有要道通往东岸与主城；断链活动于北郊与东郊交界，常袭扰伊甸园外出队。"
    东岸↔东郊: "铁腕残军扼守东岸进出要道；方舟、铁腕、渡口商盟之间有通道或贸易路线可联络。"
    西岸↔西郊: "拾荒者、黑市、末世古惑仔、圣烛、上帝教据点分布在西岸与西郊，路线交错，无统一管制。"
    通往R市: "西郊再往西为废土与公路，通往 R 市；上帝教传教队经此东进 S 市，逃难或北上亦可经此离开 S 市（沿途尸潮与匪患）。"

  叙事用途:
    - "描述角色移动时，可依「从北郊伊甸园南下经要道至东岸」「从西岸黑市接头点往西郊圣烛聚落」「在南郊渡口搭船过河」等具象化方位与路线。"
    - "提及「东岸」「西岸」「北郊」「渡口」时，与上表对应，保持势力与风险一致（东岸有方舟与废墟、西岸有黑市与古惑仔、南郊渡口有商盟）。"
    - "伊甸园逃奴若南下渡河可接触渡口商盟或对岸；若东进可遇铁腕或方舟巡逻队；若往西则进入拾荒者与上帝教、圣烛活动区。"

  参考条目:
    - "各势力详情、领袖与对主角选项见「S市与外部势力」；伊甸园内部结构见「伊甸园地图」「蜂巢」「A厂区地图」「B厂区地图」。"
