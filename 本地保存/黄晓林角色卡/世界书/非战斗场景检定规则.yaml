---
非战斗场景检定规则:
  title: 非战斗场景检定规则
  type: mechanics
  desc: |
    当剧情涉及**非战斗**的情境（社交、探索、劳作、潜行、调查等）时，仍采用 d20 + 属性修正 + 熟练加值（若适用）vs DC 的检定方式；
    但不造成直接战斗伤害，结果主要影响剧情走向、体力/理智、他人态度或信息获取。详见下列分类与 DC 参考。

  通用原则:
    - 公式与「DnD检定说明」一致：d20 + 属性修正（+ 若该技能熟练则加 熟练加值）vs DC。
    - 检定后**必须**更新 主角.最近检定（类型、结果、是否成功）；若涉及体力消耗、精神冲击或状态变化，须同步更新 体力、理智、状态效果 等。
    - 非战斗检定**通常不扣 当前HP**；仅当剧情明确「因劳累或惊吓导致身体崩溃、昏厥」等极少数情况，可酌情扣少量 HP 或仅用 体力/理智 体现。

  检定类型与属性对应:
    社交:
      说服_魅力: 恳求、谈判、争取信任、让 NPC 改变主意。对抗对方意志或情境 DC。
      欺骗_魅力: 撒谎、伪装身份或意图、掩饰破绽。对方洞察高或情境复杂则 DC 升高。
      威吓_魅力: 用言语或气势震慑对方（对监工、陈莹姬等高权威者通常 DC 高且失败风险大）。
    察觉与洞察:
      察觉_感知: 发现隐藏物品、听见远处声响、注意到他人表情或破绽（如陈莹姬的「生理破绽」）。
      洞察_感知: 判断对方是否说谎、动机、情绪或潜在威胁。
    隐匿与手法:
      隐匿_敏捷: 躲过巡逻、潜行、不被发现地移动或 eavesdrop。
      手上功夫_敏捷: 扒窃、藏匿小物件、在监督下做小动作（如藏工具）。
    调查与知识:
      调查_智力: 搜索线索、分析现场、破解简单机关或文档。
      回忆/知识_智力: 想起过去情报、常识、技术或地点相关记忆。
    体力与耐劳:
      攀爬/负重_力量: 翻越障碍、扛重物、长时间托举。
      忍耐劳作_体质: 长时间高负荷劳动不垮、扛住恶劣环境或饥饿。失败可扣 体力 或叠加 状态效果（如「疲惫」「轻微中暑」）。
      意志坚持_感知: 抵抗诱惑、恐惧或洗脑式说教（如伊甸园宣传）；失败可扣 理智。

  难度_DC_参考:
    简单_DC10: 日常对话、在无人处翻找、轻度劳动。成功率高。
    一般_DC12: 普通说服、在有人注意下行动、中等强度劳作、察觉明显线索。
    困难_DC15: 对警惕对象的欺骗或威吓、在监工/陈莹姬附近潜行、高负荷劳动、从细节推断真相。
    极难_DC18+: 说服或欺骗陈莹姬/教授、在严控区不被发现、极端环境下的忍耐、识破精心布局的谎言。

  伊甸园情境补充:
    - 对监工、陈莹姬、教授的社交检定：对方权威高，DC 至少 12，威吓或欺骗通常 15+；陈莹姬的「破绽」需 感知察觉 DC 由情境定（她兴奋或松懈时 DC 可略降）。
    - 劳作相关：长时间维修、搬运、发电等可要求 体质 或 力量 检定，失败扣 体力 或加 状态效果；连续失败可导致昏厥或送入「回收」名单的剧情风险。
    - 潜行与藏匿：在 A/B 厂区巡逻与监控下，隐匿 DC 通常 12–15；C 厂区或禁地 15+。

  成功与失败后果:
    成功: 按剧情给予信息、对方态度好转、获得物品或机会、避免惩罚、体力/理智 少扣或不扣。
    失败: 可扣 体力 或 理智、对方态度恶化、被发现或惩罚、得不到线索、叠加 状态效果；**不应**在非战斗场景中默认造成大量 HP 伤害，除非剧情明确（如被电击、鞭打则按战斗或惩罚规则处理）。

  与变量更新规则的衔接:
    - 非战斗检定后更新 主角.最近检定；若涉及 陈莹姬/屠妇/教授 的互动，同步更新对应 NPC 的 最近检定、对主角态度 等。
    - 体力、理智、状态效果 的变更须符合「变量更新规则」中各自 range 与 check 说明。
